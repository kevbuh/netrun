[pytest]
# Pytest configuration for alpha project

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = src/tests

# Minimum Python version
minversion = 6.0

# Show summary of all test outcomes
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require database, external services)
    slow: Slow tests (may take several seconds)
    requires_ollama: Tests that require Ollama running
    requires_db: Tests that require database access

# Coverage settings (when using pytest-cov)
[coverage:run]
source = src
omit =
    */tests/*
    */venv/*
    */experiments/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
