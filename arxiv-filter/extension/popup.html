<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }
    .site-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .favicon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .site-name {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      color: #e0e0e0;
      margin-bottom: 6px;
      max-height: 54px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .url {
      font-size: 11px;
      color: #555;
      margin-bottom: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn {
      width: 100%;
      padding: 8px;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #111;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .msg {
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      color: #666;
    }
    .msg.ok { color: #aaa; }
    .msg.err { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">&alpha;</div>
  <div class="site-row">
    <img class="favicon" id="favicon" src="" alt="">
    <span class="site-name" id="site-name"></span>
  </div>
  <div class="title" id="page-title">Loading...</div>
  <div class="url" id="page-url"></div>
  <button class="btn" id="save-btn">Save to Reading List</button>
  <div class="msg" id="msg"></div>
  <script src="popup.js"></script>
</body>
</html>
