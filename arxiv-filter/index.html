<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>alpha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Home Grid ── */
    #home-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 20px;
      max-width: 900px;
      width: 100%;
    }

    .grid-item {
      aspect-ratio: 1;
      background: #151515;
      border: 1px solid #252525;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      text-decoration: none;
      color: #e0e0e0;
    }

    .grid-item:hover {
      background: #1c1c1c;
      border-color: #333;
      transform: translateY(-2px);
    }

    .grid-item.tbd { cursor: default; opacity: 0.35; }
    .grid-item.tbd:hover { background: #151515; border-color: #252525; transform: none; }

    .grid-icon { font-size: 2.4rem; }

    .grid-label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #ccc;
      text-align: center;
    }

    .grid-item.tbd .grid-label { color: #555; }

    /* ── Shared ── */
    .view { display: none; }
    .view.active { display: block; }
    #home-view.hidden { display: none; }

    .back-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .back-btn:hover { color: #ccc; }
    .back-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .view-header {
      padding: 24px 32px;
      border-bottom: 1px solid #222;
      background: #111;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .view-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
    }

    /* ── arXiv ── */
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 16px;
    }

    .controls input[type="text"] {
      flex: 1;
      min-width: 250px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.95rem;
    }

    .controls input[type="text"]:focus { outline: none; border-color: #b4451a; }

    .controls select {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .controls select:focus { outline: none; border-color: #b4451a; }

    .stats {
      font-size: 0.85rem;
      color: #888;
      padding: 8px 32px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
    }

    /* ── Trends Panel ── */
    .trends-panel {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 32px 0;
    }

    .trends-section {
      margin-bottom: 16px;
    }

    .trends-section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .trends-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .trend-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #252525;
      background: #151515;
      color: #ccc;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .trend-chip:hover {
      background: #1e1e1e;
      border-color: #b4451a;
      color: #fff;
    }

    .trend-chip .chip-count {
      font-size: 0.7rem;
      color: #666;
      background: #1a1a1a;
      padding: 1px 6px;
      border-radius: 10px;
    }

    .trend-chip:hover .chip-count {
      color: #b4451a;
    }

    .trends-divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 0;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 32px 64px;
    }

    .paper { border-bottom: 1px solid #1a1a1a; padding: 20px 0; }
    .paper:last-child { border-bottom: none; }

    .paper-title { font-size: 1.05rem; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .paper-title a { color: #d4845a; text-decoration: none; }
    .paper-title a:hover { text-decoration: underline; }
    .paper-authors { font-size: 0.85rem; color: #999; margin-bottom: 8px; }

    .paper-categories { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .paper-categories span {
      font-size: 0.75rem;
      background: #1e1e1e;
      color: #aaa;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #2a2a2a;
    }

    .paper-summary { font-size: 0.9rem; line-height: 1.6; color: #bbb; }
    .paper-summary.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .toggle-summary {
      background: none; border: none; color: #d4845a;
      cursor: pointer; font-size: 0.8rem; margin-top: 4px; padding: 0;
    }
    .toggle-summary:hover { text-decoration: underline; }

    .loading { text-align: center; padding: 80px 0; color: #666; font-size: 1rem; }
    .loading .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #333; border-top-color: #b4451a;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 80px 0; color: #e55; }

    /* ── Experiments List ── */
    .add-idea-bar {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 32px 0;
    }

    .add-idea-bar form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #151515;
      border: 1px solid #252525;
      border-radius: 10px;
      padding: 16px;
    }

    .add-idea-bar input,
    .add-idea-bar textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
    }

    .add-idea-bar input:focus,
    .add-idea-bar textarea:focus { outline: none; border-color: #b4451a; }

    .add-idea-bar textarea { min-height: 60px; }

    .btn-primary {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      background: #b4451a;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary:hover { background: #c9562a; }

    .ideas-list {
      max-width: 900px;
      margin: 0 auto;
      padding: 8px 32px 64px;
    }

    .idea-card {
      border-bottom: 1px solid #1a1a1a;
      padding: 20px 0;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      cursor: pointer;
      transition: background 0.1s;
      margin: 0 -8px;
      padding-left: 8px;
      padding-right: 8px;
      border-radius: 8px;
    }

    .idea-card:hover { background: #151515; }
    .idea-card:last-child { border-bottom: none; }

    .idea-content { flex: 1; min-width: 0; }
    .idea-title { font-size: 1.05rem; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .idea-desc { font-size: 0.9rem; line-height: 1.6; color: #bbb; white-space: pre-wrap; }
    .idea-meta { font-size: 0.75rem; color: #555; margin-top: 8px; }

    .idea-actions { display: flex; gap: 8px; flex-shrink: 0; padding-top: 2px; }
    .idea-actions button {
      background: none; border: none; color: #555;
      cursor: pointer; font-size: 0.8rem; padding: 4px;
    }
    .idea-actions button:hover { color: #ccc; }
    .idea-actions button.delete-btn:hover { color: #e55; }

    .empty-state { text-align: center; padding: 80px 0; color: #444; font-size: 0.95rem; }

    /* ── Experiment Detail ── */
    .exp-detail-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: calc(100vh - 73px);
      overflow: hidden;
    }

    .exp-left {
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .exp-left-top {
      padding: 16px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      gap: 8px;
    }

    .exp-left-top input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.85rem;
    }

    .exp-left-top input:focus { outline: none; border-color: #b4451a; }

    .btn-sm {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      background: #b4451a;
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-sm:hover { background: #c9562a; }

    .version-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .version-card {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.1s;
    }

    .version-card:hover { background: #151515; }
    .version-card.selected { background: #1a1a1a; border-color: #b4451a; }

    .version-card-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .status-dot.planned { background: #555; }
    .status-dot.running { background: #4a9eff; }
    .status-dot.completed { background: #4a9; }
    .status-dot.failed { background: #e55; }

    .version-card-notes {
      font-size: 0.8rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .version-card-meta {
      font-size: 0.7rem;
      color: #444;
      margin-top: 4px;
    }

    /* ── Version Popup ── */
    .version-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .version-popup {
      background: #181818;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
      width: 420px;
      max-width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }

    .version-popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .version-popup-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }

    .version-popup-close {
      background: none;
      border: none;
      color: #666;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .version-popup-close:hover { color: #ccc; }

    .version-popup label {
      display: block;
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 4px;
      margin-top: 14px;
    }

    .version-popup label:first-of-type { margin-top: 0; }

    .version-popup input,
    .version-popup textarea,
    .version-popup select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.85rem;
    }

    .version-popup input:focus,
    .version-popup textarea:focus,
    .version-popup select:focus { outline: none; border-color: #b4451a; }

    .version-popup textarea { resize: vertical; min-height: 50px; }

    .version-popup-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }

    .version-popup .save-indicator {
      font-size: 0.75rem;
      color: #4a9;
      margin-left: auto;
      align-self: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .version-popup .save-indicator.visible { opacity: 1; }

    .btn-danger {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #e55;
      background: none;
      color: #e55;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-danger:hover { background: #e55; color: #fff; }

    .btn-outline {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #444;
      background: none;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-outline:hover { border-color: #888; color: #fff; }

    /* ── SVG Tree Canvas ── */
    .exp-right {
      overflow: hidden;
      position: relative;
      background: #0d0d0d;
    }

    .exp-right svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    .exp-right svg:active { cursor: grabbing; }

    .tree-node { cursor: pointer; }
    .tree-node rect {
      rx: 8;
      ry: 8;
      stroke-width: 2;
      transition: stroke-opacity 0.15s;
    }
    .tree-node:hover rect { stroke-opacity: 1; }
    .tree-node text {
      fill: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .tree-edge {
      fill: none;
      stroke: #333;
      stroke-width: 2;
    }

    .canvas-hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 0.75rem;
      color: #333;
      pointer-events: none;
    }

    /* ── Paper Viewer ── */
    .paper-viewer-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 73px);
      overflow: hidden;
    }

    .paper-sidebar {
      border-right: 1px solid #222;
      padding: 24px;
      overflow-y: auto;
    }

    .paper-sidebar-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    .paper-meta-group {
      margin-bottom: 18px;
    }

    .paper-meta-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .paper-meta-value {
      font-size: 0.85rem;
      color: #bbb;
      line-height: 1.5;
    }

    .paper-meta-value a {
      color: #d4845a;
      text-decoration: none;
    }

    .paper-meta-value a:hover { text-decoration: underline; }

    .paper-sidebar-categories {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .paper-sidebar-categories span {
      font-size: 0.75rem;
      background: #1e1e1e;
      color: #aaa;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #2a2a2a;
    }

    .paper-sidebar-abstract {
      font-size: 0.85rem;
      line-height: 1.7;
      color: #999;
    }

    .paper-pdf-container {
      background: #111;
      overflow: hidden;
    }

    .paper-pdf-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .paper-pdf-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: #555;
      font-size: 0.95rem;
    }

    .paper-pdf-fallback a {
      color: #d4845a;
      text-decoration: none;
      padding: 10px 24px;
      border: 1px solid #d4845a;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .paper-pdf-fallback a:hover {
      background: rgba(180,69,26,0.15);
    }

    /* ── Paper Finder ── */
    .search-bar-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 32px 0;
    }

    .search-bar-form {
      display: flex;
      gap: 10px;
    }

    .search-bar-form input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #151515;
      color: #e0e0e0;
      font-size: 1rem;
    }

    .search-bar-form input:focus {
      outline: none;
      border-color: #b4451a;
    }

    .search-bar-form button {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      background: #b4451a;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    .search-bar-form button:hover { background: #c9562a; }

    .search-results {
      max-width: 700px;
      margin: 0 auto;
      padding: 8px 32px 64px;
    }

    .search-result-item {
      padding: 18px 0;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      transition: background 0.1s;
      margin: 0 -8px;
      padding-left: 8px;
      padding-right: 8px;
      border-radius: 6px;
    }

    .search-result-item:hover { background: #151515; }

    .search-result-title {
      font-size: 1rem;
      font-weight: 600;
      color: #d4845a;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .search-result-authors {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
    }

    .search-result-snippet {
      font-size: 0.83rem;
      color: #777;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .search-result-meta {
      font-size: 0.72rem;
      color: #444;
      margin-top: 6px;
    }

    .search-pagination {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 24px 0;
    }

    .search-pagination button {
      padding: 8px 20px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #151515;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .search-pagination button:hover { border-color: #b4451a; color: #fff; }
    .search-pagination button:disabled { opacity: 0.3; cursor: default; border-color: #333; color: #aaa; }
  </style>
</head>
<body>

  <!-- Home Grid View -->
  <div id="home-view">
    <div class="grid">
      <div class="grid-item" onclick="openArxiv()">
        <div class="grid-icon">📬</div>
        <div class="grid-label">arXiv Feed</div>
      </div>
      <div class="grid-item" onclick="openExperiments()">
        <div class="grid-icon">🧪</div>
        <div class="grid-label">Experiment Ideas</div>
      </div>
      <div class="grid-item" onclick="openPaperFinder()">
        <div class="grid-icon">🔍</div>
        <div class="grid-label">Paper Finder</div>
      </div>
      <div class="grid-item tbd"><div class="grid-icon">📁</div><div class="grid-label">TBD</div></div>
      <div class="grid-item tbd"><div class="grid-icon">📁</div><div class="grid-label">TBD</div></div>
      <div class="grid-item tbd"><div class="grid-icon">📁</div><div class="grid-label">TBD</div></div>
      <div class="grid-item tbd"><div class="grid-icon">📁</div><div class="grid-label">TBD</div></div>
      <div class="grid-item tbd"><div class="grid-icon">📁</div><div class="grid-label">TBD</div></div>
    </div>
  </div>

  <!-- arXiv Filter View -->
  <div id="arxiv-view" class="view">
    <div class="view-header">
      <div class="header-top">
        <button class="back-btn" onclick="goHome()">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Back
        </button>
        <h1>arXiv CS Feed Filter</h1>
      </div>
      <div class="controls">
        <input type="text" id="search" placeholder="Filter by keyword (title, authors, abstract)..." />
        <select id="category">
          <option value="">All Categories</option>
        </select>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="trends-panel" id="trends-panel" style="display:none">
      <div class="trends-section">
        <div class="trends-section-title">Trending Keywords</div>
        <div class="trends-chips" id="trend-keywords"></div>
      </div>
      <div class="trends-section">
        <div class="trends-section-title">Top Categories</div>
        <div class="trends-chips" id="trend-categories"></div>
      </div>
      <hr class="trends-divider">
    </div>
    <main id="papers">
      <div class="loading"><div class="spinner"></div><div>Loading arXiv CS feed...</div></div>
    </main>
  </div>

  <!-- Experiment Ideas List View -->
  <div id="experiments-view" class="view">
    <div class="view-header">
      <div class="header-top">
        <button class="back-btn" onclick="goHome()">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Back
        </button>
        <h1>Experiment Ideas</h1>
      </div>
    </div>
    <div class="add-idea-bar">
      <form id="idea-form">
        <input type="text" id="idea-title" placeholder="Experiment title..." required />
        <textarea id="idea-desc" placeholder="Description (optional)..."></textarea>
        <button type="submit" class="btn-primary" style="align-self:flex-end">Add Experiment</button>
      </form>
    </div>
    <div class="ideas-list" id="ideas-list"></div>
  </div>

  <!-- Paper Finder View -->
  <div id="finder-view" class="view">
    <div class="view-header">
      <div class="header-top">
        <button class="back-btn" onclick="goHome()">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Back
        </button>
        <h1>Paper Finder</h1>
      </div>
    </div>
    <div class="search-bar-wrap">
      <form class="search-bar-form" id="finder-form">
        <input type="text" id="finder-query" placeholder="Search arXiv papers..." autofocus />
        <button type="submit">Search</button>
      </form>
    </div>
    <div class="search-results" id="finder-results"></div>
  </div>

  <!-- Paper Viewer View -->
  <div id="paper-view" class="view">
    <div class="view-header">
      <div class="header-top">
        <button class="back-btn" id="paper-view-back" onclick="paperViewGoBack()">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Back
        </button>
        <h1 id="paper-view-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></h1>
      </div>
    </div>
    <div class="paper-viewer-layout">
      <div class="paper-sidebar" id="paper-sidebar"></div>
      <div class="paper-pdf-container" id="paper-pdf-container"></div>
    </div>
  </div>

  <!-- Experiment Detail View -->
  <div id="exp-detail-view" class="view">
    <div class="view-header">
      <div class="header-top">
        <button class="back-btn" onclick="openExperiments()">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Back
        </button>
        <h1 id="exp-detail-title"></h1>
      </div>
    </div>
    <div class="exp-detail-layout">
      <div class="exp-left">
        <div class="exp-left-top">
          <input type="text" id="new-version-name" placeholder="New version name..." />
          <button class="btn-sm" onclick="addVersion()">Add</button>
        </div>
        <div class="version-list" id="version-list"></div>
      </div>
      <div class="exp-right">
        <svg id="tree-svg"></svg>
        <div class="canvas-hint">Scroll to zoom &middot; Drag to pan</div>
      </div>
    </div>
  </div>

  <!-- Version Popup -->
  <div id="version-popup-overlay" class="version-popup-overlay" style="display:none" onclick="if(event.target===this)closeVersionPopup()">
    <div class="version-popup" id="version-popup"></div>
  </div>

  <script>
    // ── View management ──
    const BACK_ARROW = '<svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>';

    function hideAllViews() {
      document.getElementById('home-view').classList.add('hidden');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    }

    function goHome() {
      hideAllViews();
      document.getElementById('home-view').classList.remove('hidden');
      window.location.hash = '';
    }

    function openArxiv() {
      hideAllViews();
      document.getElementById('arxiv-view').classList.add('active');
      window.location.hash = 'arxiv';
      if (!feedLoaded) { feedLoaded = true; fetchFeed(); }
    }

    function openExperiments() {
      hideAllViews();
      document.getElementById('experiments-view').classList.add('active');
      window.location.hash = 'experiments';
      fetchExperiments();
    }

    function openExperimentDetail(id) {
      hideAllViews();
      document.getElementById('exp-detail-view').classList.add('active');
      window.location.hash = 'experiment/' + id;
      currentExpId = id;
      selectedVersionId = null;
      fetchExperimentDetail(id);
    }

    function openPaperFinder() {
      hideAllViews();
      document.getElementById('finder-view').classList.add('active');
      window.location.hash = 'finder';
      document.getElementById('finder-query').focus();
    }

    function routeFromHash() {
      const hash = window.location.hash;
      if (hash === '#arxiv') openArxiv();
      else if (hash === '#experiments') openExperiments();
      else if (hash === '#finder') openPaperFinder();
      else if (hash.startsWith('#experiment/')) openExperimentDetail(hash.slice('#experiment/'.length));
      else if (hash.startsWith('#paper/')) openPaper(parseInt(hash.slice('#paper/'.length), 10));
      else if (hash.startsWith('#view/')) openPaperByUrl(decodeURIComponent(hash.slice('#view/'.length)));
      else goHome();
    }

    window.addEventListener('hashchange', routeFromHash);
    // defer initial route to after DOM is ready
    setTimeout(routeFromHash, 0);

    // ── arXiv Feed ──
    let allPapers = [];
    let allCategories = new Set();
    let feedLoaded = false;

    async function fetchFeed() {
      try {
        const resp = await fetch('/feed');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        parseFeed(await resp.text());
      } catch (err) {
        document.getElementById('papers').innerHTML =
          `<div class="error"><p>Failed to load feed: ${err.message}</p>
           <p style="margin-top:8px;font-size:0.85rem;color:#888">Try refreshing or check your connection.</p></div>`;
      }
    }

    function parseFeed(xml) {
      const doc = new DOMParser().parseFromString(xml, 'text/xml');
      allPapers = Array.from(doc.querySelectorAll('item')).map(item => {
        const title = (item.querySelector('title')?.textContent || '').trim();
        const link = (item.querySelector('link')?.textContent || '').trim();
        const description = (item.querySelector('description')?.textContent || '').trim();
        const creators = item.getElementsByTagNameNS('http://purl.org/dc/elements/1.1/', 'creator');
        const authors = Array.from(creators).map(c => c.textContent.trim()).join(', ') || extractAuthors(description);
        const categories = Array.from(item.querySelectorAll('category')).map(c => c.textContent.trim());
        categories.forEach(c => allCategories.add(c));
        return { title, link, authors, categories, description: stripHtml(description) };
      });
      populateCategories();
      renderTrends();
      renderPapers();
    }

    // ── Trends extraction ──
    const STOP_WORDS = new Set([
      'a','an','the','and','or','but','in','on','at','to','for','of','with','by',
      'from','is','are','was','were','be','been','being','have','has','had','do',
      'does','did','will','would','could','should','may','might','shall','can',
      'this','that','these','those','it','its','we','our','they','their','he',
      'she','his','her','you','your','i','my','me','us','them','who','which',
      'what','where','when','how','not','no','nor','as','if','then','than',
      'so','up','out','about','into','over','after','before','between','under',
      'through','during','each','all','both','such','only','also','very','just',
      'more','most','other','some','any','new','one','two','using','via','based',
      'show','shows','shown','propose','proposed','paper','method','approach',
      'results','achieve','use','used','uses','however','first','well','given',
      'without','within','while','yet','across','among','along','per','non',
    ]);

    function extractKeywords(papers) {
      const freq = {};
      // Extract bigrams and meaningful unigrams from titles
      papers.forEach(p => {
        const words = p.title.toLowerCase().replace(/[^a-z0-9\s-]/g, '').split(/\s+/).filter(w => w.length > 2);
        // Unigrams
        words.forEach(w => {
          if (!STOP_WORDS.has(w)) freq[w] = (freq[w] || 0) + 1;
        });
        // Bigrams from titles (more meaningful phrases)
        for (let i = 0; i < words.length - 1; i++) {
          if (!STOP_WORDS.has(words[i]) && !STOP_WORDS.has(words[i+1])) {
            const bigram = words[i] + ' ' + words[i+1];
            freq[bigram] = (freq[bigram] || 0) + 1;
          }
        }
      });

      // Filter: must appear in at least 2 papers, prefer bigrams
      return Object.entries(freq)
        .filter(([k, v]) => v >= 2)
        .sort((a, b) => {
          // Boost bigrams slightly
          const aBoost = a[0].includes(' ') ? 1.5 : 1;
          const bBoost = b[0].includes(' ') ? 1.5 : 1;
          return (b[1] * bBoost) - (a[1] * aBoost);
        })
        .slice(0, 15);
    }

    function extractTopCategories(papers) {
      const freq = {};
      papers.forEach(p => p.categories.forEach(c => { freq[c] = (freq[c] || 0) + 1; }));
      return Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 8);
    }

    function renderTrends() {
      const panel = document.getElementById('trends-panel');
      if (!allPapers.length) { panel.style.display = 'none'; return; }
      panel.style.display = 'block';

      const keywords = extractKeywords(allPapers);
      const cats = extractTopCategories(allPapers);

      document.getElementById('trend-keywords').innerHTML = keywords.map(([kw, count]) =>
        `<span class="trend-chip" onclick="applyTrendFilter('${escapeHtml(kw)}')">${escapeHtml(kw)}<span class="chip-count">${count}</span></span>`
      ).join('');

      document.getElementById('trend-categories').innerHTML = cats.map(([cat, count]) =>
        `<span class="trend-chip" onclick="applyTrendCategory('${escapeHtml(cat)}')">${escapeHtml(cat)}<span class="chip-count">${count}</span></span>`
      ).join('');
    }

    function applyTrendFilter(keyword) {
      const input = document.getElementById('search');
      input.value = keyword;
      renderPapers();
      input.focus();
    }

    function applyTrendCategory(cat) {
      document.getElementById('category').value = cat;
      renderPapers();
    }

    // ── Paper Viewer (shared) ──
    let paperViewOrigin = 'arxiv'; // tracks where we came from

    function paperViewGoBack() {
      if (paperViewOrigin === 'finder') openPaperFinder();
      else openArxiv();
    }

    function showPaperView(paper, hashValue) {
      hideAllViews();
      document.getElementById('paper-view').classList.add('active');
      window.location.hash = hashValue;

      document.getElementById('paper-view-title').textContent = paper.title;

      const sidebar = document.getElementById('paper-sidebar');
      sidebar.innerHTML = `
        <div class="paper-sidebar-title">${escapeHtml(paper.title)}</div>
        ${paper.authors ? `
          <div class="paper-meta-group">
            <div class="paper-meta-label">Authors</div>
            <div class="paper-meta-value">${escapeHtml(paper.authors)}</div>
          </div>` : ''}
        ${paper.published ? `
          <div class="paper-meta-group">
            <div class="paper-meta-label">Published</div>
            <div class="paper-meta-value">${paper.published}</div>
          </div>` : ''}
        <div class="paper-meta-group">
          <div class="paper-meta-label">Link</div>
          <div class="paper-meta-value"><a href="${paper.link}" target="_blank" rel="noopener">${escapeHtml(paper.link)}</a></div>
        </div>
        ${paper.categories && paper.categories.length ? `
          <div class="paper-meta-group">
            <div class="paper-meta-label">Categories</div>
            <div class="paper-sidebar-categories">
              ${paper.categories.map(c => `<span>${escapeHtml(c)}</span>`).join('')}
            </div>
          </div>` : ''}
        <div class="paper-meta-group">
          <div class="paper-meta-label">Abstract</div>
          <div class="paper-sidebar-abstract">${escapeHtml(paper.description)}</div>
        </div>
      `;

      const pdfContainer = document.getElementById('paper-pdf-container');
      const pdfUrl = paper.link.replace('/abs/', '/pdf/');
      pdfContainer.innerHTML = `<iframe src="${pdfUrl}" title="PDF viewer"></iframe>`;
    }

    function openPaper(index) {
      paperViewOrigin = 'arxiv';
      const search = document.getElementById('search').value.toLowerCase();
      const category = document.getElementById('category').value;
      const filtered = allPapers.filter(p => {
        if (category && !p.categories.includes(category)) return false;
        if (search) {
          const h = `${p.title} ${p.authors} ${p.description}`.toLowerCase();
          return search.split(/\s+/).filter(Boolean).every(t => h.includes(t));
        }
        return true;
      });
      const paper = filtered[index];
      if (!paper) return;
      showPaperView(paper, 'paper/' + index);
    }

    function openPaperByUrl(url) {
      // Used by paper finder — we may not have full metadata yet, show what we have
      paperViewOrigin = 'finder';
      const cached = finderResultsCache.find(r => r.link === url);
      if (cached) {
        showPaperView(cached, 'view/' + encodeURIComponent(url));
      } else {
        // Minimal fallback
        showPaperView({ title: 'Paper', link: url, description: '', authors: '', categories: [] }, 'view/' + encodeURIComponent(url));
      }
    }

    // ── Paper Finder ──
    let finderResultsCache = [];
    let finderCurrentQuery = '';
    let finderCurrentStart = 0;

    document.getElementById('finder-form').addEventListener('submit', e => {
      e.preventDefault();
      finderCurrentStart = 0;
      finderCurrentQuery = document.getElementById('finder-query').value.trim();
      if (finderCurrentQuery) doFinderSearch();
    });

    async function doFinderSearch() {
      const container = document.getElementById('finder-results');
      container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Searching arXiv...</div></div>';
      try {
        const resp = await fetch(`/api/arxiv-search?q=${encodeURIComponent(finderCurrentQuery)}&start=${finderCurrentStart}&max_results=20`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const xml = await resp.text();
        parseFinderResults(xml);
      } catch (err) {
        container.innerHTML = `<div class="error"><p>Search failed: ${err.message}</p></div>`;
      }
    }

    function parseFinderResults(xml) {
      const doc = new DOMParser().parseFromString(xml, 'text/xml');
      const ns = 'http://www.w3.org/2005/Atom';
      const entries = doc.getElementsByTagNameNS(ns, 'entry');
      const totalStr = doc.getElementsByTagNameNS('http://a9.com/-/spec/opensearch/1.1/', 'totalResults')[0]?.textContent || '0';
      const total = parseInt(totalStr, 10);

      finderResultsCache = Array.from(entries).map(entry => {
        const title = (entry.getElementsByTagNameNS(ns, 'title')[0]?.textContent || '').trim().replace(/\s+/g, ' ');
        const summary = (entry.getElementsByTagNameNS(ns, 'summary')[0]?.textContent || '').trim().replace(/\s+/g, ' ');
        const published = (entry.getElementsByTagNameNS(ns, 'published')[0]?.textContent || '').slice(0, 10);
        const authors = Array.from(entry.getElementsByTagNameNS(ns, 'author'))
          .map(a => a.getElementsByTagNameNS(ns, 'name')[0]?.textContent?.trim() || '').join(', ');
        const links = entry.getElementsByTagNameNS(ns, 'link');
        let link = '';
        for (const l of links) {
          if (l.getAttribute('type') === 'text/html' || (!link && l.getAttribute('rel') === 'alternate')) {
            link = l.getAttribute('href') || '';
          }
        }
        if (!link) link = entry.getElementsByTagNameNS(ns, 'id')[0]?.textContent || '';
        const categories = Array.from(entry.getElementsByTagNameNS(ns, 'category'))
          .map(c => c.getAttribute('term')).filter(Boolean);
        // Also check arxiv namespace categories
        const arxivCats = entry.querySelectorAll('category');
        for (const c of arxivCats) {
          const t = c.getAttribute('term');
          if (t && !categories.includes(t)) categories.push(t);
        }
        return { title, description: summary, authors, link, published, categories };
      });

      const container = document.getElementById('finder-results');
      if (!finderResultsCache.length) {
        container.innerHTML = '<div class="empty-state">No results found.</div>';
        return;
      }

      container.innerHTML = finderResultsCache.map(r => `
        <div class="search-result-item" onclick="openPaperByUrl('${r.link}')">
          <div class="search-result-title">${escapeHtml(r.title)}</div>
          <div class="search-result-authors">${escapeHtml(r.authors)}</div>
          <div class="search-result-snippet">${escapeHtml(r.description)}</div>
          <div class="search-result-meta">${r.published}${r.categories.length ? ' &middot; ' + r.categories.slice(0,3).join(', ') : ''}</div>
        </div>
      `).join('') + `
        <div class="search-pagination">
          <button ${finderCurrentStart === 0 ? 'disabled' : ''} onclick="finderPrev()">Previous</button>
          <span style="color:#555;font-size:0.8rem;align-self:center">${finderCurrentStart + 1}&ndash;${finderCurrentStart + finderResultsCache.length} of ${total}</span>
          <button ${finderCurrentStart + 20 >= total ? 'disabled' : ''} onclick="finderNext()">Next</button>
        </div>
      `;
    }

    function finderPrev() {
      finderCurrentStart = Math.max(0, finderCurrentStart - 20);
      doFinderSearch();
    }

    function finderNext() {
      finderCurrentStart += 20;
      doFinderSearch();
    }

    function extractAuthors(desc) {
      const m = desc.match(/Authors?:\s*(.+?)(?:\.|<br|$)/i);
      return m ? m[1].trim() : '';
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    function populateCategories() {
      const select = document.getElementById('category');
      Array.from(allCategories).sort().forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat;
        select.appendChild(opt);
      });
    }

    function renderPapers() {
      const search = document.getElementById('search').value.toLowerCase();
      const category = document.getElementById('category').value;
      const filtered = allPapers.filter(p => {
        if (category && !p.categories.includes(category)) return false;
        if (search) {
          const h = `${p.title} ${p.authors} ${p.description}`.toLowerCase();
          return search.split(/\s+/).filter(Boolean).every(t => h.includes(t));
        }
        return true;
      });
      document.getElementById('stats').textContent = `Showing ${filtered.length} of ${allPapers.length} papers`;
      const container = document.getElementById('papers');
      if (!filtered.length) { container.innerHTML = '<div class="loading" style="color:#666">No papers match your filter.</div>'; return; }
      container.innerHTML = filtered.map((p, i) => `
        <div class="paper">
          <div class="paper-title"><a href="#" onclick="event.preventDefault(); openPaper(${i})">${escapeHtml(p.title)}</a></div>
          ${p.authors ? `<div class="paper-authors">${escapeHtml(p.authors)}</div>` : ''}
          ${p.categories.length ? `<div class="paper-categories">${p.categories.map(c => `<span>${escapeHtml(c)}</span>`).join('')}</div>` : ''}
          <div class="paper-summary collapsed" id="summary-${i}">${escapeHtml(p.description)}</div>
          ${p.description.length > 200 ? `<button class="toggle-summary" onclick="toggleSummary(${i}, this)">Show more</button>` : ''}
        </div>`).join('');
    }

    function toggleSummary(i, btn) {
      const el = document.getElementById(`summary-${i}`);
      const collapsed = el.classList.toggle('collapsed');
      btn.textContent = collapsed ? 'Show more' : 'Show less';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    let debounceTimer;
    document.getElementById('search').addEventListener('input', () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(renderPapers, 150); });
    document.getElementById('category').addEventListener('change', renderPapers);

    // ── Experiments List (server-backed) ──
    async function fetchExperiments() {
      const container = document.getElementById('ideas-list');
      container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading...</div></div>';
      try {
        const resp = await fetch('/api/experiments');
        const experiments = await resp.json();
        if (!experiments.length) {
          container.innerHTML = '<div class="empty-state">No experiments yet. Create one above.</div>';
          return;
        }
        container.innerHTML = experiments.map(exp => `
          <div class="idea-card" onclick="openExperimentDetail('${exp.id}')">
            <div class="idea-content">
              <div class="idea-title">${escapeHtml(exp.title)}</div>
              ${exp.desc ? `<div class="idea-desc">${escapeHtml(exp.desc)}</div>` : ''}
              <div class="idea-meta">${exp.versions ? exp.versions.length : 0} version(s) &middot; ${exp.created ? new Date(exp.created).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : ''}</div>
            </div>
            <div class="idea-actions">
              <button onclick="event.stopPropagation(); deleteExperiment('${exp.id}')" class="delete-btn" title="Delete">Delete</button>
            </div>
          </div>`).join('');
      } catch (err) {
        container.innerHTML = `<div class="error"><p>Failed to load experiments: ${err.message}</p></div>`;
      }
    }

    document.getElementById('idea-form').addEventListener('submit', async e => {
      e.preventDefault();
      const title = document.getElementById('idea-title').value.trim();
      const desc = document.getElementById('idea-desc').value.trim();
      if (!title) return;
      await fetch('/api/experiments', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ title, desc, created: Date.now() })
      });
      document.getElementById('idea-title').value = '';
      document.getElementById('idea-desc').value = '';
      fetchExperiments();
    });

    async function deleteExperiment(id) {
      if (!confirm('Delete this experiment and all its versions?')) return;
      await fetch(`/api/experiments/${id}`, { method: 'DELETE' });
      fetchExperiments();
    }

    // ── Experiment Detail ──
    let currentExpId = null;
    let currentExp = null;
    let selectedVersionId = null;
    let branchFromId = null; // when branching, set this to parent version id

    async function fetchExperimentDetail(id) {
      try {
        const resp = await fetch(`/api/experiments/${id}`);
        currentExp = await resp.json();
        document.getElementById('exp-detail-title').textContent = currentExp.title;
        renderVersionList();
        renderTree();
      } catch (err) {
        document.getElementById('version-list').innerHTML =
          `<div class="empty-state">Failed to load: ${err.message}</div>`;
      }
    }

    function renderVersionList() {
      const list = document.getElementById('version-list');
      const versions = currentExp.versions || [];
      if (!versions.length) {
        list.innerHTML = '<div class="empty-state" style="padding:40px 0;font-size:0.85rem">No versions yet.<br>Add one above.</div>';
      } else {
        list.innerHTML = versions.map(v => `
          <div class="version-card ${v.id === selectedVersionId ? 'selected' : ''}"
               onclick="selectVersion('${v.id}')">
            <div class="version-card-name">
              <span class="status-dot ${v.status || 'planned'}"></span>
              ${escapeHtml(v.name)}
            </div>
            ${v.notes ? `<div class="version-card-notes">${escapeHtml(v.notes)}</div>` : ''}
            <div class="version-card-meta">${v.status || 'planned'}${v.parentId ? ' &middot; from ' + escapeHtml(v.parentId) : ' &middot; root'}</div>
          </div>`).join('');
      }
    }

    function selectVersion(vid) {
      selectedVersionId = vid;
      renderVersionList();
      renderTree();
      openVersionPopup(vid);
    }

    // ── Version Popup ──
    let autoSaveTimer = null;

    function openVersionPopup(vid) {
      const v = (currentExp.versions || []).find(x => x.id === vid);
      if (!v) return;

      const popup = document.getElementById('version-popup');
      popup.innerHTML = `
        <div class="version-popup-header">
          <h2>${escapeHtml(v.name)}</h2>
          <button class="version-popup-close" onclick="closeVersionPopup()">&times;</button>
        </div>
        <label>Name</label>
        <input type="text" id="vd-name" value="${escapeHtml(v.name)}" />
        <label>Status</label>
        <select id="vd-status">
          <option value="planned" ${v.status==='planned'?'selected':''}>Planned</option>
          <option value="running" ${v.status==='running'?'selected':''}>Running</option>
          <option value="completed" ${v.status==='completed'?'selected':''}>Completed</option>
          <option value="failed" ${v.status==='failed'?'selected':''}>Failed</option>
        </select>
        <label>Notes</label>
        <textarea id="vd-notes" rows="3">${escapeHtml(v.notes || '')}</textarea>
        <label>Results</label>
        <textarea id="vd-results" rows="4">${escapeHtml(v.results || '')}</textarea>
        <div class="version-popup-actions">
          <button class="btn-outline" onclick="branchFrom('${v.id}'); closeVersionPopup()">Branch from this</button>
          <button class="btn-danger" onclick="deleteVersion('${v.id}')">Delete</button>
          <span class="save-indicator" id="save-indicator">Saved</span>
        </div>
      `;

      document.getElementById('version-popup-overlay').style.display = 'flex';

      // Auto-save on any change
      const fields = ['vd-name', 'vd-status', 'vd-notes', 'vd-results'];
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const evt = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(evt, () => scheduleAutoSave());
        // Save immediately on status change
        if (el.tagName === 'SELECT') {
          el.addEventListener('change', () => doAutoSave());
        }
      });
    }

    function closeVersionPopup() {
      // Flush any pending save
      if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; doAutoSave(); }
      document.getElementById('version-popup-overlay').style.display = 'none';
    }

    function scheduleAutoSave() {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => doAutoSave(), 600);
    }

    async function doAutoSave() {
      autoSaveTimer = null;
      if (!selectedVersionId || !currentExpId) return;
      const nameEl = document.getElementById('vd-name');
      if (!nameEl) return; // popup already closed

      const body = {
        name: nameEl.value.trim(),
        status: document.getElementById('vd-status').value,
        notes: document.getElementById('vd-notes').value,
        results: document.getElementById('vd-results').value
      };
      await fetch(`/api/experiments/${currentExpId}/versions/${selectedVersionId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });

      // Flash save indicator
      const ind = document.getElementById('save-indicator');
      if (ind) { ind.classList.add('visible'); setTimeout(() => ind.classList.remove('visible'), 1500); }

      // Refresh data in background (without closing popup)
      const resp = await fetch(`/api/experiments/${currentExpId}`);
      currentExp = await resp.json();
      renderVersionList();
      renderTree();
    }

    async function deleteVersion(vid) {
      if (!confirm('Delete this version?')) return;
      closeVersionPopup();
      await fetch(`/api/experiments/${currentExpId}/versions/${vid}`, { method: 'DELETE' });
      if (selectedVersionId === vid) selectedVersionId = null;
      await fetchExperimentDetail(currentExpId);
    }

    function branchFrom(parentId) {
      branchFromId = parentId;
      const input = document.getElementById('new-version-name');
      input.focus();
      input.placeholder = `Branch from "${parentId}"...`;
    }

    // Close popup on Escape
    window.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.getElementById('version-popup-overlay').style.display === 'flex') {
        closeVersionPopup();
      }
    });

    async function addVersion() {
      const input = document.getElementById('new-version-name');
      const name = input.value.trim();
      if (!name) return;
      const body = {
        name,
        parentId: branchFromId || null,
        status: 'planned',
        created: Date.now()
      };
      await fetch(`/api/experiments/${currentExpId}/versions`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      input.value = '';
      input.placeholder = 'New version name...';
      branchFromId = null;
      await fetchExperimentDetail(currentExpId);
    }

    // Allow Enter key in new version input
    document.getElementById('new-version-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addVersion(); }
    });

    // ── SVG Tree Rendering ──
    const NODE_W = 140;
    const NODE_H = 44;
    const H_GAP = 30;
    const V_GAP = 70;

    let svgPan = { x: 0, y: 0 };
    let svgZoom = 1;
    let dragging = false;
    let dragStart = { x: 0, y: 0 };

    function renderTree() {
      const svg = document.getElementById('tree-svg');
      const versions = currentExp?.versions || [];

      if (!versions.length) {
        svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="#333" font-size="14" font-family="inherit">Add a version to see the tree</text>`;
        return;
      }

      // Build tree structure
      const byId = {};
      versions.forEach(v => { byId[v.id] = { ...v, children: [] }; });

      const roots = [];
      versions.forEach(v => {
        if (v.parentId && byId[v.parentId]) {
          byId[v.parentId].children.push(byId[v.id]);
        } else {
          roots.push(byId[v.id]);
        }
      });

      // Layout: assign x,y to each node using a simple recursive algorithm
      let nextX = 0;

      function layoutNode(node, depth) {
        node._depth = depth;
        if (node.children.length === 0) {
          node._x = nextX;
          node._y = depth;
          nextX++;
        } else {
          node.children.forEach(c => layoutNode(c, depth + 1));
          const first = node.children[0]._x;
          const last = node.children[node.children.length - 1]._x;
          node._x = (first + last) / 2;
          node._y = depth;
        }
      }

      roots.forEach(r => layoutNode(r, 0));

      // Convert to pixel coords
      const allNodes = Object.values(byId);
      const padding = 60;

      allNodes.forEach(n => {
        n._px = padding + n._x * (NODE_W + H_GAP) + NODE_W / 2;
        n._py = padding + n._y * (NODE_H + V_GAP) + NODE_H / 2;
      });

      const statusColor = {
        planned: '#555',
        running: '#4a9eff',
        completed: '#4a9',
        failed: '#e55'
      };

      // Build SVG content
      let edges = '';
      allNodes.forEach(n => {
        if (n.parentId && byId[n.parentId]) {
          const p = byId[n.parentId];
          const x1 = p._px, y1 = p._py + NODE_H / 2;
          const x2 = n._px, y2 = n._py - NODE_H / 2;
          const midY = (y1 + y2) / 2;
          edges += `<path class="tree-edge" d="M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}" />`;
        }
      });

      let nodes = '';
      allNodes.forEach(n => {
        const x = n._px - NODE_W / 2;
        const y = n._py - NODE_H / 2;
        const color = statusColor[n.status] || '#555';
        const isSelected = n.id === selectedVersionId;
        nodes += `
          <g class="tree-node" onclick="selectVersion('${n.id}')">
            <rect x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}"
                  fill="#181818" stroke="${color}" stroke-opacity="${isSelected ? 1 : 0.5}" />
            <circle cx="${x + 14}" cy="${n._py}" r="4" fill="${color}" />
            <text x="${x + 24}" y="${n._py + 4}" font-size="12" clip-path="url(#node-clip-${n.id})">
              ${escapeHtml(n.name.length > 12 ? n.name.slice(0, 12) + '...' : n.name)}
            </text>
          </g>`;
      });

      const transform = `translate(${svgPan.x},${svgPan.y}) scale(${svgZoom})`;
      svg.innerHTML = `<g id="tree-root" transform="${transform}">${edges}${nodes}</g>`;
    }

    // Pan & zoom
    (function setupPanZoom() {
      const svg = document.getElementById('tree-svg');

      svg.addEventListener('mousedown', e => {
        if (e.target.closest('.tree-node')) return;
        dragging = true;
        dragStart = { x: e.clientX - svgPan.x, y: e.clientY - svgPan.y };
      });

      window.addEventListener('mousemove', e => {
        if (!dragging) return;
        svgPan.x = e.clientX - dragStart.x;
        svgPan.y = e.clientY - dragStart.y;
        const root = document.getElementById('tree-root');
        if (root) root.setAttribute('transform', `translate(${svgPan.x},${svgPan.y}) scale(${svgZoom})`);
      });

      window.addEventListener('mouseup', () => { dragging = false; });

      svg.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newZoom = Math.min(3, Math.max(0.2, svgZoom * delta));

        // Zoom towards mouse position
        const rect = svg.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        svgPan.x = mx - (mx - svgPan.x) * (newZoom / svgZoom);
        svgPan.y = my - (my - svgPan.y) * (newZoom / svgZoom);
        svgZoom = newZoom;

        const root = document.getElementById('tree-root');
        if (root) root.setAttribute('transform', `translate(${svgPan.x},${svgPan.y}) scale(${svgZoom})`);
      }, { passive: false });
    })();
  </script>
</body>
</html>
