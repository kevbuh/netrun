          hover: 'var(--bg-hover)',
          card: 'var(--bg-card)',
          input: 'var(--bg-input)',
          'input-alt': 'var(--bg-input-alt)',
          'border-card': 'var(--border-card)',
          'border-input': 'var(--border-input)',
          'border-subtle': 'var(--border-subtle)',
          'border-dim': 'var(--border-dim)',
          header: 'var(--bg-header)',
          canvas: 'var(--bg-canvas)',

          authors: 'var(--text-authors)',

      }
    }
  }
  </script>
  <link rel="stylesheet" href="/styles.css">
  <script>
    // Apply theme + accent before paint to prevent flash
    (function() {
      var t = localStorage.getItem('theme');
      if (t && t !== 'dark') document.documentElement.setAttribute('data-theme', t);
      var a = localStorage.getItem('accentColor');
      if (a) {
        var r = parseInt(a.slice(1,3),16), g = parseInt(a.slice(3,5),16), b = parseInt(a.slice(5,7),16);
        var h = '#' + [Math.min(255,r+20),Math.min(255,g+20),Math.min(255,b+20)].map(function(v){return v.toString(16).padStart(2,'0')}).join('');
        document.documentElement.style.setProperty('--accent', a);
        document.documentElement.style.setProperty('--accent-hover', h);
      }
    })();
  </script>

  <!-- Home Main Content -->

      <div id="search-arxiv-results"></div>

  <!-- Calendar View -->

      <div id="calendar-view-content"></div>

    <div class="px-6 pt-4">

    </div>
  </div>

  <!-- Whiteboard View -->
  <div id="whiteboard-view" class="hidden ml-[60px] view" style="height:100vh;overflow:hidden">
    <div class="wb-toolbar">
      <input type="color" id="wb-color" value="#ffffff" title="Brush color">
      <label class="text-[0.78rem] text-muted flex items-center gap-1.5">Size
        <input type="range" id="wb-size" min="1" max="30" value="3" class="wb-size-slider">
        <span id="wb-size-label" class="text-[0.72rem] text-dim w-5 text-right">3</span>
