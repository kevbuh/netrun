<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>alpha</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          body: 'var(--bg-body)',
          primary: 'var(--text-primary)',
          white_: 'var(--text-white)',
          muted: 'var(--text-muted)',
          dim: 'var(--text-dim)',
          dimmer: 'var(--text-dimmer)',
          dimmest: 'var(--text-dimmest)',
          sidebar: 'var(--bg-sidebar)',
          'border-sidebar': 'var(--border-sidebar)',
          hover: 'var(--bg-hover)',
          card: 'var(--bg-card)',
          input: 'var(--bg-input)',
          'input-alt': 'var(--bg-input-alt)',
          'border-card': 'var(--border-card)',
          'border-input': 'var(--border-input)',
          'border-subtle': 'var(--border-subtle)',
          'border-dim': 'var(--border-dim)',
          header: 'var(--bg-header)',
          canvas: 'var(--bg-canvas)',
          popup: 'var(--bg-popup)',
          'chip-count': 'var(--bg-chip-count)',
          'cat-tag': 'var(--bg-cat-tag)',
          'cat-tag-color': 'var(--bg-cat-tag-color)',
          cite: 'var(--bg-cite)',
          'sidebar-cat': 'var(--bg-sidebar-cat)',
          'sidebar-cat-border': 'var(--sidebar-cat-border)',
          'sidebar-cat-color': 'var(--sidebar-cat-color)',
          link: 'var(--text-link)',
          accent: 'var(--accent)',
          'accent-hover': 'var(--accent-hover)',
          summary: 'var(--text-summary)',
          authors: 'var(--text-authors)',
          'meta-value': 'var(--text-meta-value)',
          'idea-desc': 'var(--text-idea-desc)',
          'tree-edge': 'var(--tree-edge)',
          'spinner-border': 'var(--spinner-border)',
          tooltip: 'var(--tooltip-bg)',
          'tooltip-border': 'var(--tooltip-border)',
          overlay: 'var(--overlay-bg)',
        },
        boxShadow: {
          card: '0 6px 20px var(--shadow-card)',
          popup: '0 16px 48px var(--shadow-popup)',
        },
      }
    }
  }
  </script>
  <style>
    :root {
      --bg-body: #0a0a0a;
      --text-primary: #e0e0e0;
      --text-white: #fff;
      --text-muted: #888;
      --text-dim: #666;
      --text-dimmer: #555;
      --text-dimmest: #444;
      --bg-sidebar: #111;
      --border-sidebar: #1a1a1a;
      --bg-hover: #1e1e1e;
      --bg-card: #151515;
      --bg-input: #1a1a1a;
      --bg-input-alt: #151515;
      --border-card: #222;
      --border-input: #333;
      --border-subtle: #252525;
      --border-dim: #1a1a1a;
      --bg-header: #111;
      --bg-canvas: #0d0d0d;
      --bg-popup: #181818;
      --bg-chip-count: #1a1a1a;
      --bg-cat-tag: #1a1a1a;
      --bg-cat-tag-color: #999;
      --bg-cite: #1e1209;
      --bg-sidebar-cat: #1e1e1e;
      --sidebar-cat-border: #2a2a2a;
      --sidebar-cat-color: #aaa;
      --text-link: #d4845a;
      --accent: #b4451a;
      --accent-hover: #c9562a;
      --text-summary: #999;
      --text-authors: #888;
      --text-meta-value: #bbb;
      --text-idea-desc: #bbb;
      --shadow-card: rgba(0,0,0,0.3);
      --shadow-popup: rgba(0,0,0,0.5);
      --overlay-bg: rgba(0,0,0,0.5);
      --tree-edge: #333;
      --spinner-border: #333;
      --tooltip-bg: #222;
      --tooltip-border: #333;
    }

    [data-theme="light"] {
      --bg-body: #f5f5f5;
      --text-primary: #333;
      --text-white: #111;
      --text-muted: #666;
      --text-dim: #888;
      --text-dimmer: #999;
      --text-dimmest: #aaa;
      --bg-sidebar: #fff;
      --border-sidebar: #e0e0e0;
      --bg-hover: #f0f0f0;
      --bg-card: #fff;
      --bg-input: #f8f8f8;
      --bg-input-alt: #fff;
      --border-card: #e0e0e0;
      --border-input: #ccc;
      --border-subtle: #e0e0e0;
      --border-dim: #eee;
      --bg-header: #fff;
      --bg-canvas: #fafafa;
      --bg-popup: #fff;
      --bg-chip-count: #f0f0f0;
      --bg-cat-tag: #f0f0f0;
      --bg-cat-tag-color: #666;
      --bg-cite: #fef3ec;
      --bg-sidebar-cat: #f5f5f5;
      --sidebar-cat-border: #e0e0e0;
      --sidebar-cat-color: #666;
      --text-link: #b4451a;
      --accent: #b4451a;
      --accent-hover: #c9562a;
      --text-summary: #666;
      --text-authors: #777;
      --text-meta-value: #555;
      --text-idea-desc: #555;
      --shadow-card: rgba(0,0,0,0.08);
      --shadow-popup: rgba(0,0,0,0.15);
      --overlay-bg: rgba(0,0,0,0.3);
      --tree-edge: #ccc;
      --spinner-border: #ccc;
      --tooltip-bg: #fff;
      --tooltip-border: #ddd;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Sidebar tooltip (parent-hover child reveal) ── */
    .sidebar-icon .sidebar-tooltip { display: none; }
    .sidebar-icon:hover .sidebar-tooltip { display: block; }

    /* ── Sidebar active inset shadow ── */
    .sidebar-icon.active {
      background: var(--bg-hover);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    /* ── CSS columns masonry ── */
    main {
      columns: 4;
      column-gap: 14px;
    }
    @media (max-width: 1400px) { main { columns: 3; } }
    @media (max-width: 900px) { main { columns: 2; } }
    @media (max-width: 560px) { main { columns: 1; } }

    #finder-results-masonry {
      columns: 4;
      column-gap: 14px;
    }
    @media (max-width: 1400px) { #finder-results-masonry { columns: 3; } }
    @media (max-width: 1000px) { #finder-results-masonry { columns: 2; } }
    @media (max-width: 600px) { #finder-results-masonry { columns: 1; } }
    #finder-results-masonry:empty { display: none; }

    /* ── Abstract hover tooltip ── */
    #abstract-tooltip {
      display: none;
      position: fixed;
      z-index: 9999;
      background: var(--bg-popup);
      border: 1px solid var(--border-input);
      border-radius: 10px;
      padding: 12px 14px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.5);
      max-width: 400px;
      pointer-events: none;
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--text-summary);
    }

    /* ── Spinner animation ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid var(--spinner-border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }

    /* ── SVG Tree ── */
    .tree-node { cursor: pointer; }
    .tree-node rect {
      rx: 8; ry: 8; stroke-width: 2;
      transition: stroke-opacity 0.15s;
    }
    .tree-node:hover rect { stroke-opacity: 1; }
    .tree-node text {
      fill: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .tree-edge {
      fill: none;
      stroke: var(--tree-edge);
      stroke-width: 2;
    }

    /* ── Finder pagination column span ── */
    .finder-pagination {
      column-span: all;
    }

    /* ── Paper card hover effects ── */
    .paper:hover {
      border-color: var(--border-input);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow-card);
    }

    /* ── Status dot colors ── */
    .status-dot.planned { background: #555; }
    .status-dot.running { background: #4a9eff; }
    .status-dot.completed { background: #4a9; }
    .status-dot.failed { background: #e55; }

    /* ── Version card selected state ── */
    .version-card.selected {
      background: var(--bg-input);
      border-color: var(--accent);
    }

    /* ── Trend chip hover effects ── */
    .trend-chip:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--text-white);
    }
    .trend-chip:hover .chip-count {
      color: var(--accent);
    }

    /* ── SVG cursor states ── */
    .exp-right svg { cursor: grab; }
    .exp-right svg:active { cursor: grabbing; }
  </style>
</head>
<body class="font-[-apple-system,BlinkMacSystemFont,'Segoe_UI',Roboto,sans-serif] bg-body text-primary min-h-screen">

  <div id="abstract-tooltip"></div>

  <nav class="w-[60px] bg-sidebar border-r border-border-sidebar flex flex-col items-center py-4 gap-1 fixed top-0 left-0 bottom-0 z-20">
    <button class="sidebar-icon active w-11 h-11 rounded-xl flex items-center justify-center cursor-pointer transition-colors duration-150 relative border-none bg-transparent text-primary hover:bg-hover" id="sb-home" onclick="goHome()">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 2l5 5h-5V4zM6 20V4h5v7h7v9H6z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">Latest Papers</span>
    </button>
    <button class="sidebar-icon w-11 h-11 rounded-xl flex items-center justify-center cursor-pointer transition-colors duration-150 relative border-none bg-transparent text-primary hover:bg-hover" id="sb-experiments" onclick="openExperiments()">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M7 2v2h1v7.15L5.03 17.49C4.08 19.3 5.36 21.5 7.41 21.5h9.18c2.05 0 3.33-2.2 2.38-4.01L16 11.15V4h1V2H7zm7 9.85l2.88 5.15H7.12L10 11.85V4h4v7.85z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">Experiments</span>
    </button>
    <div class="w-7 h-px bg-border-subtle my-1.5"></div>
    <button class="sidebar-icon w-11 h-11 rounded-xl flex items-center justify-center relative border-none bg-transparent text-primary opacity-30 cursor-default" disabled>
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">TBD</span>
    </button>
    <button class="sidebar-icon w-11 h-11 rounded-xl flex items-center justify-center relative border-none bg-transparent text-primary opacity-30 cursor-default" disabled>
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">TBD</span>
    </button>
    <button class="sidebar-icon w-11 h-11 rounded-xl flex items-center justify-center relative border-none bg-transparent text-primary opacity-30 cursor-default" disabled>
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">TBD</span>
    </button>
  </nav>

  <!-- Home Main Content -->
  <div class="flex-1 ml-[60px] px-6 pt-6" id="home-main">
    <div class="mb-5">
        <form id="finder-form">
          <div class="relative max-w-[680px] mx-auto">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-dimmer pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
            <input type="text" id="finder-query" placeholder="Search papers..." autocomplete="off" class="w-full pl-11 pr-5 py-3 rounded-2xl border border-border-input bg-card text-primary text-[0.95rem] focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all" />
          </div>
        </form>
      </div>
      <div id="finder-results-masonry" class="pb-16"></div>

      <div id="home-feed-section">
        <input type="hidden" id="search" value="" />
        <select id="category" style="display:none"><option value="">All Categories</option></select>
        <div class="text-[0.8rem] text-dim py-1 pb-3" id="stats"></div>
        <div id="trends-panel" style="display:none" class="pb-3 flex items-center gap-2 overflow-x-auto">
          <button class="sort-btn shrink-0 px-3.5 py-1.5 rounded-lg border border-border-input bg-card text-muted text-[0.82rem] cursor-pointer transition-all duration-150 whitespace-nowrap hover:border-accent hover:text-primary active" id="sort-latest" onclick="setSortMode('latest')">Latest</button>
          <button class="sort-btn shrink-0 px-3.5 py-1.5 rounded-lg border border-border-input bg-card text-muted text-[0.82rem] cursor-pointer transition-all duration-150 whitespace-nowrap hover:border-accent hover:text-primary" id="sort-citations" onclick="setSortMode('citations')">Most Cited</button>
          <span class="w-px h-5 bg-border-dim mx-1 shrink-0"></span>
          <div class="flex gap-1.5 shrink-0" id="trend-categories"></div>
        </div>
        <main id="papers" class="pb-16">
          <div class="text-center py-20 text-dim text-base"><div class="spinner"></div><div>Loading arXiv CS feed...</div></div>
        </main>
      </div>
  </div>

  <!-- Experiment Ideas List View -->
  <div id="experiments-view" class="hidden ml-[60px] view">
    <div class="px-8 py-6 border-b border-border-card bg-header sticky top-0 z-10">
      <div class="flex items-center gap-4">
        <button class="bg-transparent border-none text-muted text-[0.9rem] cursor-pointer p-0 inline-flex items-center gap-1.5 hover:text-primary" onclick="goHome()">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Back
        </button>
        <h1 class="text-[1.4rem] font-semibold text-white_">Experiments</h1>
        <button class="ml-auto px-4 py-2 rounded-md border-none bg-accent text-white text-[0.9rem] font-medium cursor-pointer hover:bg-accent-hover inline-flex items-center gap-1.5" onclick="createRandomExperiment()">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          New Experiment
        </button>
      </div>
    </div>
    <div class="max-w-[900px] mx-auto px-8 py-2 pb-16" id="ideas-list"></div>
  </div>

  <!-- Paper Viewer View -->
  <div id="paper-view" class="hidden ml-[60px] view">
    <div class="grid grid-cols-[320px_1fr] h-screen overflow-hidden">
      <div class="border-r border-border-card p-6 overflow-y-auto" id="paper-sidebar"></div>
      <div class="bg-header overflow-hidden" id="paper-pdf-container"></div>
    </div>
  </div>

  <!-- Experiment Detail View -->
  <div id="exp-detail-view" class="hidden ml-[60px] view">
    <div class="px-8 py-6 border-b border-border-card bg-header sticky top-0 z-10">
      <div class="flex items-center gap-4">
        <button class="bg-transparent border-none text-muted text-[0.9rem] cursor-pointer p-0 inline-flex items-center gap-1.5 hover:text-primary" onclick="openExperiments()">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Back
        </button>
        <h1 id="exp-detail-title" class="text-[1.4rem] font-semibold text-white_ cursor-pointer hover:text-accent transition-colors" onclick="startRenameExperiment()" title="Click to rename"></h1>
      </div>
    </div>
    <div class="grid grid-cols-[340px_1fr] h-[calc(100vh-73px)] overflow-hidden">
      <div class="border-r border-border-card flex flex-col overflow-hidden">
        <div class="p-4 border-b border-border-dim flex gap-2">
          <input type="text" id="new-version-name" placeholder="New version name..." class="flex-1 px-3 py-2 rounded-md border border-border-input bg-input text-primary text-[0.85rem] focus:outline-none focus:border-accent" />
          <button class="px-3.5 py-1.5 rounded-md border-none bg-accent text-white text-[0.8rem] cursor-pointer whitespace-nowrap hover:bg-accent-hover" onclick="addVersion()">Add</button>
        </div>
        <div class="flex-1 overflow-y-auto p-2" id="version-list"></div>
        <div class="border-t border-border-dim">
          <div class="p-3 flex items-center justify-between">
            <span class="text-[0.75rem] font-semibold text-dimmer uppercase tracking-wide">Files</span>
            <div class="flex gap-2">
              <button class="text-[0.75rem] text-muted hover:text-primary cursor-pointer bg-transparent border-none" onclick="createExpFile('md')">.md</button>
              <button class="text-[0.75rem] text-muted hover:text-primary cursor-pointer bg-transparent border-none" onclick="createExpFile('ipynb')">.ipynb</button>
            </div>
          </div>
          <div class="overflow-y-auto max-h-[200px] px-2 pb-2" id="exp-file-list"></div>
        </div>
      </div>
      <div class="exp-right overflow-hidden relative bg-canvas" id="exp-right-panel">
        <svg id="tree-svg" class="w-full h-full"></svg>
        <div class="absolute bottom-4 right-4 text-[0.75rem] text-tree-edge pointer-events-none" id="tree-hint">Scroll to zoom &middot; Drag to pan</div>
      </div>
    </div>
  </div>

  <!-- Version Popup -->
  <div id="version-popup-overlay" class="fixed inset-0 bg-overlay z-[100] flex items-center justify-center" style="display:none" onclick="if(event.target===this)closeVersionPopup()">
    <div class="bg-popup border border-border-input rounded-xl p-6 w-[420px] max-w-[90vw] max-h-[85vh] overflow-y-auto shadow-popup" id="version-popup"></div>
  </div>

  <script>
    // ── View management ──
    const BACK_ARROW = '<svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>';
    const ARXIV_LOGO = '<img class="absolute top-2.5 right-2.5 h-4 w-auto opacity-30" src="/arxiv-logomark-small@2x.png" alt="arXiv" />';
    const HN_LOGO = '<svg class="absolute top-2.5 right-2.5 h-4 w-auto opacity-40" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect fill="#f60" width="256" height="256" rx="24"/><text x="128" y="180" text-anchor="middle" fill="#fff" font-size="160" font-weight="bold" font-family="Verdana,sans-serif">Y</text></svg>';

    function setSidebarActive(id) {
      document.querySelectorAll('.sidebar-icon').forEach(b => b.classList.remove('active'));
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    }

    function hideAllViews() {
      document.getElementById('home-main').style.display = 'none';
      document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.style.display = ''; });
    }

    function goHome() {
      document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.style.display = ''; });
      document.getElementById('home-main').style.display = '';
      window.location.hash = '';
      setSidebarActive('sb-home');
    }

    function openExperiments() {
      hideAllViews();
      const view = document.getElementById('experiments-view');
      view.classList.add('active');
      view.style.display = 'block';
      window.location.hash = 'experiments';
      setSidebarActive('sb-experiments');
      fetchExperiments();
    }

    function openExperimentDetail(id) {
      hideAllViews();
      const view = document.getElementById('exp-detail-view');
      view.classList.add('active');
      view.style.display = 'block';
      window.location.hash = 'experiment/' + id;
      setSidebarActive('sb-experiments');
      currentExpId = id;
      selectedVersionId = null;
      fetchExperimentDetail(id);
    }

    function routeFromHash() {
      const hash = window.location.hash;
      if (hash === '#experiments') openExperiments();
      else if (hash.startsWith('#experiment/')) openExperimentDetail(hash.slice('#experiment/'.length));
      else if (hash.startsWith('#paper/')) openPaper(parseInt(hash.slice('#paper/'.length), 10));
      else if (hash.startsWith('#view/')) openPaperByUrl(decodeURIComponent(hash.slice('#view/'.length)));
      else goHome();
    }

    window.addEventListener('hashchange', routeFromHash);
    setTimeout(routeFromHash, 0);

    // ── arXiv Feed (loads on startup) ──
    let allPapers = [];
    let allCategories = new Set();
    let citationMap = {};
    let currentSort = 'latest';
    const PAGE_SIZE = 20;
    let visibleCount = PAGE_SIZE;
    loadAllFeeds();

    function setSortMode(mode) {
      currentSort = mode;
      document.getElementById('sort-latest').classList.toggle('active', mode === 'latest');
      document.getElementById('sort-citations').classList.toggle('active', mode === 'citations');
      visibleCount = PAGE_SIZE;
      renderPapers();
    }

    async function fetchFeed() {
      try {
        const resp = await fetch('/feed');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        parseFeed(await resp.text());
      } catch (err) {
        document.getElementById('papers').innerHTML =
          `<div class="text-center py-20 text-red-400"><p>Failed to load feed: ${err.message}</p>
           <p class="mt-2 text-[0.85rem] text-muted">Try refreshing or check your connection.</p></div>`;
      }
    }

    async function fetchHNFeed() {
      try {
        const resp = await fetch('/hn-feed');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const stories = await resp.json();
        return stories.map(s => {
          const url = s.url || `https://news.ycombinator.com/item?id=${s.id}`;
          const ts = s.time ? new Date(s.time * 1000) : null;
          const dateStr = ts ? ts.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
          const pubDate = ts ? ts.toUTCString() : '';
          return {
            source: 'hn',
            title: s.title || '',
            link: url,
            authors: s.by || '',
            categories: [],
            description: '',
            date: dateStr,
            pubDate,
            arxivId: null,
            hnScore: s.score || 0,
            hnComments: s.descendants || 0,
            hnId: s.id
          };
        });
      } catch (e) {
        return [];
      }
    }

    async function loadAllFeeds() {
      const [, hnItems] = await Promise.all([fetchFeed(), fetchHNFeed()]);
      if (hnItems.length) {
        allPapers = allPapers.concat(hnItems);
        renderTrends();
        renderPapers();
      }
    }

    function extractArxivId(link) {
      const m = link.match(/arxiv\.org\/abs\/(\d+\.\d+)/);
      return m ? m[1] : null;
    }

    function parseFeed(xml) {
      const doc = new DOMParser().parseFromString(xml, 'text/xml');
      allPapers = Array.from(doc.querySelectorAll('item')).map(item => {
        const title = (item.querySelector('title')?.textContent || '').trim();
        const link = (item.querySelector('link')?.textContent || '').trim();
        const description = (item.querySelector('description')?.textContent || '').trim();
        const creators = item.getElementsByTagNameNS('http://purl.org/dc/elements/1.1/', 'creator');
        const authors = Array.from(creators).map(c => c.textContent.trim()).join(', ') || extractAuthors(description);
        const categories = Array.from(item.querySelectorAll('category')).map(c => c.textContent.trim());
        categories.forEach(c => allCategories.add(c));
        const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
        const dateStr = pubDate ? new Date(pubDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
        const arxivId = extractArxivId(link);
        return { source: 'arxiv', title, link, authors, categories, description: stripHtml(description), date: dateStr, pubDate, arxivId };
      });
      populateCategories();
      renderTrends();
      renderPapers();
    }

    async function fetchCitationsFor(papers) {
      const ids = papers.map(p => p.arxivId).filter(Boolean).filter(id => citationMap[id] === undefined);
      if (!ids.length) return;
      try {
        const resp = await fetch('/api/citations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids })
        });
        if (resp.ok) {
          const data = await resp.json();
          Object.assign(citationMap, data);
          for (const p of papers) {
            if (p.arxivId && citationMap[p.arxivId] !== undefined) {
              p.citations = citationMap[p.arxivId];
            }
          }
          renderPapers();
        }
      } catch (e) { /* silently fail */ }
    }

    // ── Trends extraction ──
    function extractTopCategories(papers) {
      const freq = {};
      papers.forEach(p => p.categories.forEach(c => { freq[c] = (freq[c] || 0) + 1; }));
      return Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 8);
    }

    function renderTrends() {
      const panel = document.getElementById('trends-panel');
      if (!allPapers.length) { panel.style.display = 'none'; return; }
      panel.style.display = 'flex';

      const cats = extractTopCategories(allPapers);

      document.getElementById('trend-categories').innerHTML = cats.map(([cat, count]) =>
        `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full border border-border-subtle bg-card text-primary text-[0.8rem] cursor-pointer transition-all duration-150 whitespace-nowrap shrink-0 trend-chip" onclick="applyTrendCategory('${escapeHtml(cat)}')">${escapeHtml(cat)}<span class="chip-count text-[0.7rem] text-dim bg-chip-count px-1.5 py-px rounded-full">${count}</span></span>`
      ).join('');
    }

    function applyTrendCategory(cat) {
      document.getElementById('category').value = cat;
      renderPapers();
    }

    function openPaper(index) {

      showPaperView(paper, 'paper/' + index);
    }

    function openPaperByUrl(url) {
      paperViewOrigin = 'finder';
      const cached = finderResultsCache.find(r => r.link === url);
      if (cached) {
        showPaperView(cached, 'view/' + encodeURIComponent(url));
      } else {
        showPaperView({ title: 'Paper', link: url, description: '', authors: '', categories: [] }, 'view/' + encodeURIComponent(url));
      }
    }

    // ── Auto-focus search on keypress ──
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (document.getElementById('home-main').style.display === 'none') return;
      if (e.key.length === 1 && /[a-zA-Z0-9]/.test(e.key)) {
        document.getElementById('finder-query').focus();
      }
    });

    // ── Paper Finder ──
    let finderResultsCache = [];
    let finderCurrentQuery = '';
    let finderCurrentStart = 0;

    document.getElementById('finder-form').addEventListener('submit', e => {
      e.preventDefault();
      finderCurrentStart = 0;
      finderCurrentQuery = document.getElementById('finder-query').value.trim();
      if (finderCurrentQuery) doFinderSearch();
    });

    document.getElementById('finder-query').addEventListener('input', () => {
      if (!document.getElementById('finder-query').value.trim()) {
        showFeedHideFinder();
      }
    });

    function showFeedHideFinder() {
      document.getElementById('finder-results-masonry').innerHTML = '';
      document.getElementById('home-feed-section').style.display = '';
    }

    function showFinderHideFeed() {
      document.getElementById('home-feed-section').style.display = 'none';
    }

    async function doFinderSearch() {
      showFinderHideFeed();
      const container = document.getElementById('finder-results-masonry');
      container.innerHTML = '<div class="text-center py-8 text-dim text-[0.9rem]"><div class="spinner"></div><div>Searching arXiv...</div></div>';
      try {
        const resp = await fetch(`/api/arxiv-search?q=${encodeURIComponent(finderCurrentQuery)}&start=${finderCurrentStart}&max_results=20`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const xml = await resp.text();
        parseFinderResults(xml);
      } catch (err) {
        container.innerHTML = `<div class="text-center py-8 text-dim text-[0.9rem]">Search failed: ${err.message}</div>`;
      }
    }

    function parseFinderResults(xml) {
      const doc = new DOMParser().parseFromString(xml, 'text/xml');
      const ns = 'http://www.w3.org/2005/Atom';
      const entries = doc.getElementsByTagNameNS(ns, 'entry');
      const totalStr = doc.getElementsByTagNameNS('http://a9.com/-/spec/opensearch/1.1/', 'totalResults')[0]?.textContent || '0';
      const total = parseInt(totalStr, 10);

      finderResultsCache = Array.from(entries).map(entry => {
        const title = (entry.getElementsByTagNameNS(ns, 'title')[0]?.textContent || '').trim().replace(/\s+/g, ' ');
        const summary = (entry.getElementsByTagNameNS(ns, 'summary')[0]?.textContent || '').trim().replace(/\s+/g, ' ');
        const published = (entry.getElementsByTagNameNS(ns, 'published')[0]?.textContent || '').slice(0, 10);
        const authors = Array.from(entry.getElementsByTagNameNS(ns, 'author'))
          .map(a => a.getElementsByTagNameNS(ns, 'name')[0]?.textContent?.trim() || '').join(', ');
        const links = entry.getElementsByTagNameNS(ns, 'link');
        let link = '';
        for (const l of links) {
          if (l.getAttribute('type') === 'text/html' || (!link && l.getAttribute('rel') === 'alternate')) {
            link = l.getAttribute('href') || '';
          }
        }
        if (!link) link = entry.getElementsByTagNameNS(ns, 'id')[0]?.textContent || '';
        const categories = Array.from(entry.getElementsByTagNameNS(ns, 'category'))
          .map(c => c.getAttribute('term')).filter(Boolean);
        const arxivCats = entry.querySelectorAll('category');
        for (const c of arxivCats) {
          const t = c.getAttribute('term');
          if (t && !categories.includes(t)) categories.push(t);
        }
        const dateStr = published ? new Date(published + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
        const arxivId = extractArxivId(link);
        return { title, description: summary, authors, link, published, date: dateStr, categories, arxivId };
      });

      renderFinderResults(total);
      fetchFinderCitations(total);
    }

    function renderFinderResults(total) {
      const container = document.getElementById('finder-results-masonry');
      if (!finderResultsCache.length) {
        container.innerHTML = '<div class="text-center py-8 text-dim text-[0.9rem]">No results found.</div>';
        return;
      }

      container.innerHTML = finderResultsCache.map((r, i) => `
        <div class="paper break-inside-avoid bg-card border border-border-card rounded-xl p-4 mb-3.5 cursor-pointer transition-all duration-150 relative" onclick="openFinderPaper(${i})" ${r.description ? `data-abstract="${escapeAttr(r.description)}"` : ''}>
          ${r.arxivId ? ARXIV_LOGO : ''}
          <div class="flex gap-1.5 flex-wrap items-center mb-2">${r.citations !== undefined ? `<span class="text-[0.68rem] font-semibold text-accent bg-cite px-2 py-0.5 rounded">${r.citations} cited</span>` : ''}${r.date ? `<span class="text-[0.68rem] text-dim">${escapeHtml(r.date)}</span>` : ''}${r.categories.slice(0,3).map(c => `<span class="text-[0.68rem] bg-cat-tag text-cat-tag-color px-[7px] py-0.5 rounded border border-border-subtle">${escapeHtml(c)}</span>`).join('')}</div>
          <div class="text-[0.92rem] font-semibold text-white_ mb-1.5 leading-snug"><a href="#" onclick="event.preventDefault()" class="text-link no-underline hover:underline">${escapeHtml(r.title)}</a></div>
          ${r.authors ? `<div class="text-[0.78rem] text-authors">${escapeHtml(formatFirstAuthor(r.authors))}</div>` : ''}
        </div>
      `).join('') + (total > 20 ? `
        <div class="finder-pagination flex justify-center gap-3 pt-6">
          <button class="px-5 py-2 rounded-md border border-border-input bg-card text-muted text-[0.85rem] cursor-pointer hover:border-accent hover:text-white_ disabled:opacity-30 disabled:cursor-default disabled:border-border-input disabled:text-muted" ${finderCurrentStart === 0 ? 'disabled' : ''} onclick="finderPrev()">Previous</button>
          <span class="text-dimmer text-[0.8rem] self-center">${finderCurrentStart + 1}&ndash;${finderCurrentStart + finderResultsCache.length} of ${total}</span>
          <button class="px-5 py-2 rounded-md border border-border-input bg-card text-muted text-[0.85rem] cursor-pointer hover:border-accent hover:text-white_ disabled:opacity-30 disabled:cursor-default disabled:border-border-input disabled:text-muted" ${finderCurrentStart + 20 >= total ? 'disabled' : ''} onclick="finderNext()">Next</button>
        </div>
      ` : '');
      finderLastTotal = total;
    }

    let finderLastTotal = 0;

    async function fetchFinderCitations(total) {
      const ids = finderResultsCache.map(r => r.arxivId).filter(Boolean);
      if (!ids.length) return;
      try {
        const resp = await fetch('/api/citations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids })
        });
        if (resp.ok) {
          const data = await resp.json();
          for (const r of finderResultsCache) {
            if (r.arxivId && data[r.arxivId] !== undefined) {
              r.citations = data[r.arxivId];
            }
          }
          renderFinderResults(total);
        }
      } catch (e) { /* silently fail */ }
    }

    function openFinderPaper(i) {
      const r = finderResultsCache[i];
      if (r && r.link) openPaperByUrl(r.link);
    }

    function finderPrev() {
      finderCurrentStart = Math.max(0, finderCurrentStart - 20);
      doFinderSearch();
    }

    function finderNext() {
      finderCurrentStart += 20;
      doFinderSearch();
    }

    function extractAuthors(desc) {
      const m = desc.match(/Authors?:\s*(.+?)(?:\.|<br|$)/i);
      return m ? m[1].trim() : '';
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    function populateCategories() {
      const select = document.getElementById('category');
      Array.from(allCategories).sort().forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat;
        select.appendChild(opt);
      });
    }

    let lastFilteredPapers = [];

    function getFilteredPapers() {
      const search = document.getElementById('search').value.toLowerCase();
      const category = document.getElementById('category').value;
      let filtered = allPapers.filter(p => {
        if (category && !p.categories.includes(category)) return false;
        if (search) {
          const h = `${p.title} ${p.authors} ${p.description}`.toLowerCase();
          return search.split(/\s+/).filter(Boolean).every(t => h.includes(t));
        }
        return true;
      });
      if (currentSort === 'citations') {
        filtered = [...filtered].sort((a, b) => {
          const aScore = a.source === 'hn' ? (a.hnScore || 0) : (a.citations || 0);
          const bScore = b.source === 'hn' ? (b.hnScore || 0) : (b.citations || 0);
          return bScore - aScore;
        });
      } else {
        filtered = [...filtered].sort((a, b) => {
          const da = a.pubDate ? new Date(a.pubDate).getTime() : 0;
          const db = b.pubDate ? new Date(b.pubDate).getTime() : 0;
          return db - da;
        });
      }
      return filtered;
    }

    function renderPapers() {
      const filtered = getFilteredPapers();
      lastFilteredPapers = filtered;
      const visible = filtered.slice(0, visibleCount);
      document.getElementById('stats').textContent = `Showing ${visible.length} of ${filtered.length} papers`;
      const container = document.getElementById('papers');
      if (!filtered.length) { container.innerHTML = '<div class="text-center py-20 text-dim">No papers match your filter.</div>'; return; }
      container.innerHTML = visible.map((p, i) => {
        const isHN = p.source === 'hn';
        const logo = isHN ? HN_LOGO : (p.arxivId ? ARXIV_LOGO : '');
        const chips = isHN
          ? `<span class="text-[0.68rem] font-semibold text-[#f60] bg-[#1e1209] px-2 py-0.5 rounded">${p.hnScore} pts</span><span class="text-[0.68rem] font-semibold text-dim bg-chip-count px-2 py-0.5 rounded">${p.hnComments} comments</span>`
          : (p.citations !== undefined ? `<span class="text-[0.68rem] font-semibold text-accent bg-cite px-2 py-0.5 rounded">${p.citations} cited</span>` : '');
        const catChips = p.categories.slice(0,3).map(c => `<span class="text-[0.68rem] bg-cat-tag text-cat-tag-color px-[7px] py-0.5 rounded border border-border-subtle">${escapeHtml(c)}</span>`).join('');
        return `
        <div class="paper break-inside-avoid bg-card border border-border-card rounded-xl p-4 mb-3.5 cursor-pointer transition-all duration-150 relative" onclick="openPaper(${i})" ${p.description ? `data-abstract="${escapeAttr(p.description)}"` : ''}>
          ${logo}
          <div class="flex gap-1.5 flex-wrap items-center mb-2">${chips}${p.date ? `<span class="text-[0.68rem] text-dim">${escapeHtml(p.date)}</span>` : ''}${catChips}</div>
          <div class="text-[0.92rem] font-semibold text-white_ mb-1.5 leading-snug"><a href="#" onclick="event.preventDefault()" class="text-link no-underline hover:underline">${escapeHtml(p.title)}</a></div>
          ${p.authors ? `<div class="text-[0.78rem] text-authors">${escapeHtml(isHN ? p.authors : formatFirstAuthor(p.authors))}</div>` : ''}
        </div>`;
      }).join('');
      fetchCitationsFor(visible);
    }

    // Infinite scroll
    let scrollTicking = false;
    window.addEventListener('scroll', () => {
      if (scrollTicking) return;
      scrollTicking = true;
      requestAnimationFrame(() => {
        scrollTicking = false;
        if (document.getElementById('home-main').style.display === 'none') return;
        if (visibleCount >= lastFilteredPapers.length) return;
        const scrollBottom = window.innerHeight + window.scrollY;
        const docHeight = document.documentElement.scrollHeight;
        if (scrollBottom >= docHeight - 400) {
          visibleCount += PAGE_SIZE;
          renderPapers();
        }
      });
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Abstract tooltip on hover ──
    (function setupAbstractTooltip() {
      const tip = document.getElementById('abstract-tooltip');
      let currentCard = null;

      document.addEventListener('mouseover', e => {
        const card = e.target.closest('.paper[data-abstract]');
        if (!card || card === currentCard) return;
        currentCard = card;
        tip.textContent = card.dataset.abstract;
        tip.style.display = 'block';

        // Position once, anchored near the card
        const rect = card.getBoundingClientRect();
        const pad = 8;

        // Try to place to the right of the card
        let x = rect.right + pad;
        let y = rect.top;

        // Measure after content is set
        const tw = tip.offsetWidth;
        const th = tip.offsetHeight;

        // If it overflows right, place to the left
        if (x + tw > window.innerWidth - pad) x = rect.left - tw - pad;
        // If it overflows bottom, shift up
        if (y + th > window.innerHeight - pad) y = window.innerHeight - th - pad;
        if (y < pad) y = pad;

        tip.style.left = x + 'px';
        tip.style.top = y + 'px';
      });

      document.addEventListener('mouseout', e => {
        const card = e.target.closest('.paper[data-abstract]');
        if (!card) return;
        if (!card.contains(e.relatedTarget)) {
          currentCard = null;
          tip.style.display = 'none';
        }
      });
    })();

    function renderLatexIn(elementId) {
      const el = document.getElementById(elementId);
      if (!el) return;
      if (typeof katex === 'undefined') {
        setTimeout(() => renderLatexIn(elementId), 200);
        return;
      }
      // Decode HTML entities in LaTeX before rendering
      function decodeTex(t) { return t.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"'); }
      // Replace display math $$...$$ then inline $...$
      let html = el.innerHTML;
      html = html.replace(/\$\$([^$]+?)\$\$/g, (_, tex) => {
        try { return katex.renderToString(decodeTex(tex), { displayMode: true, throwOnError: false }); }
        catch (e) { return _; }
      });
      html = html.replace(/\$([^$]+?)\$/g, (_, tex) => {
        try { return katex.renderToString(decodeTex(tex), { displayMode: false, throwOnError: false }); }
        catch (e) { return _; }
      });
      el.innerHTML = html;
    }

    function formatFirstAuthor(authors) {
      const parts = authors.split(',').map(s => s.trim()).filter(Boolean);
      if (parts.length <= 1) return authors;
      return parts[0] + ' et al.';
    }


    // ── Experiments List (server-backed) ──

    const EXP_ADJECTIVES = ['bold','calm','dark','fast','keen','neat','pure','rare','soft','vast','warm','wild','able','cool','deep','fair','glad','high','kind','open'];
    const EXP_NOUNS = ['arc','beam','core','dawn','edge','flux','grid','haze','iris','jade','knot','lens','mesa','node','orbit','peak','quark','rift','shard','tide','unit','veil','wave','apex','bolt','crest'];

    function randomExpName() {
      const adj = EXP_ADJECTIVES[Math.floor(Math.random() * EXP_ADJECTIVES.length)];
      const noun = EXP_NOUNS[Math.floor(Math.random() * EXP_NOUNS.length)];
      const num = Math.floor(Math.random() * 900) + 100;
      return `${adj}-${noun}-${num}`;
    }

      const title = randomExpName();
      await fetch('/api/experiments', {

        headers: {'Content-Type': 'application/json'},

      });
      fetchExperiments();

        body: JSON.stringify({ created: Date.now() })

    async function fetchExperimentDetail(id) {
      try {
        const resp = await fetch(`/api/experiments/${id}`);
        currentExp = await resp.json();
        document.getElementById('exp-detail-title').textContent = currentExp.title;

    let renaming = false;

    function startRenameExperiment() {
      if (!currentExpId || !currentExp || renaming) return;
      renaming = true;
      const h1 = document.getElementById('exp-detail-title');
      const current = currentExp.title;
      h1.outerHTML = `<input id="exp-rename-input" type="text" value="${escapeHtml(current)}" class="text-[1.4rem] font-semibold text-white_ bg-transparent border-b-2 border-accent outline-none w-full max-w-[400px]" />`;
      const input = document.getElementById('exp-rename-input');
      input.focus();
      input.select();
      input.addEventListener('keydown', async e => {
        if (e.key === 'Enter') { e.preventDefault(); await finishRename(input); }
        if (e.key === 'Escape') { cancelRename(); }
      });
      input.addEventListener('blur', () => finishRename(input));
    }

    async function finishRename(input) {
      if (!renaming) return;
      renaming = false;
      const newTitle = input.value.trim();
      if (!newTitle || !currentExpId) { cancelRename(); return; }
      await fetch(`/api/experiments/${currentExpId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ title: newTitle })
      });
      currentExp.title = newTitle;
      cancelRename();
    }

    function cancelRename() {
      const input = document.getElementById('exp-rename-input');
      if (!input) return;
      input.outerHTML = `<h1 id="exp-detail-title" class="text-[1.4rem] font-semibold text-white_ cursor-pointer hover:text-accent transition-colors" onclick="startRenameExperiment()" title="Click to rename">${escapeHtml(currentExp.title)}</h1>`;

    function closeVersionPopup() {
      if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; doAutoSave(); }
      document.getElementById('version-popup-overlay').style.display = 'none';

    function scheduleAutoSave() {
      clearTimeout(autoSaveTimer);

    async function doAutoSave() {
      autoSaveTimer = null;
      if (!selectedVersionId || !currentExpId) return;
      const nameEl = document.getElementById('vd-name');
      if (!nameEl) return;

      const body = {
        name: nameEl.value.trim(),
        status: document.getElementById('vd-status').value,
        notes: document.getElementById('vd-notes').value,
        results: document.getElementById('vd-results').value
      };
      await fetch(`/api/experiments/${currentExpId}/versions/${selectedVersionId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });

      const ind = document.getElementById('save-indicator');
      if (ind) { ind.style.opacity = '1'; setTimeout(() => ind.style.opacity = '0', 1500); }

      const resp = await fetch(`/api/experiments/${currentExpId}`);
      currentExp = await resp.json();

      const input = document.getElementById('new-version-name');
      const name = input.value.trim();
      if (!name) return;
      const body = {
        name,
        parentId: branchFromId || null,
        status: 'planned',
        created: Date.now()
      };
      await fetch(`/api/experiments/${currentExpId}/versions`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      input.value = '';

      branchFromId = null;
      await fetchExperimentDetail(currentExpId);

    async function createExpFile(ext) {
      if (!currentExpId) return;
      if (!ext) ext = 'md';
      const label = ext === 'ipynb' ? 'Notebook name:' : 'File name:';
      const name = prompt(label);
      if (!name || !name.trim()) return;
      const fullName = name.trim().endsWith('.' + ext) ? name.trim() : name.trim() + '.' + ext;
      const resp = await fetch(`/api/experiments/${currentExpId}/files`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name: fullName })
      });
      if (resp.ok) {
        const data = await resp.json();
        await fetchExpFiles();
        openExpFile(data.name);
      } else {
        const err = await resp.json();
        alert(err.error || 'Failed to create file');
      }

    async function openExpFile(fname) {
      if (fileSaveTimer) { clearTimeout(fileSaveTimer); fileSaveTimer = null; await saveActiveFile(); }
      activeFileName = fname;
      renderExpFiles();
      try {
        const resp = await fetch(`/api/experiments/${currentExpId}/files/${encodeURIComponent(fname)}`);
        const data = await resp.json();
        if (fname.endsWith('.ipynb')) {
          showNotebookEditor(data.name, data.content);
        } else {
          showFileEditor(data.name, data.content);
        }
      } catch (e) {
        if (fname.endsWith('.ipynb')) {
          showNotebookEditor(fname, '');
        } else {
          showFileEditor(fname, '');

    // ── Notebook Editor ──
    let nbData = null;

    function parseNotebook(raw) {
      try {
        return typeof raw === 'string' ? JSON.parse(raw) : raw;
      } catch (e) {
        return { nbformat: 4, nbformat_minor: 5, metadata: {}, cells: [{ cell_type: 'code', source: '', metadata: {}, outputs: [], execution_count: null }] };
      }
    }

    function showNotebookEditor(fname, content) {
      nbData = parseNotebook(content);

          <span class="text-[0.9rem] font-medium text-white_ flex-1">${escapeHtml(fname)}</span>
          <span class="text-[0.75rem] text-emerald-400 opacity-0 transition-opacity duration-300" id="file-save-indicator">Saved</span>

    function renderNotebookCells() {
      const container = document.getElementById('nb-cells');
      if (!container || !nbData) return;
      const cells = nbData.cells || [];
      container.innerHTML = cells.map((cell, i) => {
        const isCode = cell.cell_type === 'code';
        const src = Array.isArray(cell.source) ? cell.source.join('') : (cell.source || '');
        const outputHtml = isCode ? renderCellOutputs(cell.outputs || []) : '';
        return `
          <div class="mb-3 rounded-lg border border-border-card bg-card overflow-hidden">
            <div class="flex items-center gap-2 px-3 py-1.5 bg-header border-b border-border-dim">
              <span class="text-[0.7rem] font-mono ${isCode ? 'text-[#4a9eff]' : 'text-[#4a9]'}">${isCode ? 'Code' : 'Markdown'}</span>
              <span class="text-[0.65rem] text-dimmest">[${i + 1}]</span>
              <div class="ml-auto flex gap-1">
                ${i > 0 ? `<button onclick="nbMoveCell(${i},-1)" class="bg-transparent border-none text-dimmer hover:text-primary cursor-pointer text-[0.7rem] px-1">&uarr;</button>` : ''}
                ${i < cells.length - 1 ? `<button onclick="nbMoveCell(${i},1)" class="bg-transparent border-none text-dimmer hover:text-primary cursor-pointer text-[0.7rem] px-1">&darr;</button>` : ''}
                <button onclick="nbDeleteCell(${i})" class="bg-transparent border-none text-dimmer hover:text-red-400 cursor-pointer text-[0.7rem] px-1">&times;</button>
              </div>
            </div>
            <textarea data-nb-cell="${i}" class="w-full p-3 bg-canvas text-primary font-mono text-[0.85rem] leading-relaxed resize-y border-none outline-none min-h-[60px]" spellcheck="false" placeholder="${isCode ? '# code...' : 'Markdown...'}">${escapeHtml(src)}</textarea>
            ${outputHtml ? `<div class="px-3 py-2 border-t border-border-dim bg-body text-[0.8rem] font-mono text-muted whitespace-pre-wrap">${outputHtml}</div>` : ''}
          </div>`;
      }).join('') || '<div class="text-center py-10 text-dimmest text-[0.85rem]">Empty notebook. Add a cell below.</div>';

      container.querySelectorAll('textarea[data-nb-cell]').forEach(ta => {
        ta.addEventListener('input', () => {
          const idx = parseInt(ta.dataset.nbCell, 10);
          nbData.cells[idx].source = ta.value;
          scheduleFileSave();
        });
      });
    }

    function renderCellOutputs(outputs) {
      if (!outputs.length) return '';
      return outputs.map(o => {
        if (o.text) return escapeHtml(Array.isArray(o.text) ? o.text.join('') : o.text);
        if (o.data && o.data['text/plain']) return escapeHtml(Array.isArray(o.data['text/plain']) ? o.data['text/plain'].join('') : o.data['text/plain']);
        return '';
      }).filter(Boolean).join('\n');
    }

    function nbAddCell(type) {
      if (!nbData) return;
      const cell = { cell_type: type, source: '', metadata: {} };
      if (type === 'code') { cell.outputs = []; cell.execution_count = null; }
      nbData.cells.push(cell);
      renderNotebookCells();
      scheduleFileSave();
    }

    function nbDeleteCell(i) {
      if (!nbData || nbData.cells.length <= 1) return;
      nbData.cells.splice(i, 1);
      renderNotebookCells();
      scheduleFileSave();
    }

    function nbMoveCell(i, dir) {
      if (!nbData) return;
      const j = i + dir;
      if (j < 0 || j >= nbData.cells.length) return;
      [nbData.cells[i], nbData.cells[j]] = [nbData.cells[j], nbData.cells[i]];
      renderNotebookCells();
      scheduleFileSave();
    }

    function closeFileEditor() {
      if (fileSaveTimer) { clearTimeout(fileSaveTimer); fileSaveTimer = null; saveActiveFile(); }
      activeFileName = null;
      nbData = null;
      renderExpFiles();
      const editor = document.getElementById('exp-file-editor');
      if (editor) editor.style.display = 'none';
      document.getElementById('tree-svg').style.display = '';
      document.getElementById('tree-hint').style.display = '';
      renderTree();
    }

    function scheduleFileSave() {
      clearTimeout(fileSaveTimer);
      fileSaveTimer = setTimeout(() => saveActiveFile(), 600);
    }

    async function saveActiveFile() {
      fileSaveTimer = null;
      if (!activeFileName || !currentExpId) return;
      let content;
      if (activeFileName.endsWith('.ipynb') && nbData) {
        content = JSON.stringify(nbData, null, 2);
      } else {
        const ta = document.getElementById('exp-file-textarea');
        if (!ta) return;
        content = ta.value;
      }
      await fetch(`/api/experiments/${currentExpId}/files/${encodeURIComponent(activeFileName)}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ content })
      });
      const ind = document.getElementById('file-save-indicator');
      if (ind) { ind.style.opacity = '1'; setTimeout(() => ind.style.opacity = '0', 1500); }
    }

    async function deleteExpFile(fname) {
      if (!confirm(`Delete ${fname}?`)) return;
      await fetch(`/api/experiments/${currentExpId}/files/${encodeURIComponent(fname)}`, { method: 'DELETE' });
      if (activeFileName === fname) closeFileEditor();
      await fetchExpFiles();
    }

    // ── SVG Tree Rendering ──
    const NODE_W = 140;
    const NODE_H = 44;
    const H_GAP = 30;
    const V_GAP = 70;

    let svgPan = { x: 0, y: 0 };
    let svgZoom = 1;
    let dragging = false;
    let dragStart = { x: 0, y: 0 };

    function renderTree() {
      const svg = document.getElementById('tree-svg');
      const versions = currentExp?.versions || [];

      if (!versions.length && !expFiles.length) {
        svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="#333" font-size="14" font-family="inherit">Add a version or file to see the map</text>`;
        return;
      }

      const byId = {};
      versions.forEach(v => { byId[v.id] = { ...v, children: [] }; });

      const roots = [];
      versions.forEach(v => {
        if (v.parentId && byId[v.parentId]) {
          byId[v.parentId].children.push(byId[v.id]);
        } else {
          roots.push(byId[v.id]);
        }
      });

      // Add file nodes as leaves attached to a virtual file group
      const fileNodes = expFiles.map((f, i) => ({
        _isFile: true,
        _fileName: f,
        id: '__file__' + f,
        children: []
      }));

      let nextX = 0;

      function layoutNode(node, depth) {
        node._depth = depth;
        if (node.children.length === 0) {
          node._x = nextX;
          node._y = depth;
          nextX++;
        } else {
          node.children.forEach(c => layoutNode(c, depth + 1));
          const first = node.children[0]._x;
          const last = node.children[node.children.length - 1]._x;
          node._x = (first + last) / 2;
          node._y = depth;
        }
      }

      roots.forEach(r => layoutNode(r, 0));

      // Find the max depth used by version nodes
      const allVersionNodes = Object.values(byId);
      let maxDepth = 0;
      allVersionNodes.forEach(n => { if (n._y > maxDepth) maxDepth = n._y; });

      // Layout file nodes on a row below all version nodes
      const fileDepth = versions.length ? maxDepth + 1 : 0;
      fileNodes.forEach(fn => {
        fn._x = nextX;
        fn._y = fileDepth;
        fn._depth = fileDepth;
        nextX++;
      });

      const padding = 60;
      const allNodes = [...allVersionNodes, ...fileNodes];

      allNodes.forEach(n => {
        n._px = padding + n._x * (NODE_W + H_GAP) + NODE_W / 2;
        n._py = padding + n._y * (NODE_H + V_GAP) + NODE_H / 2;
      });

      const statusColor = {
        planned: '#555',
        running: '#4a9eff',
        completed: '#4a9',
        failed: '#e55'
      };

      let edges = '';
      allVersionNodes.forEach(n => {
        if (n.parentId && byId[n.parentId]) {
          const p = byId[n.parentId];
          const x1 = p._px, y1 = p._py + NODE_H / 2;
          const x2 = n._px, y2 = n._py - NODE_H / 2;
          const midY = (y1 + y2) / 2;
          edges += `<path class="tree-edge" d="M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}" />`;
        }
      });

      let nodes = '';
      allVersionNodes.forEach(n => {
        const x = n._px - NODE_W / 2;
        const y = n._py - NODE_H / 2;
        const color = statusColor[n.status] || '#555';
        const isSelected = n.id === selectedVersionId;
        nodes += `
          <g class="tree-node" onclick="selectVersion('${n.id}')">
            <rect x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}"
                  fill="#181818" stroke="${color}" stroke-opacity="${isSelected ? 1 : 0.5}" />
            <circle cx="${x + 14}" cy="${n._py}" r="4" fill="${color}" />
            <text x="${x + 24}" y="${n._py + 4}" font-size="12">
              ${escapeHtml(n.name.length > 12 ? n.name.slice(0, 12) + '...' : n.name)}
            </text>
          </g>`;
      });

      // Render file nodes with a distinct style
      fileNodes.forEach(fn => {
        const x = fn._px - NODE_W / 2;
        const y = fn._py - NODE_H / 2;
        const isActive = fn._fileName === activeFileName;
        const isNb = fn._fileName.endsWith('.ipynb');
        const nodeColor = isNb ? '#f60' : '#b4451a';
        const bgFill = isNb ? '#1a1208' : '#181210';
        const label = fn._fileName.length > 14 ? fn._fileName.slice(0, 14) + '...' : fn._fileName;
        nodes += `
          <g class="tree-node" onclick="openExpFile('${escapeHtml(fn._fileName)}')">
            <rect x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}"
                  fill="${bgFill}" stroke="${nodeColor}" stroke-opacity="${isActive ? 1 : 0.4}" stroke-dasharray="${isActive ? '' : '4 2'}" />
            ${isNb
              ? `<circle cx="${x + 14}" cy="${fn._py}" r="6" fill="none" stroke="${nodeColor}" stroke-width="1.5" stroke-opacity="0.6"/><circle cx="${x + 14}" cy="${fn._py}" r="2" fill="${nodeColor}" fill-opacity="0.6"/>`
              : `<path d="M${x + 8},${fn._py - 7} h8 l4,4 v10 h-12 z" fill="none" stroke="${nodeColor}" stroke-width="1.5" stroke-opacity="0.6"/>`
            }
            <text x="${x + 26}" y="${fn._py + 4}" font-size="12">
              ${escapeHtml(label)}
            </text>
          </g>`;
      });

      const transform = `translate(${svgPan.x},${svgPan.y}) scale(${svgZoom})`;
      svg.innerHTML = `<g id="tree-root" transform="${transform}">${edges}${nodes}</g>`;
    }

    // Pan & zoom
    (function setupPanZoom() {
      const svg = document.getElementById('tree-svg');

      svg.addEventListener('mousedown', e => {
        if (e.target.closest('.tree-node')) return;
        dragging = true;
        dragStart = { x: e.clientX - svgPan.x, y: e.clientY - svgPan.y };
      });

      window.addEventListener('mousemove', e => {
        if (!dragging) return;
        svgPan.x = e.clientX - dragStart.x;
        svgPan.y = e.clientY - dragStart.y;
        const root = document.getElementById('tree-root');
        if (root) root.setAttribute('transform', `translate(${svgPan.x},${svgPan.y}) scale(${svgZoom})`);
      });

      window.addEventListener('mouseup', () => { dragging = false; });

      svg.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newZoom = Math.min(3, Math.max(0.2, svgZoom * delta));

        const rect = svg.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        svgPan.x = mx - (mx - svgPan.x) * (newZoom / svgZoom);
        svgPan.y = my - (my - svgPan.y) * (newZoom / svgZoom);
        svgZoom = newZoom;

        const root = document.getElementById('tree-root');
        if (root) root.setAttribute('transform', `translate(${svgPan.x},${svgPan.y}) scale(${svgZoom})`);
      }, { passive: false });
    })();
  </script>
</body>
</html>
