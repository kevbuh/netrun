    }

    // ── Runs Table ──
    const STATUS_COLORS = { running: 'bg-blue-500', completed: 'bg-emerald-500', killed: 'bg-amber-500', crashed: 'bg-red-500' };
    const STATUS_TEXT = { running: 'text-blue-400', completed: 'text-emerald-400', killed: 'text-amber-400', crashed: 'text-red-400' };

    function renderRunsTable() {
      const container = document.getElementById('runs-table-container');
      const runs = currentExp.runs || [];
      const countEl = document.getElementById('exp-run-count');
      countEl.textContent = `${runs.length} run${runs.length !== 1 ? 's' : ''}`;

      if (!runs.length) {
        container.innerHTML = '<div class="text-center py-16 text-dimmest text-[0.9rem]">No runs yet. Click "+ New Run" to create one.</div>';
        return;
      }

      // Determine which RL columns to show
      const hasAlgo = runs.some(r => r.algorithm);
      const hasEnv = runs.some(r => r.environment);
      const hasReward = runs.some(r => r.reward != null);
      const hasEpisodes = runs.some(r => r.episodes != null);

      let headerCols = `
        <th class="text-left py-2 px-3 text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide w-[90px]">Status</th>
        <th class="text-left py-2 px-3 text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide">Name</th>`;
      if (hasAlgo) headerCols += `<th class="text-left py-2 px-3 text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide">Algorithm</th>`;
      if (hasEnv) headerCols += `<th class="text-left py-2 px-3 text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide">Environment</th>`;
      if (hasReward) headerCols += `<th class="text-right py-2 px-3 text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide">Reward</th>`;
      if (hasEpisodes) headerCols += `<th class="text-right py-2 px-3 text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide">Episodes</th>`;
      headerCols += `<th class="text-right py-2 px-3 text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide">Created</th>`;
      headerCols += `<th class="w-10"></th>`;

      const rows = runs.map(r => {
        const isExpanded = r.id === expandedRunId;
        const created = r.created ? new Date(r.created).toLocaleDateString('en-US', {month:'short',day:'numeric'}) : '';
        let cols = `
          <td class="py-2.5 px-3"><span class="inline-flex items-center gap-1.5 text-[0.8rem] ${STATUS_TEXT[r.status] || 'text-dim'}"><span class="w-2 h-2 rounded-full ${STATUS_COLORS[r.status] || 'bg-gray-500'} inline-block"></span>${r.status}</span></td>
          <td class="py-2.5 px-3 text-[0.85rem] text-white_ font-medium">${escapeHtml(r.name)}</td>`;
        if (hasAlgo) cols += `<td class="py-2.5 px-3 text-[0.8rem] text-muted">${escapeHtml(r.algorithm || '')}</td>`;
        if (hasEnv) cols += `<td class="py-2.5 px-3 text-[0.8rem] text-muted">${escapeHtml(r.environment || '')}</td>`;
        if (hasReward) cols += `<td class="py-2.5 px-3 text-[0.8rem] text-muted text-right">${r.reward != null ? r.reward : ''}</td>`;
        if (hasEpisodes) cols += `<td class="py-2.5 px-3 text-[0.8rem] text-muted text-right">${r.episodes != null ? r.episodes : ''}</td>`;
        cols += `<td class="py-2.5 px-3 text-[0.75rem] text-dimmer text-right">${created}</td>`;
        cols += `<td class="py-2.5 px-1"><button onclick="event.stopPropagation(); deleteRun('${r.id}')" class="w-7 h-7 rounded-md bg-transparent border-none text-dimmer cursor-pointer flex items-center justify-center hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity" title="Delete"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"/></svg></button></td>`;

        let expandRow = '';
        if (isExpanded) {
          const hp = r.hyperparameters || {};
          const hpRows = Object.entries(hp).map(([k,v], i) =>
            `<div class="flex gap-2 mb-1">
              <input type="text" value="${escapeHtml(k)}" data-hp-key="${i}" class="flex-1 px-2 py-1 rounded border border-border-input bg-input text-primary text-[0.8rem] focus:outline-none focus:border-accent" />
              <input type="text" value="${escapeHtml(String(v))}" data-hp-val="${i}" class="flex-1 px-2 py-1 rounded border border-border-input bg-input text-primary text-[0.8rem] focus:outline-none focus:border-accent" />
              <button onclick="removeHP(${i})" class="text-dimmer hover:text-red-400 bg-transparent border-none cursor-pointer text-sm">&times;</button>
            </div>`
          ).join('');
          const totalCols = 3 + (hasAlgo?1:0) + (hasEnv?1:0) + (hasReward?1:0) + (hasEpisodes?1:0) + 1;
          expandRow = `<tr><td colspan="${totalCols}" class="p-0"><div class="p-4 bg-body border-t border-b border-border-dim">
            <div class="grid grid-cols-2 gap-4">
              <div class="flex flex-col gap-3">
                <div>
                  <label class="block text-[0.7rem] text-dim mb-1">Name</label>
                  <input type="text" id="rd-name" value="${escapeHtml(r.name)}" class="w-full px-2.5 py-1.5 rounded-md border border-border-input bg-input text-primary text-[0.85rem] focus:outline-none focus:border-accent" />
                </div>
                <div>
                  <label class="block text-[0.7rem] text-dim mb-1">Status</label>
                  <select id="rd-status" class="w-full px-2.5 py-1.5 rounded-md border border-border-input bg-input text-primary text-[0.85rem] focus:outline-none focus:border-accent">
                    <option value="running" ${r.status==='running'?'selected':''}>Running</option>
                    <option value="completed" ${r.status==='completed'?'selected':''}>Completed</option>
                    <option value="killed" ${r.status==='killed'?'selected':''}>Killed</option>
                    <option value="crashed" ${r.status==='crashed'?'selected':''}>Crashed</option>
                  </select>
                </div>
                <div>
                  <label class="block text-[0.7rem] text-dim mb-1">Notes</label>
                  <textarea id="rd-notes" rows="3" class="w-full px-2.5 py-1.5 rounded-md border border-border-input bg-input text-primary text-[0.85rem] resize-y focus:outline-none focus:border-accent">${escapeHtml(r.notes || '')}</textarea>
                </div>
                <div>
                  <label class="block text-[0.7rem] text-dim mb-1">Results</label>
                  <textarea id="rd-results" rows="3" class="w-full px-2.5 py-1.5 rounded-md border border-border-input bg-input text-[0.85rem] resize-y focus:outline-none focus:border-accent">${escapeHtml(r.results || '')}</textarea>
                </div>
              </div>
              <div class="flex flex-col gap-3">
                <div>
                  <label class="block text-[0.7rem] text-dim mb-1">Algorithm</label>
                  <input type="text" id="rd-algorithm" value="${escapeHtml(r.algorithm || '')}" class="w-full px-2.5 py-1.5 rounded-md border border-border-input bg-input text-primary text-[0.85rem] focus:outline-none focus:border-accent" placeholder="e.g. PPO" />
                </div>
                <div>
                  <label class="block text-[0.7rem] text-dim mb-1">Environment</label>
                  <input type="text" id="rd-environment" value="${escapeHtml(r.environment || '')}" class="w-full px-2.5 py-1.5 rounded-md border border-border-input bg-input text-primary text-[0.85rem] focus:outline-none focus:border-accent" placeholder="e.g. CartPole-v1" />
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-[0.7rem] text-dim mb-1">Reward</label>
                    <input type="number" id="rd-reward" value="${r.reward != null ? r.reward : ''}" class="w-full px-2.5 py-1.5 rounded-md border border-border-input bg-input text-primary text-[0.85rem] focus:outline-none focus:border-accent" step="any" />
                  </div>
                  <div>
                    <label class="block text-[0.7rem] text-dim mb-1">Episodes</label>
                    <input type="number" id="rd-episodes" value="${r.episodes != null ? r.episodes : ''}" class="w-full px-2.5 py-1.5 rounded-md border border-border-input bg-input text-primary text-[0.85rem] focus:outline-none focus:border-accent" />
                  </div>
                </div>
                <div>
                  <label class="block text-[0.7rem] text-dim mb-1">Hyperparameters</label>
                  <div id="rd-hp-list">${hpRows}</div>
                  <button class="text-[0.8rem] text-accent hover:text-accent-hover cursor-pointer bg-transparent border-none mt-1" onclick="addHP()">+ Add parameter</button>
                </div>
              </div>
            </div>
            <div class="flex items-center mt-3">
              <span class="text-[0.75rem] text-emerald-400 opacity-0 transition-opacity duration-300" id="run-save-indicator">Saved</span>
            </div>
          </div></td></tr>`;
        }

        return `<tr class="group cursor-pointer hover:bg-card/50 transition-colors ${isExpanded ? 'bg-card/30' : ''}" onclick="toggleRunExpand('${r.id}')">${cols}</tr>${expandRow}`;
      }).join('');

      container.innerHTML = `<table class="w-full border-collapse"><thead><tr class="border-b border-border-dim">${headerCols}</tr></thead><tbody>${rows}</tbody></table>`;

      // Attach auto-save listeners if a run is expanded
      if (expandedRunId) {
        setTimeout(() => attachRunAutoSave(), 0);
      }
    }

    function toggleRunExpand(rid) {
      if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; doRunAutoSave(); }
      expandedRunId = expandedRunId === rid ? null : rid;
      renderRunsTable();
    }

    function attachRunAutoSave() {
      const fields = ['rd-name','rd-status','rd-notes','rd-results','rd-algorithm','rd-environment','rd-reward','rd-episodes'];
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const evt = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(evt, () => scheduleRunAutoSave());
      });
      // HP fields
      document.querySelectorAll('[data-hp-key],[data-hp-val]').forEach(el => {
        el.addEventListener('input', () => scheduleRunAutoSave());
      });
    }

    function scheduleRunAutoSave() {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => doRunAutoSave(), 600);
    }

    async function doRunAutoSave() {
      autoSaveTimer = null;
      if (!expandedRunId || !currentExpId) return;
      const nameEl = document.getElementById('rd-name');
      if (!nameEl) return;

      // Collect hyperparameters
      const hp = {};
      document.querySelectorAll('[data-hp-key]').forEach(keyEl => {
        const i = keyEl.dataset.hpKey;
        const valEl = document.querySelector(`[data-hp-val="${i}"]`);
        const k = keyEl.value.trim();
        if (k && valEl) {
          const v = valEl.value.trim();
          const num = Number(v);
          hp[k] = v !== '' && !isNaN(num) ? num : v;
        }
      });

      const rewardVal = document.getElementById('rd-reward').value;
      const episodesVal = document.getElementById('rd-episodes').value;

      const body = {
        name: nameEl.value.trim(),
        status: document.getElementById('rd-status').value,
        notes: document.getElementById('rd-notes').value,
        results: document.getElementById('rd-results').value,
        algorithm: document.getElementById('rd-algorithm').value,
        environment: document.getElementById('rd-environment').value,
        reward: rewardVal !== '' ? Number(rewardVal) : null,
        episodes: episodesVal !== '' ? Number(episodesVal) : null,
        hyperparameters: hp
      };

      await fetch(`/api/experiments/${currentExpId}/runs/${expandedRunId}`, {
        method: 'PUT', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });

      const ind = document.getElementById('run-save-indicator');
      if (ind) { ind.style.opacity = '1'; setTimeout(() => ind.style.opacity = '0', 1500); }

      // Update local data
      const run = (currentExp.runs || []).find(r => r.id === expandedRunId);
      if (run) Object.assign(run, body);
    }

    function addHP() {
      const list = document.getElementById('rd-hp-list');
      if (!list) return;
      const i = list.children.length;
      const div = document.createElement('div');
      div.className = 'flex gap-2 mb-1';
      div.innerHTML = `
        <input type="text" value="" data-hp-key="${i}" class="flex-1 px-2 py-1 rounded border border-border-input bg-input text-primary text-[0.8rem] focus:outline-none focus:border-accent" placeholder="key" />
        <input type="text" value="" data-hp-val="${i}" class="flex-1 px-2 py-1 rounded border border-border-input bg-input text-primary text-[0.8rem] focus:outline-none focus:border-accent" placeholder="value" />
        <button onclick="this.parentElement.remove(); scheduleRunAutoSave()" class="text-dimmer hover:text-red-400 bg-transparent border-none cursor-pointer text-sm">&times;</button>`;
      list.appendChild(div);
      div.querySelectorAll('input').forEach(el => el.addEventListener('input', () => scheduleRunAutoSave()));
      div.querySelector('[data-hp-key]').focus();
    }

    function removeHP(i) {
      const keyEl = document.querySelector(`[data-hp-key="${i}"]`);
      if (keyEl) keyEl.closest('.flex').remove();
      scheduleRunAutoSave();
    }

    async function deleteRun(rid) {
      if (!confirm('Delete this run?')) return;
      await fetch(`/api/experiments/${currentExpId}/runs/${rid}`, { method: 'DELETE' });
      if (expandedRunId === rid) expandedRunId = null;
      currentExp.runs = (currentExp.runs || []).filter(r => r.id !== rid);
      renderRunsTable();
    }

    // ── Files ──
    let currentFile = null;
    let fileSaveTimer = null;

    async function fetchExpFiles() {
      if (!currentExpId) return;
      try {
        const resp = await fetch(`/api/experiments/${currentExpId}/files`);
        const files = await resp.json();
        renderFilesList(files);
      } catch(e) {
        document.getElementById('exp-files-list').innerHTML = '';
      }
    }

    function renderFilesList(files) {
      const el = document.getElementById('exp-files-list');
      if (!files.length) {
        el.innerHTML = '<div class="text-dimmest text-[0.8rem] py-4">No files yet.</div>';
        return;
      }
      el.innerHTML = files.map(f => `
        <div class="flex items-center justify-between py-2 px-3 rounded-md hover:bg-card/50 cursor-pointer group transition-colors" onclick="openFile('${escapeHtml(f)}')">
          <div class="flex items-center gap-2">
            <span class="text-[0.75rem] px-1.5 py-0.5 rounded ${f.endsWith('.ipynb') ? 'bg-orange-500/20 text-orange-400' : f.endsWith('.py') ? 'bg-emerald-500/20 text-emerald-400' : 'bg-blue-500/20 text-blue-400'}">${f.endsWith('.ipynb') ? 'nb' : f.endsWith('.py') ? 'py' : 'md'}</span>
            <span class="text-[0.85rem] text-primary">${escapeHtml(f)}</span>
          </div>
          <button onclick="event.stopPropagation(); deleteExpFile('${escapeHtml(f)}')" class="w-7 h-7 rounded-md bg-transparent border-none text-dimmer cursor-pointer flex items-center justify-center hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity" title="Delete">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>`).join('');
    }

    async function createExpFile(ext, content) {
      const base = ext === '.ipynb' ? 'notebook' : ext === '.py' ? 'script' : 'notes';
      let name = `${base}${ext}`;
      let i = 2;
      const resp = await fetch(`/api/experiments/${currentExpId}/files`);
      const existing = await resp.json();
      while (existing.includes(name)) { name = `${base}-${i}${ext}`; i++; }
      const payload = {name};
      if (content !== undefined) payload.content = content;
      await fetch(`/api/experiments/${currentExpId}/files`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      fetchExpFiles();
      return name;
    }

    async function deleteExpFile(fname) {
      if (!confirm(`Delete ${fname}?`)) return;
      await fetch(`/api/experiments/${currentExpId}/files/${fname}`, {method:'DELETE'});
      if (currentFile === fname) closeFileEditor();
      fetchExpFiles();
    }

    async function openFile(fname) {
      currentFile = fname;
      const resp = await fetch(`/api/experiments/${currentExpId}/files/${fname}`);
      const data = await resp.json();

      // Hide runs section, show editor
      document.getElementById('runs-table-container').style.display = 'none';
      document.getElementById('exp-files-section').style.display = 'none';
      document.getElementById('exp-runs-header').style.display = 'none';
      const editor = document.getElementById('exp-file-editor');
      editor.style.display = 'block';

      if (fname.endsWith('.ipynb')) {
        renderNotebookEditor(fname, data.content);
      } else if (fname.endsWith('.py')) {
        renderPythonEditor(fname, data.content);
      } else {
        renderMarkdownEditor(fname, data.content);
      }
    }

    function closeFileEditor() {
      if (fileSaveTimer) { clearTimeout(fileSaveTimer); fileSaveTimer = null; }
      currentFile = null;
      pyEditorCm = null;
      cmInstances = [];
      document.getElementById('exp-file-editor').style.display = 'none';
      document.getElementById('exp-file-editor').innerHTML = '';
      document.getElementById('runs-table-container').style.display = '';
      document.getElementById('exp-files-section').style.display = '';
      document.getElementById('exp-runs-header').style.display = '';
      fetchExpFiles();
    }

    // ── Markdown Editor ──
    function renderMarkdownEditor(fname, content) {
      const editor = document.getElementById('exp-file-editor');
      editor.innerHTML = `
        <div class="flex items-center gap-3 mb-4">
          <button class="bg-transparent border-none text-muted text-[0.85rem] cursor-pointer p-0 inline-flex items-center gap-1.5 hover:text-primary" onclick="closeFileEditor()">
            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Back
          </button>
          <span class="text-[0.75rem] px-1.5 py-0.5 rounded bg-blue-500/20 text-blue-400">md</span>
          <span class="text-[0.9rem] text-white_ font-medium">${escapeHtml(fname)}</span>
          <span class="text-[0.75rem] text-emerald-400 opacity-0 transition-opacity" id="md-save-ind">Saved</span>
        </div>
        <textarea id="md-editor-textarea" class="w-full min-h-[500px] px-4 py-3 rounded-lg border border-border-input bg-input text-primary text-[0.85rem] font-mono resize-y focus:outline-none focus:border-accent" spellcheck="false">${escapeHtml(content)}</textarea>`;
      const ta = document.getElementById('md-editor-textarea');
      ta.addEventListener('input', () => {
        clearTimeout(fileSaveTimer);
        fileSaveTimer = setTimeout(() => saveMarkdown(), 600);
      });
      ta.focus();
    }

    async function saveMarkdown() {
      fileSaveTimer = null;
      if (!currentFile || !currentExpId) return;
      const content = document.getElementById('md-editor-textarea').value;
      await fetch(`/api/experiments/${currentExpId}/files/${currentFile}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({content})
      });
      const ind = document.getElementById('md-save-ind');
      if (ind) { ind.style.opacity='1'; setTimeout(()=>ind.style.opacity='0',1500); }
    }

    // ── Python File Editor ──
    let pyEditorCm = null;

    function renderPythonEditor(fname, content) {
      const editor = document.getElementById('exp-file-editor');
      editor.innerHTML = `
        <div class="flex items-center gap-3 mb-4">
          <button class="bg-transparent border-none text-muted text-[0.85rem] cursor-pointer p-0 inline-flex items-center gap-1.5 hover:text-primary" onclick="closeFileEditor()">
            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Back
          </button>
          <span class="text-[0.75rem] px-1.5 py-0.5 rounded bg-emerald-500/20 text-emerald-400">py</span>
          <span class="text-[0.9rem] text-white_ font-medium">${escapeHtml(fname)}</span>
          <span class="text-[0.75rem] text-emerald-400 opacity-0 transition-opacity" id="py-save-ind">Saved</span>
        </div>
        <div class="rounded-lg border border-border-input overflow-hidden">
          <textarea id="py-editor-textarea">${escapeHtml(content)}</textarea>
        </div>`;
      const ta = document.getElementById('py-editor-textarea');
      pyEditorCm = CodeMirror.fromTextArea(ta, {
        mode: 'python',
        lineNumbers: true,
        matchBrackets: true,
        autoCloseBrackets: true,
        indentUnit: 4,
        tabSize: 4,
        indentWithTabs: false,
        lineWrapping: true,
        viewportMargin: Infinity,
        extraKeys: {
          'Cmd-/': function(cm) { cm.toggleComment(); },
          'Ctrl-/': function(cm) { cm.toggleComment(); },
          'Tab': function(cm) {
            if (cm.somethingSelected()) cm.indentSelection('add');
            else cm.replaceSelection('    ', 'end');
          }
        }
      });
      pyEditorCm.setSize(null, '500px');
      pyEditorCm.on('change', () => {
        clearTimeout(fileSaveTimer);
        fileSaveTimer = setTimeout(() => savePythonFile(), 600);
      });
      pyEditorCm.focus();
    }

    async function savePythonFile() {
      fileSaveTimer = null;
      if (!currentFile || !currentExpId || !pyEditorCm) return;
      const content = pyEditorCm.getValue();
      await fetch(`/api/experiments/${currentExpId}/files/${currentFile}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({content})
      });
      const ind = document.getElementById('py-save-ind');
      if (ind) { ind.style.opacity='1'; setTimeout(()=>ind.style.opacity='0',1500); }
    }

    // ── Notebook Editor ──
    let nbData = null;
    let kernelStatus = 'idle'; // idle, busy, dead
    let cmInstances = []; // CodeMirror editors, one per cell

    function renderNotebookEditor(fname, contentStr) {
      try { nbData = JSON.parse(contentStr); } catch(e) {
        nbData = { cells: [{cell_type:'code',source:'',outputs:[]}], metadata:{}, nbformat:4, nbformat_minor:5 };
      }
      const editor = document.getElementById('exp-file-editor');
      const pythonPath = (currentExp && currentExp.pythonPath) || 'python3';
      const hasVenv = pythonPath.includes('/venv/');
      editor.innerHTML = `
        <div class="flex items-center gap-3 mb-4 flex-wrap">
          <button class="bg-transparent border-none text-muted text-[0.85rem] cursor-pointer p-0 inline-flex items-center gap-1.5 hover:text-primary" onclick="closeFileEditor()">
            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Back
          </button>
          <span class="text-[0.75rem] px-1.5 py-0.5 rounded bg-orange-500/20 text-orange-400">nb</span>
          <span class="text-[0.9rem] text-white_ font-medium">${escapeHtml(fname)}</span>
          <span class="text-[0.75rem] text-emerald-400 opacity-0 transition-opacity" id="nb-save-ind">Saved</span>
          <div class="ml-auto flex items-center gap-3">
            <span class="flex items-center gap-1.5 text-[0.75rem] text-dim">
              <span id="kernel-dot" class="w-2 h-2 rounded-full bg-gray-500 inline-block"></span>
              <span id="kernel-status-text">idle</span>
            </span>
            <button class="px-2 py-1 rounded border border-border-input bg-transparent text-muted text-[0.75rem] cursor-pointer hover:text-primary" onclick="restartKernel()">Restart kernel</button>
            <select id="nb-venv-select" class="px-2 py-1 rounded border border-border-input bg-input text-primary text-[0.75rem] cursor-pointer focus:outline-none focus:border-accent" onchange="switchVenv(this.value)">
              <option value="python3" ${pythonPath === 'python3' ? 'selected' : ''}>System python3</option>
            </select>
            <button id="btn-create-venv" class="px-2 py-1 rounded border border-border-input bg-transparent text-muted text-[0.75rem] cursor-pointer hover:text-primary" onclick="createVenv()">+ venv</button>
            <button class="px-2 py-1 rounded border border-border-input bg-transparent text-muted text-[0.75rem] cursor-pointer hover:text-primary" onclick="togglePackagesPanel()">Packages</button>
          </div>
        </div>
        <div id="packages-panel" class="hidden mb-4 rounded-lg border border-border-input bg-surface-secondary p-4">
          <div class="flex items-center gap-2 mb-3">
            <input type="text" id="pkg-install-input" placeholder="Package names (e.g. numpy pandas)" class="flex-1 px-2 py-1.5 rounded border border-border-input bg-input text-primary text-[0.8rem] focus:outline-none focus:border-accent" onkeydown="if(event.key==='Enter')installPackages()" />
            <button class="px-3 py-1.5 rounded bg-accent text-white text-[0.8rem] cursor-pointer hover:opacity-90" onclick="installPackages()">Install</button>
          </div>
          <div id="pkg-install-status" class="text-[0.75rem] mb-2 hidden"></div>
          <div id="pkg-list" class="text-[0.8rem] text-muted">Loading...</div>
        </div>
        <div id="nb-cells"></div>
        <div class="flex gap-2 mt-3">
          <button class="px-3 py-1.5 rounded-md border border-border-input bg-transparent text-muted text-[0.8rem] cursor-pointer hover:text-primary" onclick="addNbCell('code')">+ Code</button>
          <button class="px-3 py-1.5 rounded-md border border-border-input bg-transparent text-muted text-[0.8rem] cursor-pointer hover:text-primary" onclick="addNbCell('markdown')">+ Markdown</button>
        </div>`;
      renderNbCells();
      // Load available venvs into dropdown
      loadVenvDropdown(pythonPath);
    }

    async function loadVenvDropdown(currentPath) {
      const select = document.getElementById('nb-venv-select');
      if (!select) return;
      try {
        const resp = await fetch('/api/venvs');
        const venvs = await resp.json();
        // Keep system python3 as first option
        let html = `<option value="python3" ${currentPath === 'python3' ? 'selected' : ''}>System python3</option>`;
        venvs.forEach(v => {
          const label = v.id === currentExpId ? `venv (this project)` : `venv (${v.title})`;
          html += `<option value="${escapeHtml(v.pythonPath)}" ${currentPath === v.pythonPath ? 'selected' : ''}>${escapeHtml(label)}</option>`;
        });
        select.innerHTML = html;
      } catch(e) { /* keep default */ }
    }

    async function switchVenv(pythonPath) {
      await fetch(`/api/experiments/${currentExpId}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pythonPath})
      });
      if (currentExp) currentExp.pythonPath = pythonPath;
      updateKernelStatus('dead');
      // Restart kernel with new venv
      try {
        await fetch(`/api/experiments/${currentExpId}/kernel/restart`, {method:'POST'});
        updateKernelStatus('idle');
      } catch(e) { /* will restart on next run */ }
    }

    async function createVenv() {
      const btn = document.getElementById('btn-create-venv');
      if (!btn) return;
      btn.disabled = true;
      btn.textContent = 'Creating...';
      try {
        const resp = await fetch(`/api/experiments/${currentExpId}/venv`, { method: 'POST' });
        const data = await resp.json();
        if (data.ok) {
          if (currentExp) currentExp.pythonPath = data.pythonPath;
          updateKernelStatus('dead');
          await loadVenvDropdown(data.pythonPath);
          btn.textContent = '+ venv';
          btn.disabled = false;
          // Restart kernel
          try {
            await fetch(`/api/experiments/${currentExpId}/kernel/restart`, {method:'POST'});
            updateKernelStatus('idle');
          } catch(e) { /* will restart on next run */ }
        } else {
          btn.textContent = 'Failed';
          btn.disabled = false;
          setTimeout(() => { btn.textContent = '+ venv'; }, 2000);
        }
      } catch(e) {
        btn.textContent = 'Error';
        btn.disabled = false;
        setTimeout(() => { btn.textContent = '+ venv'; }, 2000);
      }
    }

    function togglePackagesPanel() {
      const panel = document.getElementById('packages-panel');
      if (!panel) return;
      const wasHidden = panel.classList.contains('hidden');
      panel.classList.toggle('hidden');
      if (wasHidden) loadPackagesList();
    }

    async function loadPackagesList() {
      const listEl = document.getElementById('pkg-list');
      if (!listEl) return;
      listEl.textContent = 'Loading...';
      try {
        const resp = await fetch(`/api/experiments/${currentExpId}/packages`);
        const packages = await resp.json();
        if (!packages.length) {
          listEl.innerHTML = '<span class="text-dim">No packages installed</span>';
          return;
        }
        listEl.innerHTML = `<div class="flex flex-wrap gap-1.5">${packages.map(p =>
          `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-surface text-[0.75rem] border border-border-input">
            ${escapeHtml(p.name)} <span class="text-dim">${escapeHtml(p.version)}</span>
            <button class="ml-1 text-red-400 hover:text-red-300 cursor-pointer bg-transparent border-none p-0 text-[0.7rem]" onclick="uninstallPackage('${escapeHtml(p.name)}')" title="Uninstall">&times;</button>
          </span>`
        ).join('')}</div>`;
      } catch(e) {
        listEl.innerHTML = '<span class="text-red-400">Failed to load packages</span>';
      }
    }

    async function installPackages() {
      const input = document.getElementById('pkg-install-input');
      const statusEl = document.getElementById('pkg-install-status');
      if (!input || !input.value.trim()) return;
      const packages = input.value.trim();
      input.disabled = true;
      if (statusEl) { statusEl.classList.remove('hidden'); statusEl.className = 'text-[0.75rem] mb-2 text-muted'; statusEl.textContent = `Installing ${packages}...`; }
      try {
        const resp = await fetch(`/api/experiments/${currentExpId}/packages`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ packages })
        });
        const data = await resp.json();
        if (data.ok) {
          if (statusEl) { statusEl.className = 'text-[0.75rem] mb-2 text-emerald-400'; statusEl.textContent = 'Installed — kernel restarting...'; }
          input.value = '';
          loadPackagesList();
          // Kernel was killed server-side; restart it so next cell run uses new packages
          updateKernelStatus('dead');
          try {
            await fetch(`/api/experiments/${currentExpId}/kernel/restart`, {method:'POST'});
            updateKernelStatus('idle');
          } catch(e) { /* kernel will be recreated on next run */ }
          if (statusEl) { statusEl.className = 'text-[0.75rem] mb-2 text-emerald-400'; statusEl.textContent = 'Installed — kernel ready'; }
          setTimeout(() => { if (statusEl) statusEl.classList.add('hidden'); }, 3000);
        } else {
          if (statusEl) { statusEl.className = 'text-[0.75rem] mb-2 text-red-400'; statusEl.textContent = data.error || 'Install failed'; }
        }
      } catch(e) {
        if (statusEl) { statusEl.className = 'text-[0.75rem] mb-2 text-red-400'; statusEl.textContent = 'Install failed'; }
      }
      input.disabled = false;
    }

    async function uninstallPackage(name) {
      const statusEl = document.getElementById('pkg-install-status');
      if (statusEl) { statusEl.classList.remove('hidden'); statusEl.className = 'text-[0.75rem] mb-2 text-muted'; statusEl.textContent = `Uninstalling ${name}...`; }
      try {
        await fetch(`/api/experiments/${currentExpId}/packages/${encodeURIComponent(name)}`, { method: 'DELETE' });
        loadPackagesList();
        // Kernel was killed server-side; restart it
        updateKernelStatus('dead');
        try {
          await fetch(`/api/experiments/${currentExpId}/kernel/restart`, {method:'POST'});
          updateKernelStatus('idle');
        } catch(e) { /* kernel will be recreated on next run */ }
        if (statusEl) { statusEl.className = 'text-[0.75rem] mb-2 text-emerald-400'; statusEl.textContent = `${name} uninstalled`; }
        setTimeout(() => { if (statusEl) statusEl.classList.add('hidden'); }, 3000);
      } catch(e) {
        if (statusEl) { statusEl.className = 'text-[0.75rem] mb-2 text-red-400'; statusEl.textContent = 'Uninstall failed'; }
      }
    }

    function renderCellOutputs(outputs) {
      return outputs.map(o => {
        if (o.output_type === 'stream') {
          const text = Array.isArray(o.text) ? o.text.join('') : (o.text || '');
          if (!text) return '';
          const cls = o.name === 'stderr' ? 'text-red-400' : '';
          return `<div class="${cls}">${escapeHtml(text)}</div>`;
        }
        if (o.output_type === 'error') {
          const tb = (o.traceback || []).join('\n');
          // Strip ANSI codes for display
          const clean = tb.replace(/\x1b\[[0-9;]*m/g, '');
          return `<div class="text-red-400">${escapeHtml(clean || (o.ename + ': ' + o.evalue))}</div>`;
        }
        if (o.output_type === 'execute_result' || o.output_type === 'display_data') {
          const data = o.data || {};
          const parts = [];
          // Images
          if (data['image/png']) {
            parts.push(`<img src="data:image/png;base64,${data['image/png']}" class="max-w-full rounded" />`);
          }
          if (data['image/svg+xml']) {
            const svg = Array.isArray(data['image/svg+xml']) ? data['image/svg+xml'].join('') : data['image/svg+xml'];
            parts.push(`<div class="max-w-full">${svg}</div>`);
          }
          // HTML
          if (data['text/html']) {
            const html = Array.isArray(data['text/html']) ? data['text/html'].join('') : data['text/html'];
            parts.push(`<div class="nb-html-output">${html}</div>`);
          }
          // LaTeX
          if (data['text/latex']) {
            const latex = Array.isArray(data['text/latex']) ? data['text/latex'].join('') : data['text/latex'];
            parts.push(`<div class="text-muted">${escapeHtml(latex)}</div>`);
          }
          // Plain text fallback
          if (!parts.length && data['text/plain']) {
            const t = Array.isArray(data['text/plain']) ? data['text/plain'].join('') : data['text/plain'];
            parts.push(`<div>${escapeHtml(t)}</div>`);
          }
          return parts.join('');
        }
        return '';
      }).filter(Boolean).join('');
    }

    function renderNbCells() {
      const container = document.getElementById('nb-cells');
      if (!container || !nbData) return;
      // Clear old CodeMirror instances (DOM will be replaced below)
      cmInstances = [];
      container.innerHTML = nbData.cells.map((cell, i) => {
        const isCode = cell.cell_type === 'code';
        const src = Array.isArray(cell.source) ? cell.source.join('') : (cell.source || '');
        const outputs = renderCellOutputs(cell.outputs || []);

        return `<div class="mb-3 rounded-lg border border-border-dim overflow-hidden" data-cell="${i}">
          <div class="flex items-center gap-2 px-3 py-1.5 bg-card/30 border-b border-border-dim">
            <span class="text-[0.7rem] ${isCode ? 'text-emerald-400' : 'text-blue-400'} font-medium">${isCode ? 'Code' : 'Markdown'}</span>
            <span class="text-[0.65rem] text-dimmer">[${i+1}]</span>
            <div class="ml-auto flex gap-1">
              ${isCode ? `<button class="px-2 py-0.5 rounded text-[0.7rem] bg-emerald-500/20 text-emerald-400 border-none cursor-pointer hover:bg-emerald-500/30" onclick="runNbCell(${i})" title="Run cell (Shift+Enter)">Run</button>` : ''}
              ${isCode ? `<button class="px-2 py-0.5 rounded text-[0.7rem] bg-blue-500/10 text-blue-400 border-none cursor-pointer hover:bg-blue-500/20" onclick="exportCellToPy(${i})" title="Export to .py file">.py</button>` : ''}
              ${i > 0 ? `<button class="w-6 h-6 rounded bg-transparent border-none text-dimmer cursor-pointer flex items-center justify-center hover:text-primary text-[0.8rem]" onclick="moveNbCell(${i},-1)" title="Move up">&uarr;</button>` : ''}
              ${i < nbData.cells.length-1 ? `<button class="w-6 h-6 rounded bg-transparent border-none text-dimmer cursor-pointer flex items-center justify-center hover:text-primary text-[0.8rem]" onclick="moveNbCell(${i},1)" title="Move down">&darr;</button>` : ''}
              <button class="w-6 h-6 rounded bg-transparent border-none text-dimmer cursor-pointer flex items-center justify-center hover:text-red-400 text-[0.8rem]" onclick="deleteNbCell(${i})" title="Delete">&times;</button>
            </div>
          </div>
          <textarea data-cell-input="${i}">${escapeHtml(src)}</textarea>
          ${outputs ? `<div class="px-4 py-2 bg-body/50 border-t border-border-dim text-[0.8rem] font-mono text-muted whitespace-pre-wrap" data-cell-output="${i}">${outputs}</div>` : `<div class="hidden" data-cell-output="${i}"></div>`}
        </div>`;
      }).join('');

      // Initialize CodeMirror on each cell textarea
      nbData.cells.forEach((cell, i) => {
        const ta = container.querySelector(`[data-cell-input="${i}"]`);
        if (!ta) { cmInstances.push(null); return; }
        const isCode = cell.cell_type === 'code';
        const cm = CodeMirror.fromTextArea(ta, {
          mode: isCode ? 'python' : 'markdown',
          lineNumbers: true,
          matchBrackets: isCode,
          autoCloseBrackets: isCode,
          indentUnit: 4,
          tabSize: 4,
          indentWithTabs: false,
          lineWrapping: true,
          viewportMargin: Infinity,
          extraKeys: {
            'Shift-Enter': function() { if (isCode) runNbCell(i); },
            'Cmd-/': function(cm) { cm.toggleComment(); },
            'Ctrl-/': function(cm) { cm.toggleComment(); },
            'Tab': function(cm) {
              if (cm.somethingSelected()) cm.indentSelection('add');
              else cm.replaceSelection('    ', 'end');
            }
          }
        });
        cm.on('change', () => {
          if (!nbData || !nbData.cells[i]) return;
          nbData.cells[i].source = cm.getValue();
          scheduleNbSave();
        });
        cmInstances.push(cm);
      });
    }

    function updateNbCellSource(i, val) {
      if (!nbData || !nbData.cells[i]) return;
      nbData.cells[i].source = val;
      scheduleNbSave();
    }

    function scheduleNbSave() {
      clearTimeout(fileSaveTimer);
      fileSaveTimer = setTimeout(() => saveNotebook(), 600);
    }

    async function saveNotebook() {
      fileSaveTimer = null;
      if (!currentFile || !currentExpId || !nbData) return;
      await fetch(`/api/experiments/${currentExpId}/files/${currentFile}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({content: JSON.stringify(nbData, null, 2)})
      });
      const ind = document.getElementById('nb-save-ind');
      if (ind) { ind.style.opacity='1'; setTimeout(()=>ind.style.opacity='0',1500); }
    }

    function addNbCell(type) {
      if (!nbData) return;
      nbData.cells.push({cell_type: type, source: '', outputs: []});
      renderNbCells();
      scheduleNbSave();
      // Focus new CodeMirror cell
      setTimeout(() => {
        const cm = cmInstances[nbData.cells.length - 1];
        if (cm) cm.focus();
      }, 50);
    }

    function deleteNbCell(i) {
      if (!nbData || nbData.cells.length <= 1) return;
      nbData.cells.splice(i, 1);
      renderNbCells();
      scheduleNbSave();
    }

    function moveNbCell(i, dir) {
      if (!nbData) return;
      const j = i + dir;
      if (j < 0 || j >= nbData.cells.length) return;
      [nbData.cells[i], nbData.cells[j]] = [nbData.cells[j], nbData.cells[i]];
      renderNbCells();
      scheduleNbSave();
    }

    async function exportCellToPy(i) {
      if (!nbData || !nbData.cells[i]) return;
      const src = Array.isArray(nbData.cells[i].source) ? nbData.cells[i].source.join('') : nbData.cells[i].source;
      if (!src.trim()) return;
      const name = await createExpFile('.py', src);
      // Brief visual feedback
      const btn = document.querySelector(`[data-cell="${i}"] .text-blue-400`);
      if (btn && btn.textContent === '.py') { btn.textContent = 'Saved!'; setTimeout(() => { btn.textContent = '.py'; }, 1500); }
    }

    async function runNbCell(i) {
      if (!nbData || !nbData.cells[i] || nbData.cells[i].cell_type !== 'code') return;
      const src = Array.isArray(nbData.cells[i].source) ? nbData.cells[i].source.join('') : nbData.cells[i].source;
      if (!src.trim()) return;

      updateKernelStatus('busy');
      const outEl = document.querySelector(`[data-cell-output="${i}"]`);
      if (outEl) { outEl.classList.remove('hidden'); outEl.textContent = 'Running...'; outEl.className = outEl.className.replace('hidden',''); }

      try {
        const resp = await fetch(`/api/experiments/${currentExpId}/execute`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({code: src})
        });
        const result = await resp.json();
        const cellOutputs = result.outputs || [];

        nbData.cells[i].outputs = cellOutputs;

        if (outEl) {
          const rendered = renderCellOutputs(cellOutputs);
          if (rendered) {
            outEl.classList.remove('hidden');
            outEl.style.display = '';
            outEl.innerHTML = rendered;
          } else {
            outEl.classList.add('hidden');
          }
        }
        updateKernelStatus('idle');
        scheduleNbSave();
      } catch(e) {
        if (outEl) { outEl.classList.remove('hidden'); outEl.innerHTML = `<span class="text-red-400">${escapeHtml(e.message)}</span>`; }
        updateKernelStatus('dead');
      }
    }

    function updateKernelStatus(status) {
      kernelStatus = status;
      const dot = document.getElementById('kernel-dot');
      const text = document.getElementById('kernel-status-text');
      if (!dot || !text) return;
      const colors = {idle:'bg-emerald-500', busy:'bg-amber-500', dead:'bg-red-500'};
      dot.className = `w-2 h-2 rounded-full inline-block ${colors[status]||'bg-gray-500'}`;
      text.textContent = status;
    }

    async function restartKernel() {
      updateKernelStatus('dead');
      await fetch(`/api/experiments/${currentExpId}/kernel/restart`, {method:'POST'});
      updateKernelStatus('idle');
    }

    // ── New Run Modal ──
    function openNewRunModal() {
      document.getElementById('nr-name').value = '';
      document.getElementById('nr-status').value = 'running';
      document.getElementById('nr-algorithm').value = '';
      document.getElementById('nr-environment').value = '';
      document.getElementById('nr-reward').value = '';
      document.getElementById('nr-episodes').value = '';
      document.getElementById('nr-hp-list').innerHTML = '';
      document.getElementById('rl-config-section').style.display = 'none';
      document.getElementById('rl-config-arrow').style.transform = '';
      document.getElementById('new-run-overlay').style.display = 'flex';
      setTimeout(() => document.getElementById('nr-name').focus(), 50);
    }
    function closeNewRunModal() {
      document.getElementById('new-run-overlay').style.display = 'none';
    }
    function toggleRLConfig() {
      const section = document.getElementById('rl-config-section');
      const arrow = document.getElementById('rl-config-arrow');
      const show = section.style.display === 'none';
      section.style.display = show ? '' : 'none';
      arrow.style.transform = show ? 'rotate(90deg)' : '';
    }
    function addNewRunHP() {
      const list = document.getElementById('nr-hp-list');
      const i = list.children.length;
      const div = document.createElement('div');
      div.className = 'flex gap-2 mb-1';
      div.innerHTML = `
        <input type="text" class="flex-1 px-2 py-1 rounded border border-border-input bg-input text-primary text-[0.8rem] focus:outline-none focus:border-accent" placeholder="key" />
        <input type="text" class="flex-1 px-2 py-1 rounded border border-border-input bg-input text-primary text-[0.8rem] focus:outline-none focus:border-accent" placeholder="value" />
        <button onclick="this.parentElement.remove()" class="text-dimmer hover:text-red-400 bg-transparent border-none cursor-pointer text-sm">&times;</button>`;
      list.appendChild(div);
      div.querySelector('input').focus();
    }
    async function createRun() {
      const name = document.getElementById('nr-name').value.trim();
      if (!name) return;
      const hp = {};
      document.querySelectorAll('#nr-hp-list > div').forEach(row => {
        const inputs = row.querySelectorAll('input');
        const k = inputs[0].value.trim();
        const v = inputs[1].value.trim();
        if (k) {
          const num = Number(v);
          hp[k] = v !== '' && !isNaN(num) ? num : v;
        }
      });
      const rewardVal = document.getElementById('nr-reward').value;
      const episodesVal = document.getElementById('nr-episodes').value;
      const body = {
        name,
        status: document.getElementById('nr-status').value,
        algorithm: document.getElementById('nr-algorithm').value.trim(),
        environment: document.getElementById('nr-environment').value.trim(),
        reward: rewardVal !== '' ? Number(rewardVal) : null,
        episodes: episodesVal !== '' ? Number(episodesVal) : null,
        hyperparameters: hp,
        created: Date.now()
      };
      const resp = await fetch(`/api/experiments/${currentExpId}/runs`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      if (resp.ok) {
        const run = await resp.json();
        currentExp.runs = currentExp.runs || [];
        currentExp.runs.push(run);
        closeNewRunModal();
        renderRunsTable();
      }
    }
    document.getElementById('nr-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); createRun(); }
    });

    // Close modals on Escape
    window.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (document.getElementById('new-run-overlay').style.display === 'flex') closeNewRunModal();
        else if (document.getElementById('settings-overlay').style.display === 'flex') closeSettings();
      }
    });
  </script>
</body>
