        const isNb = f.endsWith('.ipynb');
        const icon = isNb
          ? '<svg class="w-3.5 h-3.5 shrink-0 text-[#f60]" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>'
          : '<svg class="w-3.5 h-3.5 shrink-0 text-dimmer" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>';
        return `
        <div class="flex items-center gap-1 group px-2 py-1.5 rounded-md cursor-pointer text-[0.85rem] transition-colors ${f === activeFileName ? 'bg-card text-white_ border border-accent' : 'text-primary hover:bg-card border border-transparent'}" onclick="openExpFile('${escapeHtml(f)}')">
          ${icon}
          <span class="flex-1 truncate">${escapeHtml(f)}</span>
          <button onclick="event.stopPropagation(); deleteExpFile('${escapeHtml(f)}')" class="opacity-0 group-hover:opacity-100 bg-transparent border-none text-dimmer hover:text-red-400 cursor-pointer text-[0.75rem] p-0.5">&times;</button>
        </div>`;
      }).join('');
    }

    async function createExpFile(ext) {
      if (!currentExpId) return;
      if (!ext) ext = 'md';
      const label = ext === 'ipynb' ? 'Notebook name:' : 'File name:';
      const name = prompt(label);
      if (!name || !name.trim()) return;
      const fullName = name.trim().endsWith('.' + ext) ? name.trim() : name.trim() + '.' + ext;
      const resp = await fetch(`/api/experiments/${currentExpId}/files`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name: fullName })
      });
      if (resp.ok) {
        const data = await resp.json();
        await fetchExpFiles();
        openExpFile(data.name);
      } else {
        const err = await resp.json();
        alert(err.error || 'Failed to create file');
      }
    }

    async function openExpFile(fname) {
      if (fileSaveTimer) { clearTimeout(fileSaveTimer); fileSaveTimer = null; await saveActiveFile(); }
      activeFileName = fname;
      renderExpFiles();
      try {
        const resp = await fetch(`/api/experiments/${currentExpId}/files/${encodeURIComponent(fname)}`);
        const data = await resp.json();
        if (fname.endsWith('.ipynb')) {
          showNotebookEditor(data.name, data.content);
        } else {
          showFileEditor(data.name, data.content);
        }
      } catch (e) {
        if (fname.endsWith('.ipynb')) {
          showNotebookEditor(fname, '');
        } else {
          showFileEditor(fname, '');
        }
      }
    }

    function showFileEditor(fname, content) {
      const panel = document.getElementById('exp-right-panel');
      document.getElementById('tree-svg').style.display = 'none';
      document.getElementById('tree-hint').style.display = 'none';

      let editor = document.getElementById('exp-file-editor');
      if (!editor) {
        editor = document.createElement('div');
        editor.id = 'exp-file-editor';
        editor.className = 'absolute inset-0 flex flex-col';
        panel.appendChild(editor);
      }
      editor.style.display = 'flex';
      editor.innerHTML = `
        <div class="flex items-center gap-3 px-4 py-2.5 border-b border-border-dim bg-header shrink-0">
          <svg class="w-4 h-4 text-dimmer shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <span class="text-[0.9rem] font-medium text-white_ flex-1">${escapeHtml(fname)}</span>
          <span class="text-[0.75rem] text-emerald-400 opacity-0 transition-opacity duration-300" id="file-save-indicator">Saved</span>
          <button onclick="closeFileEditor()" class="text-dim hover:text-primary bg-transparent border-none cursor-pointer text-[0.85rem]">Back to tree</button>
        </div>
        <textarea id="exp-file-textarea" class="flex-1 w-full p-5 bg-canvas text-primary font-mono text-[0.9rem] leading-relaxed resize-none border-none outline-none" spellcheck="false" placeholder="Write markdown here...">${escapeHtml(content)}</textarea>
      `;
      const ta = document.getElementById('exp-file-textarea');
      ta.addEventListener('input', () => scheduleFileSave());
      ta.focus();
    }

    // ── Notebook Editor ──
    let nbData = null;

    function parseNotebook(raw) {
      try {
        return typeof raw === 'string' ? JSON.parse(raw) : raw;
      } catch (e) {
        return { nbformat: 4, nbformat_minor: 5, metadata: {}, cells: [{ cell_type: 'code', source: '', metadata: {}, outputs: [], execution_count: null }] };
      }
    }

    function showNotebookEditor(fname, content) {
      nbData = parseNotebook(content);
      const panel = document.getElementById('exp-right-panel');
      document.getElementById('tree-svg').style.display = 'none';
      document.getElementById('tree-hint').style.display = 'none';

      let editor = document.getElementById('exp-file-editor');
      if (!editor) {
        editor = document.createElement('div');
        editor.id = 'exp-file-editor';
        editor.className = 'absolute inset-0 flex flex-col';
        panel.appendChild(editor);
      }
      editor.style.display = 'flex';
      editor.innerHTML = `
        <div class="flex items-center gap-3 px-4 py-2.5 border-b border-border-dim bg-header shrink-0">
          <svg class="w-4 h-4 text-[#f60] shrink-0" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
          <span class="text-[0.9rem] font-medium text-white_ flex-1">${escapeHtml(fname)}</span>
          <span class="text-[0.75rem] text-emerald-400 opacity-0 transition-opacity duration-300" id="file-save-indicator">Saved</span>
          <button onclick="closeFileEditor()" class="text-dim hover:text-primary bg-transparent border-none cursor-pointer text-[0.85rem]">Back to tree</button>
        </div>
        <div id="nb-cells" class="flex-1 overflow-y-auto p-4"></div>
        <div class="flex gap-2 px-4 py-2.5 border-t border-border-dim bg-header shrink-0">
          <button onclick="nbAddCell('code')" class="px-3 py-1.5 rounded-md border border-border-input bg-card text-muted text-[0.8rem] cursor-pointer hover:border-accent hover:text-primary">+ Code</button>
          <button onclick="nbAddCell('markdown')" class="px-3 py-1.5 rounded-md border border-border-input bg-card text-muted text-[0.8rem] cursor-pointer hover:border-accent hover:text-primary">+ Markdown</button>
        </div>
      `;
      renderNotebookCells();
    }

    function renderNotebookCells() {
      const container = document.getElementById('nb-cells');
      if (!container || !nbData) return;
      const cells = nbData.cells || [];
      container.innerHTML = cells.map((cell, i) => {
        const isCode = cell.cell_type === 'code';
        const src = Array.isArray(cell.source) ? cell.source.join('') : (cell.source || '');
        const outputHtml = isCode ? renderCellOutputs(cell.outputs || []) : '';
        return `
          <div class="mb-3 rounded-lg border border-border-card bg-card overflow-hidden">
            <div class="flex items-center gap-2 px-3 py-1.5 bg-header border-b border-border-dim">
              <span class="text-[0.7rem] font-mono ${isCode ? 'text-[#4a9eff]' : 'text-[#4a9]'}">${isCode ? 'Code' : 'Markdown'}</span>
              <span class="text-[0.65rem] text-dimmest">[${i + 1}]</span>
              <div class="ml-auto flex gap-1">
                ${i > 0 ? `<button onclick="nbMoveCell(${i},-1)" class="bg-transparent border-none text-dimmer hover:text-primary cursor-pointer text-[0.7rem] px-1">&uarr;</button>` : ''}
                ${i < cells.length - 1 ? `<button onclick="nbMoveCell(${i},1)" class="bg-transparent border-none text-dimmer hover:text-primary cursor-pointer text-[0.7rem] px-1">&darr;</button>` : ''}
                <button onclick="nbDeleteCell(${i})" class="bg-transparent border-none text-dimmer hover:text-red-400 cursor-pointer text-[0.7rem] px-1">&times;</button>
              </div>
            </div>
            <textarea data-nb-cell="${i}" class="w-full p-3 bg-canvas text-primary font-mono text-[0.85rem] leading-relaxed resize-y border-none outline-none min-h-[60px]" spellcheck="false" placeholder="${isCode ? '# code...' : 'Markdown...'}">${escapeHtml(src)}</textarea>
            ${outputHtml ? `<div class="px-3 py-2 border-t border-border-dim bg-body text-[0.8rem] font-mono text-muted whitespace-pre-wrap">${outputHtml}</div>` : ''}
          </div>`;
      }).join('') || '<div class="text-center py-10 text-dimmest text-[0.85rem]">Empty notebook. Add a cell below.</div>';

      container.querySelectorAll('textarea[data-nb-cell]').forEach(ta => {
        ta.addEventListener('input', () => {
          const idx = parseInt(ta.dataset.nbCell, 10);
          nbData.cells[idx].source = ta.value;
          scheduleFileSave();
        });
      });
    }

    function renderCellOutputs(outputs) {
      if (!outputs.length) return '';
      return outputs.map(o => {
        if (o.text) return escapeHtml(Array.isArray(o.text) ? o.text.join('') : o.text);
        if (o.data && o.data['text/plain']) return escapeHtml(Array.isArray(o.data['text/plain']) ? o.data['text/plain'].join('') : o.data['text/plain']);
        return '';
      }).filter(Boolean).join('\n');
    }

    function nbAddCell(type) {
      if (!nbData) return;
      const cell = { cell_type: type, source: '', metadata: {} };
      if (type === 'code') { cell.outputs = []; cell.execution_count = null; }
      nbData.cells.push(cell);
      renderNotebookCells();
      scheduleFileSave();
    }

    function nbDeleteCell(i) {
      if (!nbData || nbData.cells.length <= 1) return;
      nbData.cells.splice(i, 1);
      renderNotebookCells();
      scheduleFileSave();
    }

    function nbMoveCell(i, dir) {
      if (!nbData) return;
      const j = i + dir;
      if (j < 0 || j >= nbData.cells.length) return;
      [nbData.cells[i], nbData.cells[j]] = [nbData.cells[j], nbData.cells[i]];
      renderNotebookCells();
      scheduleFileSave();
    }

    function closeFileEditor() {
      if (fileSaveTimer) { clearTimeout(fileSaveTimer); fileSaveTimer = null; saveActiveFile(); }
      activeFileName = null;
      nbData = null;
      renderExpFiles();
      const editor = document.getElementById('exp-file-editor');
      if (editor) editor.style.display = 'none';
      document.getElementById('tree-svg').style.display = '';
      document.getElementById('tree-hint').style.display = '';
      renderTree();
    }

    function scheduleFileSave() {
      clearTimeout(fileSaveTimer);
      fileSaveTimer = setTimeout(() => saveActiveFile(), 600);
    }

    async function saveActiveFile() {
      fileSaveTimer = null;
      if (!activeFileName || !currentExpId) return;
      let content;
      if (activeFileName.endsWith('.ipynb') && nbData) {
        content = JSON.stringify(nbData, null, 2);
      } else {
        const ta = document.getElementById('exp-file-textarea');
        if (!ta) return;
        content = ta.value;
      }
      await fetch(`/api/experiments/${currentExpId}/files/${encodeURIComponent(activeFileName)}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ content })
      });
      const ind = document.getElementById('file-save-indicator');
      if (ind) { ind.style.opacity = '1'; setTimeout(() => ind.style.opacity = '0', 1500); }
    }

    async function deleteExpFile(fname) {
      if (!confirm(`Delete ${fname}?`)) return;
      await fetch(`/api/experiments/${currentExpId}/files/${encodeURIComponent(fname)}`, { method: 'DELETE' });
      if (activeFileName === fname) closeFileEditor();
      await fetchExpFiles();
    }

    // ── SVG Tree Rendering ──
    const NODE_W = 140;
    const NODE_H = 44;
    const H_GAP = 30;
    const V_GAP = 70;

    let svgPan = { x: 0, y: 0 };
    let svgZoom = 1;
    let dragging = false;
    let dragStart = { x: 0, y: 0 };

    function renderTree() {
      const svg = document.getElementById('tree-svg');
      const versions = currentExp?.versions || [];

      if (!versions.length && !expFiles.length) {
        svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="#333" font-size="14" font-family="inherit">Add a version or file to see the map</text>`;
        return;
      }

      const byId = {};
      versions.forEach(v => { byId[v.id] = { ...v, children: [] }; });

      const roots = [];
      versions.forEach(v => {
        if (v.parentId && byId[v.parentId]) {
          byId[v.parentId].children.push(byId[v.id]);
        } else {
          roots.push(byId[v.id]);
        }
      });

      // Add file nodes as leaves attached to a virtual file group
      const fileNodes = expFiles.map((f, i) => ({
        _isFile: true,
        _fileName: f,
        id: '__file__' + f,
        children: []
      }));

      let nextX = 0;

      function layoutNode(node, depth) {
        node._depth = depth;
        if (node.children.length === 0) {
          node._x = nextX;
          node._y = depth;
          nextX++;
        } else {
          node.children.forEach(c => layoutNode(c, depth + 1));
          const first = node.children[0]._x;
          const last = node.children[node.children.length - 1]._x;
          node._x = (first + last) / 2;
          node._y = depth;
        }
      }

      roots.forEach(r => layoutNode(r, 0));

      // Find the max depth used by version nodes
      const allVersionNodes = Object.values(byId);
      let maxDepth = 0;
      allVersionNodes.forEach(n => { if (n._y > maxDepth) maxDepth = n._y; });

      // Layout file nodes on a row below all version nodes
      const fileDepth = versions.length ? maxDepth + 1 : 0;
      fileNodes.forEach(fn => {
        fn._x = nextX;
        fn._y = fileDepth;
        fn._depth = fileDepth;
        nextX++;
      });

      const padding = 60;
      const allNodes = [...allVersionNodes, ...fileNodes];

      allNodes.forEach(n => {
        n._px = padding + n._x * (NODE_W + H_GAP) + NODE_W / 2;
        n._py = padding + n._y * (NODE_H + V_GAP) + NODE_H / 2;
      });

      const statusColor = {
        planned: '#555',
        running: '#4a9eff',
        completed: '#4a9',
        failed: '#e55'
      };

      let edges = '';
      allVersionNodes.forEach(n => {
        if (n.parentId && byId[n.parentId]) {
          const p = byId[n.parentId];
          const x1 = p._px, y1 = p._py + NODE_H / 2;
          const x2 = n._px, y2 = n._py - NODE_H / 2;
          const midY = (y1 + y2) / 2;
          edges += `<path class="tree-edge" d="M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}" />`;
        }
      });

      let nodes = '';
      allVersionNodes.forEach(n => {
        const x = n._px - NODE_W / 2;
        const y = n._py - NODE_H / 2;
        const color = statusColor[n.status] || '#555';
        const isSelected = n.id === selectedVersionId;
        nodes += `
          <g class="tree-node" onclick="selectVersion('${n.id}')">
            <rect x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}"
                  fill="#181818" stroke="${color}" stroke-opacity="${isSelected ? 1 : 0.5}" />
            <circle cx="${x + 14}" cy="${n._py}" r="4" fill="${color}" />
            <text x="${x + 24}" y="${n._py + 4}" font-size="12">
              ${escapeHtml(n.name.length > 12 ? n.name.slice(0, 12) + '...' : n.name)}
            </text>
          </g>`;
      });

      // Render file nodes with a distinct style
      fileNodes.forEach(fn => {
        const x = fn._px - NODE_W / 2;
        const y = fn._py - NODE_H / 2;
        const isActive = fn._fileName === activeFileName;
        const isNb = fn._fileName.endsWith('.ipynb');
        const nodeColor = isNb ? '#f60' : '#b4451a';
        const bgFill = isNb ? '#1a1208' : '#181210';
        const label = fn._fileName.length > 14 ? fn._fileName.slice(0, 14) + '...' : fn._fileName;
        nodes += `
          <g class="tree-node" onclick="openExpFile('${escapeHtml(fn._fileName)}')">
            <rect x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}"
                  fill="${bgFill}" stroke="${nodeColor}" stroke-opacity="${isActive ? 1 : 0.4}" stroke-dasharray="${isActive ? '' : '4 2'}" />
            ${isNb
              ? `<circle cx="${x + 14}" cy="${fn._py}" r="6" fill="none" stroke="${nodeColor}" stroke-width="1.5" stroke-opacity="0.6"/><circle cx="${x + 14}" cy="${fn._py}" r="2" fill="${nodeColor}" fill-opacity="0.6"/>`
              : `<path d="M${x + 8},${fn._py - 7} h8 l4,4 v10 h-12 z" fill="none" stroke="${nodeColor}" stroke-width="1.5" stroke-opacity="0.6"/>`
            }
            <text x="${x + 26}" y="${fn._py + 4}" font-size="12">
              ${escapeHtml(label)}
            </text>
          </g>`;
      });

      const transform = `translate(${svgPan.x},${svgPan.y}) scale(${svgZoom})`;
      svg.innerHTML = `<g id="tree-root" transform="${transform}">${edges}${nodes}</g>`;
    }

    // Pan & zoom
    (function setupPanZoom() {
      const svg = document.getElementById('tree-svg');

      svg.addEventListener('mousedown', e => {
        if (e.target.closest('.tree-node')) return;
        dragging = true;
        dragStart = { x: e.clientX - svgPan.x, y: e.clientY - svgPan.y };
      });

      window.addEventListener('mousemove', e => {
        if (!dragging) return;
        svgPan.x = e.clientX - dragStart.x;
        svgPan.y = e.clientY - dragStart.y;
        const root = document.getElementById('tree-root');
        if (root) root.setAttribute('transform', `translate(${svgPan.x},${svgPan.y}) scale(${svgZoom})`);
      });

      window.addEventListener('mouseup', () => { dragging = false; });

      svg.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newZoom = Math.min(3, Math.max(0.2, svgZoom * delta));

        const rect = svg.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        svgPan.x = mx - (mx - svgPan.x) * (newZoom / svgZoom);
        svgPan.y = my - (my - svgPan.y) * (newZoom / svgZoom);
        svgZoom = newZoom;

        const root = document.getElementById('tree-root');
        if (root) root.setAttribute('transform', `translate(${svgPan.x},${svgPan.y}) scale(${svgZoom})`);
      }, { passive: false });
    })();
  </script>
</body>
</html>
