<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>arXiv CS Feed Filter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #222;
      background: #111;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls input[type="text"] {
      flex: 1;
      min-width: 250px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.95rem;
    }

    .controls input[type="text"]:focus {
      outline: none;
      border-color: #b4451a;
    }

    .controls select {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .controls select:focus { outline: none; border-color: #b4451a; }

    .stats {
      font-size: 0.85rem;
      color: #888;
      padding: 8px 32px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 32px 64px;
    }

    .paper {
      border-bottom: 1px solid #1a1a1a;
      padding: 20px 0;
    }

    .paper:last-child { border-bottom: none; }

    .paper-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .paper-title a {
      color: #d4845a;
      text-decoration: none;
    }

    .paper-title a:hover { text-decoration: underline; }

    .paper-authors {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 8px;
    }

    .paper-categories {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .paper-categories span {
      font-size: 0.75rem;
      background: #1e1e1e;
      color: #aaa;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #2a2a2a;
    }

    .paper-summary {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #bbb;
    }

    .paper-summary.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .toggle-summary {
      background: none;
      border: none;
      color: #d4845a;
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 4px;
      padding: 0;
    }

    .toggle-summary:hover { text-decoration: underline; }

    .loading {
      text-align: center;
      padding: 80px 0;
      color: #666;
      font-size: 1rem;
    }

    .loading .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #b4451a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      text-align: center;
      padding: 80px 0;
      color: #e55;
    }
  </style>
</head>
<body>
  <header>
    <h1>arXiv CS Feed Filter</h1>
    <div class="controls">
      <input type="text" id="search" placeholder="Filter by keyword (title, authors, abstract)..." />
      <select id="category">
        <option value="">All Categories</option>
      </select>
    </div>
  </header>
  <div class="stats" id="stats"></div>
  <main id="papers">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading arXiv CS feed...</div>
    </div>
  </main>

  <script>
    let allPapers = [];
    let allCategories = new Set();

    async function fetchFeed() {
      try {
        const resp = await fetch('/feed');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();
        parseFeed(text);
      } catch (err) {
        document.getElementById('papers').innerHTML =
          `<div class="error">
            <p>Failed to load feed: ${err.message}</p>
            <p style="margin-top:8px;font-size:0.85rem;color:#888">
              Try refreshing or check your connection.
            </p>
          </div>`;
      }
    }

    function parseFeed(xml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      const items = doc.querySelectorAll('item');

      allPapers = Array.from(items).map(item => {
        const title = (item.querySelector('title')?.textContent || '').trim();
        const link = (item.querySelector('link')?.textContent || '').trim();
        const description = (item.querySelector('description')?.textContent || '').trim();

        // Extract authors from dc:creator
        const creators = item.getElementsByTagNameNS('http://purl.org/dc/elements/1.1/', 'creator');
        const authors = Array.from(creators).map(c => c.textContent.trim()).join(', ')
          || extractAuthors(description);

        // Extract categories
        const cats = item.querySelectorAll('category');
        const categories = Array.from(cats).map(c => c.textContent.trim());
        categories.forEach(c => allCategories.add(c));

        // Clean up description - strip HTML
        const cleanDesc = stripHtml(description);

        return { title, link, authors, categories, description: cleanDesc };
      });

      populateCategories();
      renderPapers();
    }

    function extractAuthors(desc) {
      // Some feeds embed authors in the description
      const match = desc.match(/Authors?:\s*(.+?)(?:\.|<br|$)/i);
      return match ? match[1].trim() : '';
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    function populateCategories() {
      const select = document.getElementById('category');
      const sorted = Array.from(allCategories).sort();
      sorted.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });
    }

    function renderPapers() {
      const search = document.getElementById('search').value.toLowerCase();
      const category = document.getElementById('category').value;

      const filtered = allPapers.filter(p => {
        if (category && !p.categories.includes(category)) return false;
        if (search) {
          const haystack = `${p.title} ${p.authors} ${p.description}`.toLowerCase();
          // Support multiple terms separated by spaces (AND logic)
          const terms = search.split(/\s+/).filter(Boolean);
          return terms.every(t => haystack.includes(t));
        }
        return true;
      });

      document.getElementById('stats').textContent =
        `Showing ${filtered.length} of ${allPapers.length} papers`;

      const container = document.getElementById('papers');

      if (filtered.length === 0) {
        container.innerHTML = '<div class="loading" style="color:#666">No papers match your filter.</div>';
        return;
      }

      container.innerHTML = filtered.map((p, i) => `
        <div class="paper">
          <div class="paper-title">
            <a href="${p.link}" target="_blank" rel="noopener">${escapeHtml(p.title)}</a>
          </div>
          ${p.authors ? `<div class="paper-authors">${escapeHtml(p.authors)}</div>` : ''}
          ${p.categories.length ? `
            <div class="paper-categories">
              ${p.categories.map(c => `<span>${escapeHtml(c)}</span>`).join('')}
            </div>` : ''}
          <div class="paper-summary collapsed" id="summary-${i}">${escapeHtml(p.description)}</div>
          ${p.description.length > 200 ? `
            <button class="toggle-summary" onclick="toggleSummary(${i}, this)">Show more</button>
          ` : ''}
        </div>
      `).join('');
    }

    function toggleSummary(i, btn) {
      const el = document.getElementById(`summary-${i}`);
      const collapsed = el.classList.toggle('collapsed');
      btn.textContent = collapsed ? 'Show more' : 'Show less';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Debounced filtering
    let debounceTimer;
    function onFilterChange() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(renderPapers, 150);
    }

    document.getElementById('search').addEventListener('input', onFilterChange);
    document.getElementById('category').addEventListener('change', renderPapers);

    fetchFeed();
  </script>
</body>
</html>
