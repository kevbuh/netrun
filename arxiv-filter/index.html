<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>alpha</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/comment/comment.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          body: 'var(--bg-body)',
          primary: 'var(--text-primary)',
          white_: 'var(--text-white)',
          muted: 'var(--text-muted)',
          dim: 'var(--text-dim)',
          dimmer: 'var(--text-dimmer)',
          dimmest: 'var(--text-dimmest)',
          sidebar: 'var(--bg-sidebar)',
          'border-sidebar': 'var(--border-sidebar)',
          hover: 'var(--bg-hover)',
          card: 'var(--bg-card)',
          input: 'var(--bg-input)',
          'input-alt': 'var(--bg-input-alt)',
          'border-card': 'var(--border-card)',
          'border-input': 'var(--border-input)',
          'border-subtle': 'var(--border-subtle)',
          'border-dim': 'var(--border-dim)',
          header: 'var(--bg-header)',
          canvas: 'var(--bg-canvas)',
          popup: 'var(--bg-popup)',
          'chip-count': 'var(--bg-chip-count)',
          'cat-tag': 'var(--bg-cat-tag)',
          'cat-tag-color': 'var(--bg-cat-tag-color)',
          cite: 'var(--bg-cite)',
          'sidebar-cat': 'var(--bg-sidebar-cat)',
          'sidebar-cat-border': 'var(--sidebar-cat-border)',
          'sidebar-cat-color': 'var(--sidebar-cat-color)',
          link: 'var(--text-link)',
          accent: 'var(--accent)',
          'accent-hover': 'var(--accent-hover)',
          summary: 'var(--text-summary)',
          authors: 'var(--text-authors)',
          'meta-value': 'var(--text-meta-value)',
          'idea-desc': 'var(--text-idea-desc)',
          'tree-edge': 'var(--tree-edge)',
          'spinner-border': 'var(--spinner-border)',
          tooltip: 'var(--tooltip-bg)',
          'tooltip-border': 'var(--tooltip-border)',
          overlay: 'var(--overlay-bg)',
        },
        boxShadow: {
          card: '0 6px 20px var(--shadow-card)',
          popup: '0 16px 48px var(--shadow-popup)',
        },
      }
    }
  }
  </script>
  <link rel="stylesheet" href="/styles.css">
  <script>
    // Apply theme + accent before paint to prevent flash
    (function() {
      var t = localStorage.getItem('theme');
      if (t && t !== 'dark') document.documentElement.setAttribute('data-theme', t);
      var a = localStorage.getItem('accentColor');
      if (a) {
        var r = parseInt(a.slice(1,3),16), g = parseInt(a.slice(3,5),16), b = parseInt(a.slice(5,7),16);
        var h = '#' + [Math.min(255,r+20),Math.min(255,g+20),Math.min(255,b+20)].map(function(v){return v.toString(16).padStart(2,'0')}).join('');
        document.documentElement.style.setProperty('--accent', a);
        document.documentElement.style.setProperty('--accent-hover', h);
      }
    })();
  </script>
</head>
<body class="font-[-apple-system,BlinkMacSystemFont,'Segoe_UI',Roboto,sans-serif] bg-body text-primary min-h-screen">

  <nav class="w-[60px] bg-sidebar border-r border-border-sidebar flex flex-col items-center py-4 gap-1 fixed top-0 left-0 bottom-0 z-20">
    <button class="sidebar-icon active w-11 h-11 rounded-xl flex items-center justify-center cursor-pointer transition-colors duration-150 relative border-none bg-transparent text-primary hover:bg-hover" id="sb-dashboard" onclick="openDashboard()">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">Home</span>
    </button>
    <button class="sidebar-icon w-11 h-11 rounded-xl flex items-center justify-center cursor-pointer transition-colors duration-150 relative border-none bg-transparent text-primary hover:bg-hover" id="sb-home" onclick="goHome()">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 2l5 5h-5V4zM6 20V4h5v7h7v9H6z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">Feed</span>
    </button>
    <button class="sidebar-icon w-11 h-11 rounded-xl flex items-center justify-center cursor-pointer transition-colors duration-150 relative border-none bg-transparent text-primary hover:bg-hover" id="sb-experiments" onclick="openExperiments()">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M7 2v2h1v7.15L5.03 17.49C4.08 19.3 5.36 21.5 7.41 21.5h9.18c2.05 0 3.33-2.2 2.38-4.01L16 11.15V4h1V2H7zm7 9.85l2.88 5.15H7.12L10 11.85V4h4v7.85z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">Experiments</span>
    </button>
    <div class="w-7 h-px bg-border-subtle my-1.5"></div>
    <button class="sidebar-icon w-11 h-11 rounded-xl flex items-center justify-center cursor-pointer transition-colors duration-150 relative border-none bg-transparent text-primary hover:bg-hover" id="sb-saved" onclick="openSaved()">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
      <span id="saved-badge" class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] rounded-full bg-accent text-white text-[0.65rem] font-semibold flex items-center justify-center leading-none px-1 pointer-events-none" style="display:none"></span>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">Reading List</span>
    </button>
    <button class="sidebar-icon w-11 h-11 rounded-xl flex items-center justify-center cursor-pointer transition-colors duration-150 relative border-none bg-transparent text-primary hover:bg-hover" id="sb-calendar" onclick="openCalendar()">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">Calendar</span>
    </button>
    <button class="sidebar-icon w-11 h-11 rounded-xl flex items-center justify-center cursor-pointer transition-colors duration-150 relative border-none bg-transparent text-primary hover:bg-hover" id="sb-todos" onclick="openTodos()">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M22 8c0-.55-.45-1-1-1h-7c-.55 0-1 .45-1 1s.45 1 1 1h7c.55 0 1-.45 1-1zm0 8c0-.55-.45-1-1-1h-7c-.55 0-1 .45-1 1s.45 1 1 1h7c.55 0 1-.45 1-1zm-10.29-3.29l-3.3 3.29L7 14.59a.996.996 0 10-1.41 1.41l2.12 2.12a.996.996 0 001.41 0l4-4a.996.996 0 10-1.41-1.41zM10.12 8.71l-3.3 3.29L5.41 10.59a.996.996 0 10-1.41 1.41l2.12 2.12a.996.996 0 001.41 0l4-4a.996.996 0 10-1.41-1.41z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">Notes</span>
    </button>
    <div class="mt-auto"></div>
    <button class="sidebar-icon w-11 h-11 rounded-xl flex items-center justify-center cursor-pointer transition-colors duration-150 relative border-none bg-transparent text-primary hover:bg-hover" id="sb-settings" onclick="openSettings()">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
      <span class="sidebar-tooltip absolute left-14 top-1/2 -translate-y-1/2 bg-tooltip text-primary text-[0.78rem] px-2.5 py-1 rounded-md whitespace-nowrap pointer-events-none z-30 border border-tooltip-border">Settings</span>
    </button>
  </nav>

  <!-- Dashboard View -->
  <div id="dashboard-view" class="hidden ml-[60px] view">
    <div class="max-w-[960px] mx-auto px-8 pt-6 pb-16">
      <div id="dashboard-content"></div>
    </div>
  </div>

  <!-- Home Main Content -->
  <div class="flex-1 ml-[60px] px-6 pt-6" id="home-main">
    <!-- Onboarding View -->
    <div id="onboard-view" style="display:none" class="py-12 overflow-y-auto">
      <div class="text-center max-w-[640px] mx-auto px-4">
        <h1 class="text-white_ text-[1.8rem] font-semibold mb-2">What do you want to read?</h1>
        <p class="text-muted text-[0.95rem] mb-8">Pick your sources. You can change these anytime in settings.</p>
        <div id="onboard-grid"></div>
        <div class="mt-8">
          <button id="onboard-start-btn" disabled onclick="completeOnboarding()" class="px-8 py-3 rounded-xl border-none bg-accent text-white text-[0.95rem] font-medium cursor-pointer hover:bg-accent-hover transition-colors disabled:opacity-30 disabled:cursor-not-allowed">Start reading</button>
        </div>
      </div>
    </div>

    <div id="finder-section" class="mb-3" style="display:none">
        <form id="finder-form">
          <div class="relative max-w-[680px] mx-auto">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-dimmer pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
            <input type="text" id="finder-query" placeholder="Search..." autocomplete="off" class="w-full pl-9 pr-4 py-1.5 rounded-lg border border-border-input bg-card text-primary text-[0.85rem] focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all" />
          </div>
        </form>
      </div>
      <div id="finder-results-masonry" class="pb-16"></div>

      <div id="home-feed-section" style="display:none">
        <input type="hidden" id="search" value="" />
        <div class="text-[0.8rem] text-dim py-1 pb-3 flex items-center gap-2" id="stats-row">
          <span id="stats"></span>
          <span id="eval-indicator" class="text-dim animate-pulse hidden">● Evaluating <span id="eval-count">0</span>…</span>
          <span id="refresh-countdown" class="tabular-nums text-dim ml-auto"></span>
        </div>
        <div id="trends-panel" style="display:none" class="pb-3 flex items-center gap-2 overflow-x-auto scrollbar-hide">
          <button class="sort-btn shrink-0 w-8 h-8 rounded-lg border border-border-input bg-card text-muted cursor-pointer transition-all duration-150 hover:border-accent hover:text-primary flex items-center justify-center" id="sort-citations" onclick="setSortMode(currentSort === 'citations' ? 'latest' : 'citations')" title="Most Cited"><svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61z"/></svg></button>
          <button class="sort-btn shrink-0 w-8 h-8 rounded-lg border border-border-input bg-card text-muted cursor-pointer transition-all duration-150 hover:border-accent hover:text-primary flex items-center justify-center" id="view-mode-btn" onclick="toggleViewMode()" title="Toggle view"><svg id="view-mode-icon" class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></button>
          <select id="category" class="hidden"><option value="">All</option></select>
          <span class="w-px h-5 bg-border-dim mx-0.5 shrink-0"></span>
          <div id="source-bubbles" class="flex gap-1.5 shrink-0"></div>
        </div>
        <main id="papers" class="pb-16">
          <div style="column-span:all" class="flex items-center justify-center h-[60vh]"><span class="text-dim text-[1.4rem] font-mono">⠋</span></div>
        </main>
      </div>
  </div>

  <!-- Projects List View -->
  <div id="experiments-view" class="hidden ml-[60px] view">
    <div class="max-w-[960px] mx-auto px-8 pt-6 pb-16">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-[1.3rem] font-semibold text-white_">Projects</h2>
        <button class="px-4 py-2 rounded-lg border-none bg-accent text-white text-[0.85rem] font-medium cursor-pointer hover:bg-accent-hover transition-colors" onclick="createQuickProject()">+ New Project</button>
      </div>
      <div class="relative mb-5">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-dimmer pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
        <input type="text" id="exp-search" placeholder="Search projects..." autocomplete="off" oninput="filterExperiments()" class="w-full pl-9 pr-4 py-2 rounded-lg border border-border-input bg-card text-primary text-[0.85rem] focus:outline-none focus:border-accent transition-all" />
      </div>
      <div id="ideas-list" class="grid grid-cols-2 gap-4"></div>
    </div>
  </div>

  <!-- Reading List View -->
  <div id="saved-view" class="hidden ml-[60px] view">
    <div class="max-w-[900px] mx-auto px-8 pt-6 pb-16">
      <div class="flex items-center gap-3 mb-5">
        <h2 class="text-[1.3rem] font-semibold text-white_">Reading List</h2>
        <span id="saved-stats" class="text-[0.8rem] text-dim"></span>
      </div>
      <div id="saved-list"></div>
    </div>
  </div>

  <!-- Paper Viewer View -->
  <div id="paper-view" class="hidden ml-[60px] view">
    <div class="grid grid-cols-[320px_1fr] h-screen overflow-hidden">
      <div class="border-r border-border-card p-6 overflow-y-auto flex flex-col" id="paper-sidebar"></div>
      <div class="bg-header overflow-hidden" id="paper-pdf-container"></div>
    </div>
  </div>

  <!-- Project Detail View -->
  <div id="exp-detail-view" class="hidden ml-[60px] view">
    <div class="grid grid-cols-[260px_1fr] h-screen overflow-hidden">
      <!-- Left Sidebar -->
      <div id="exp-sidebar" class="border-r border-border-card p-5 overflow-y-auto flex flex-col">
        <button class="bg-transparent border-none text-muted text-[0.8rem] cursor-pointer p-0 inline-flex items-center gap-1.5 hover:text-primary mb-3" onclick="openExperiments()">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Back
        </button>
        <div id="exp-detail-title" class="text-[1.1rem] font-semibold text-white_ cursor-pointer hover:text-accent transition-colors nb-rendered-md mb-3" onclick="startRenameExperiment()" title="Click to rename"></div>
        <span class="text-[0.75rem] text-dim uppercase tracking-wide mb-2">Files</span>
        <div class="flex gap-1.5 mb-3">
          <button class="px-2 py-1 rounded-md border border-border-input bg-transparent text-muted text-[0.75rem] cursor-pointer hover:text-primary hover:border-accent transition-colors" onclick="createExpFile('.py')">+ py</button>
          <button class="px-2 py-1 rounded-md border border-border-input bg-transparent text-muted text-[0.75rem] cursor-pointer hover:text-primary hover:border-accent transition-colors" onclick="createExpFile('.md')">+ md</button>
          <button class="px-2 py-1 rounded-md border border-border-input bg-transparent text-muted text-[0.75rem] cursor-pointer hover:text-primary hover:border-accent transition-colors" onclick="createExpFile('.ipynb')">+ nb</button>
        </div>
        <div id="exp-sidebar-files"></div>
      </div>
      <!-- Right Content Pane -->
      <div id="exp-content-pane" class="overflow-y-auto p-8">
        <div id="exp-default-content">
          <div id="exp-detail-desc" class="text-[0.85rem] text-muted mb-5 cursor-pointer hover:text-primary transition-colors nb-rendered-md" ondblclick="startEditDesc()" title="Double-click to edit description"></div>
          <div id="exp-todos-section" class="mt-4">
            <div class="flex items-center justify-between mb-4">
              <span id="exp-todo-count" class="text-[0.8rem] text-dim"></span>
              <button onclick="addExpTodo()" class="px-4 py-2 rounded-lg border-none bg-accent text-white text-[0.85rem] font-medium cursor-pointer hover:bg-accent-hover transition-colors">+ Add Todo</button>
            </div>
            <div id="exp-todo-input-area"></div>
            <div id="exp-todos-list"></div>
          </div>
        </div>
        <div id="exp-file-editor" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- Settings View -->
  <div id="settings-view" class="hidden ml-[60px] view">
    <div class="max-w-[900px] mx-auto px-8 pt-6 pb-16">
      <div id="settings-view-content"></div>
    </div>
  </div>

  <!-- Calendar View -->
  <div id="calendar-view" class="hidden ml-[60px] view">
    <div class="max-w-[900px] mx-auto px-8 pt-6 pb-16">
      <div id="calendar-view-content"></div>
    </div>
  </div>

  <!-- Todos View -->
  <div id="todos-view" class="hidden ml-[60px] view">
    <div class="px-6 pt-4">
      <div id="todos-view-content"></div>
    </div>
  </div>

  <script src="/js/core.js"></script>
  <script src="/js/feed.js"></script>
  <script src="/js/quality.js"></script>
  <script src="/js/views.js"></script>
  <script src="/js/experiments.js"></script>
  <script src="/js/editors.js"></script>
</body>
</html>
