<!DOCTYPE html>
<html lang="en">
<head>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/comment/comment.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          body: 'var(--bg-body)',
          primary: 'var(--text-primary)',
          white_: 'var(--text-white)',
          muted: 'var(--text-muted)',
          dim: 'var(--text-dim)',
          dimmer: 'var(--text-dimmer)',
          dimmest: 'var(--text-dimmest)',
          sidebar: 'var(--bg-sidebar)',
          'border-sidebar': 'var(--border-sidebar)',
          hover: 'var(--bg-hover)',
          card: 'var(--bg-card)',
          input: 'var(--bg-input)',
          'input-alt': 'var(--bg-input-alt)',
          'border-card': 'var(--border-card)',
          'border-input': 'var(--border-input)',
          'border-subtle': 'var(--border-subtle)',
          'border-dim': 'var(--border-dim)',
          header: 'var(--bg-header)',
          canvas: 'var(--bg-canvas)',
          popup: 'var(--bg-popup)',
          'chip-count': 'var(--bg-chip-count)',
          'cat-tag': 'var(--bg-cat-tag)',
          'cat-tag-color': 'var(--bg-cat-tag-color)',
          cite: 'var(--bg-cite)',
          'sidebar-cat': 'var(--bg-sidebar-cat)',
          'sidebar-cat-border': 'var(--sidebar-cat-border)',
          'sidebar-cat-color': 'var(--sidebar-cat-color)',
          link: 'var(--text-link)',
          accent: 'var(--accent)',
          'accent-hover': 'var(--accent-hover)',
          summary: 'var(--text-summary)',
          authors: 'var(--text-authors)',
          'meta-value': 'var(--text-meta-value)',
          'idea-desc': 'var(--text-idea-desc)',
          'tree-edge': 'var(--tree-edge)',
          'spinner-border': 'var(--spinner-border)',
          tooltip: 'var(--tooltip-bg)',
          'tooltip-border': 'var(--tooltip-border)',
          overlay: 'var(--overlay-bg)',
        },
        boxShadow: {
          card: '0 6px 20px var(--shadow-card)',
          popup: '0 16px 48px var(--shadow-popup)',
        },
      }
    }
  }
  </script>
  <style>
    :root {
      --bg-body: #0a0a0a;
      --text-primary: #e0e0e0;
      --text-white: #fff;
      --text-muted: #888;
      --text-dim: #666;
      --text-dimmer: #555;
      --text-dimmest: #444;
      --bg-sidebar: #111;
      --border-sidebar: #1a1a1a;
      --bg-hover: #1e1e1e;
      --bg-card: #151515;
      --bg-input: #1a1a1a;
      --bg-input-alt: #151515;
      --border-card: #222;
      --border-input: #333;
      --border-subtle: #252525;
      --border-dim: #1a1a1a;
      --bg-header: #111;
      --bg-canvas: #0d0d0d;
      --bg-popup: #181818;
      --bg-chip-count: #1a1a1a;
      --bg-cat-tag: #1a1a1a;
      --bg-cat-tag-color: #999;
      --bg-cite: #1e1209;
      --bg-sidebar-cat: #1e1e1e;
      --sidebar-cat-border: #2a2a2a;
      --sidebar-cat-color: #aaa;
      --text-link: #d4845a;
      --accent: #b4451a;
      --accent-hover: #c9562a;
      --text-summary: #999;
      --text-authors: #888;
      --text-meta-value: #bbb;
      --text-idea-desc: #bbb;
      --shadow-card: rgba(0,0,0,0.3);
      --shadow-popup: rgba(0,0,0,0.5);
      --overlay-bg: rgba(0,0,0,0.5);
      --tree-edge: #333;
      --spinner-border: #333;
      --tooltip-bg: #222;
      --tooltip-border: #333;
    }

    [data-theme="light"] {
      --bg-body: #f5f5f5;
      --text-primary: #333;
      --text-white: #111;
      --text-muted: #666;
      --text-dim: #888;
      --text-dimmer: #999;
      --text-dimmest: #aaa;
      --bg-sidebar: #fff;
      --border-sidebar: #e0e0e0;
      --bg-hover: #f0f0f0;
      --bg-card: #fff;
      --bg-input: #f8f8f8;
      --bg-input-alt: #fff;
      --border-card: #e0e0e0;
      --border-input: #ccc;
      --border-subtle: #e0e0e0;
      --border-dim: #eee;
      --bg-header: #fff;
      --bg-canvas: #fafafa;
      --bg-popup: #fff;
      --bg-chip-count: #f0f0f0;
      --bg-cat-tag: #f0f0f0;
      --bg-cat-tag-color: #666;
      --bg-cite: #fef3ec;
      --bg-sidebar-cat: #f5f5f5;
      --sidebar-cat-border: #e0e0e0;
      --sidebar-cat-color: #666;
      --text-link: #b4451a;
      --accent: #b4451a;
      --accent-hover: #c9562a;
      --text-summary: #666;
      --text-authors: #777;
      --text-meta-value: #555;
      --text-idea-desc: #555;
      --shadow-card: rgba(0,0,0,0.08);
      --shadow-popup: rgba(0,0,0,0.15);
      --overlay-bg: rgba(0,0,0,0.3);
      --tree-edge: #ccc;
      --spinner-border: #ccc;
      --tooltip-bg: #fff;
      --tooltip-border: #ddd;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Sidebar tooltip (parent-hover child reveal) ── */
    .sidebar-icon .sidebar-tooltip { display: none; }
    .sidebar-icon:hover .sidebar-tooltip { display: block; }

    /* ── Sidebar active inset shadow ── */
    .sidebar-icon.active {
      background: var(--bg-hover);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    /* ── Toggle switch ── */
    .toggle-switch { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-switch .slider {
      position: absolute; inset: 0; background: #333; border-radius: 20px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle-switch .slider::before {
      content: ''; position: absolute; left: 2px; top: 2px;
      width: 16px; height: 16px; background: #999; border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle-switch input:checked + .slider { background: var(--accent); }
    .toggle-switch input:checked + .slider::before { transform: translateX(16px); background: #fff; }

    /* ── CSS columns masonry ── */
    main {
      columns: 4;
      column-gap: 14px;
    }
    @media (max-width: 1400px) { main { columns: 3; } }
    @media (max-width: 900px) { main { columns: 2; } }
    @media (max-width: 560px) { main { columns: 1; } }

    #finder-results-masonry {
      columns: 4;
      column-gap: 14px;
    }
    @media (max-width: 1400px) { #finder-results-masonry { columns: 3; } }
    @media (max-width: 1000px) { #finder-results-masonry { columns: 2; } }
    @media (max-width: 600px) { #finder-results-masonry { columns: 1; } }
    #finder-results-masonry:empty { display: none; }

    /* ── Reading list: read cards dim, hover restores ── */
    #saved-list > div.read-card { opacity: 0.4; }
    #saved-list > div.read-card:hover { opacity: 1 !important; }


    /* ── ASCII braille loader ── */
    @keyframes braille {
      0%  { content: '\2840'; }
      12% { content: '\2844'; }
      25% { content: '\2846'; }
      37% { content: '\2847'; }
      50% { content: '\283F'; }
      62% { content: '\2839'; }
      75% { content: '\2838'; }
      87% { content: '\2830'; }
    }
    .spinner {
      display: inline-block; margin-bottom: 12px; color: var(--text-dim); font-family: monospace; font-size: 1.4rem;
    }
    .spinner::before {
      content: '\2840';
      animation: braille 0.8s steps(1) infinite;
    }

    /* ── SVG Tree ── */
    .tree-node { cursor: pointer; }
    .tree-node rect {
      rx: 8; ry: 8; stroke-width: 2;
      transition: stroke-opacity 0.15s;
    }
    .tree-node:hover rect { stroke-opacity: 1; }
    .tree-node text {
      fill: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .tree-edge {
      fill: none;
      stroke: var(--tree-edge);
      stroke-width: 2;
    }

    /* ── Finder pagination column span ── */
    .finder-pagination {
      column-span: all;
    }

    /* ── Paper card hover effects ── */
    .paper:hover {
      border-color: var(--border-input);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow-card);
    }

    /* ── Trend chip hover effects ── */
    .trend-chip:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--text-white);
    }
    .trend-chip:hover .chip-count {
      color: var(--accent);
    }

    /* CodeMirror notebook theme */
    .CodeMirror {
      background: transparent !important;
      color: #e0e0e0 !important;
      font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace !important;
      font-size: 0.8rem !important;
      height: auto !important;
      padding: 0.5rem 0 !important;
    }
    .CodeMirror-scroll { min-height: 40px; }
    .CodeMirror-gutters {
      background: transparent !important;
      border-right: none !important;
    }
    .CodeMirror-linenumber { color: #444 !important; font-size: 0.7rem !important; }
    .CodeMirror-cursor { border-left-color: #e0e0e0 !important; }
    .CodeMirror-selected { background: rgba(180,69,26,0.25) !important; }
    .CodeMirror-focused .CodeMirror-selected { background: rgba(180,69,26,0.35) !important; }
    .CodeMirror-matchingbracket { color: #fff !important; background: rgba(180,69,26,0.4) !important; }
    .CodeMirror-activeline-background { background: rgba(255,255,255,0.03) !important; }
    /* Syntax colors */
    .cm-s-default .cm-keyword { color: #c586c0 !important; }
    .cm-s-default .cm-def { color: #dcdcaa !important; }
    .cm-s-default .cm-variable { color: #9cdcfe !important; }
    .cm-s-default .cm-variable-2 { color: #9cdcfe !important; }
    .cm-s-default .cm-variable-3 { color: #4ec9b0 !important; }
    .cm-s-default .cm-type { color: #4ec9b0 !important; }
    .cm-s-default .cm-property { color: #9cdcfe !important; }
    .cm-s-default .cm-operator { color: #d4d4d4 !important; }
    .cm-s-default .cm-number { color: #b5cea8 !important; }
    .cm-s-default .cm-string { color: #ce9178 !important; }
    .cm-s-default .cm-string-2 { color: #ce9178 !important; }
    .cm-s-default .cm-comment { color: #6a9955 !important; }
    .cm-s-default .cm-builtin { color: #4ec9b0 !important; }
    .cm-s-default .cm-meta { color: #569cd6 !important; }
    .cm-s-default .cm-atom { color: #569cd6 !important; }
    .cm-s-default .cm-tag { color: #569cd6 !important; }
    .cm-s-default .cm-attribute { color: #9cdcfe !important; }
    .cm-s-default .cm-header { color: #569cd6 !important; }
    .cm-s-default .cm-link { color: #9cdcfe !important; }

  </style>
</head>

  <script>
    // ── View management ──
    const BACK_ARROW = '<svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>';
    const ARXIV_LOGO = '<img class="absolute top-2.5 right-2.5 h-4 w-auto opacity-30" src="/arxiv-logomark-small@2x.png" alt="arXiv" />';
    const ARXIV_LOGO_INLINE = '<img class="h-3.5 w-auto opacity-50 inline-block" src="/arxiv-logomark-small@2x.png" alt="arXiv" />';
    const HN_LOGO = '<svg class="absolute top-2.5 right-2.5 h-4 w-auto opacity-40" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect fill="#f60" width="256" height="256" rx="24"/><text x="128" y="180" text-anchor="middle" fill="#fff" font-size="160" font-weight="bold" font-family="Verdana,sans-serif">Y</text></svg>';
    const HN_LOGO_INLINE = '<svg class="h-3.5 w-auto opacity-50 inline-block" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect fill="#f60" width="256" height="256" rx="24"/><text x="128" y="180" text-anchor="middle" fill="#fff" font-size="160" font-weight="bold" font-family="Verdana,sans-serif">Y</text></svg>';
    const VERGE_LOGO = '<svg class="absolute top-2.5 right-2.5 h-4 w-auto opacity-40" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect fill="#000" width="256" height="256" rx="24"/><text x="128" y="185" text-anchor="middle" fill="#fa4b2a" font-size="180" font-weight="bold" font-family="Georgia,serif">V</text></svg>';
    const VERGE_LOGO_INLINE = '<svg class="h-3.5 w-auto opacity-50 inline-block" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect fill="#000" stroke="#333" width="256" height="256" rx="24"/><text x="128" y="185" text-anchor="middle" fill="#fa4b2a" font-size="180" font-weight="bold" font-family="Georgia,serif">V</text></svg>';
    const NATURE_LOGO = '<svg class="absolute top-2.5 right-2.5 h-4 w-auto opacity-40" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect fill="#c00" width="256" height="256" rx="24"/><text x="128" y="185" text-anchor="middle" fill="#fff" font-size="170" font-weight="bold" font-family="Georgia,serif">N</text></svg>';
    const NATURE_LOGO_INLINE = '<svg class="h-3.5 w-auto opacity-50 inline-block" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect fill="#c00" width="256" height="256" rx="24"/><text x="128" y="185" text-anchor="middle" fill="#fff" font-size="170" font-weight="bold" font-family="Georgia,serif">N</text></svg>';
    const RSS_LOGO_INLINE = '<svg class="h-3.5 w-auto opacity-50 inline-block" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect fill="#f90" width="256" height="256" rx="24"/><circle cx="68" cy="189" r="28" fill="#fff"/><path d="M40 120a108 108 0 01108 108h-36a72 72 0 00-72-72v-36z" fill="#fff"/><path d="M40 56a172 172 0 01172 172h-36A136 136 0 0076 92V56h-36z" fill="#fff"/></svg>';

    // ── Feed catalog ──
    const FEED_CATALOG = [
      // Research & Science
      { key: 'arxiv', name: 'arXiv', desc: 'Latest CS research papers', cat: 'Research & Science', special: 'arxiv', img: '/arxiv-logomark-small@2x.png' },
      { key: 'nature', name: 'Nature', desc: 'Scientific research and discoveries', cat: 'Research & Science', url: 'https://www.nature.com/nature.rss', letter: 'N', bg: '#c00', fg: '#fff' },
      { key: 'science', name: 'Science', desc: 'Peer-reviewed research from AAAS', cat: 'Research & Science', url: 'https://www.science.org/rss/news_current.xml', letter: 'S', bg: '#1a5276', fg: '#fff' },
      { key: 'quanta', name: 'Quanta Magazine', desc: 'In-depth math and science journalism', cat: 'Research & Science', url: 'https://www.quantamagazine.org/feed/', letter: 'Q', bg: '#000', fg: '#f5c518' },
      // Tech & News
      { key: 'hn', name: 'Hacker News', desc: 'Top stories from the tech community', cat: 'Tech & News', special: 'hn', letter: 'Y', bg: '#f60', fg: '#fff', font: 'Verdana,sans-serif' },
      { key: 'verge', name: 'The Verge', desc: 'Technology news and culture', cat: 'Tech & News', url: 'https://www.theverge.com/rss/index.xml', letter: 'V', bg: '#000', fg: '#fa4b2a', stroke: '#333' },
      { key: 'arstechnica', name: 'Ars Technica', desc: 'In-depth technology reporting', cat: 'Tech & News', url: 'https://feeds.arstechnica.com/arstechnica/index', letter: 'a', bg: '#ff4e00', fg: '#fff' },
      { key: 'techcrunch', name: 'TechCrunch', desc: 'Startup and technology news', cat: 'Tech & News', url: 'https://techcrunch.com/feed/', letter: 'T', bg: '#0a9e01', fg: '#fff' },
      { key: 'wired', name: 'Wired', desc: 'Future trends in tech and culture', cat: 'Tech & News', url: 'https://www.wired.com/feed/rss', letter: 'W', bg: '#000', fg: '#fff' },
      { key: 'mittr', name: 'MIT Tech Review', desc: 'Emerging technology analysis', cat: 'Tech & News', url: 'https://www.technologyreview.com/feed/', letter: 'M', bg: '#a31c44', fg: '#fff' },
      // Programming
      { key: 'lobsters', name: 'Lobsters', desc: 'Community-curated programming links', cat: 'Programming', url: 'https://lobste.rs/rss', letter: 'L', bg: '#ac130d', fg: '#fff' },
      // AI & Machine Learning
      { key: 'gradient', name: 'The Gradient', desc: 'AI research perspectives', cat: 'AI & Machine Learning', url: 'https://thegradient.pub/rss/', letter: 'G', bg: '#6b21a8', fg: '#fff' },
      // Security
      { key: 'krebs', name: 'Krebs on Security', desc: 'Cybersecurity news and investigations', cat: 'Security', url: 'https://krebsonsecurity.com/feed/', letter: 'K', bg: '#2d3436', fg: '#00b894' },
      // Ideas & Culture
      { key: 'aeon', name: 'Aeon', desc: 'Essays on science, philosophy, society', cat: 'Ideas & Culture', url: 'https://aeon.co/feed', letter: 'Æ', bg: '#1a1a2e', fg: '#e7d4b5' },
      { key: 'nautilus', name: 'Nautilus', desc: 'Science meets philosophy and culture', cat: 'Ideas & Culture', url: 'https://nautil.us/feed/', letter: 'N', bg: '#0891b2', fg: '#fff' },
      // Prediction Markets
      { key: 'polymarket', name: 'Polymarket', desc: 'Top 5 breaking prediction markets', cat: 'Prediction Markets', special: 'polymarket', letter: 'P', bg: '#0052ff', fg: '#fff' },
    ];

    function catalogLogo(entry, size) {
      if (entry.img) {
        const cls = size === 'onboard' ? 'h-7 w-auto opacity-70'
          : size === 'inline' ? 'h-3.5 w-auto opacity-50 inline-block'
          : 'absolute top-2.5 right-2.5 h-4 w-auto opacity-30';
        return `<img class="${cls}" src="${entry.img}" alt="${entry.name}" />`;
      }
      const cls = size === 'onboard' ? 'h-7 w-auto opacity-70'
        : size === 'inline' ? 'h-3.5 w-auto opacity-50 inline-block'
        : 'absolute top-2.5 right-2.5 h-4 w-auto opacity-40';
      const stroke = entry.stroke ? ` stroke="${entry.stroke}"` : '';
      const font = entry.font || 'Georgia,serif';
      const fs = (entry.letter || '').length > 1 ? 140 : 170;
      return `<svg class="${cls}" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect fill="${entry.bg}"${stroke} width="256" height="256" rx="24"/><text x="128" y="185" text-anchor="middle" fill="${entry.fg}" font-size="${fs}" font-weight="bold" font-family="${font}">${entry.letter}</text></svg>`;
    }

    const SOURCE_LOGO_INLINE = {};
    const SOURCE_NAMES = {};
    FEED_CATALOG.forEach(f => {
      SOURCE_LOGO_INLINE[f.key] = catalogLogo(f, 'inline');
      SOURCE_NAMES[f.key] = f.name;
    });

    function getSourceChip(source, arxivId) {
      const logo = SOURCE_LOGO_INLINE[source]
        || (source?.startsWith('custom:') ? RSS_LOGO_INLINE : '')
        || (arxivId ? ARXIV_LOGO_INLINE : '');
      if (!logo) return '';
      const name = SOURCE_NAMES[source]
        || (source?.startsWith('custom:') ? source.slice(7) : '')
        || (arxivId ? 'arXiv' : '');
      return `<span class="inline-flex items-center gap-1">${logo}<span class="text-[0.68rem] text-dim">${name}</span></span>`;
    }

    function setSidebarActive(id) {
      document.querySelectorAll('.sidebar-icon').forEach(b => b.classList.remove('active'));
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    }

    function hideAllViews() {
      document.getElementById('home-main').style.display = 'none';
      document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.style.display = ''; });
    }

    function goHome() {
      document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.style.display = ''; });
      document.getElementById('home-main').style.display = '';
      window.location.hash = '';
      setSidebarActive('sb-home');
      document.getElementById('finder-query').value = '';
      showFeedHideFinder();
    }

    function openExperiments() {
      hideAllViews();
      const view = document.getElementById('experiments-view');
      view.classList.add('active');
      view.style.display = 'block';
      window.location.hash = 'experiments';
      setSidebarActive('sb-experiments');
      fetchExperiments();
    }

    function openExperimentDetail(id) {
      hideAllViews();
      const view = document.getElementById('exp-detail-view');
      view.classList.add('active');
      view.style.display = 'block';
      window.location.hash = 'experiment/' + id;
      setSidebarActive('sb-experiments');
      currentExpId = id;
      expandedRunId = null;
      fetchExperimentDetail(id);
    }

    function routeFromHash() {
      const hash = window.location.hash;
      if (hash === '#experiments') openExperiments();
      else if (hash === '#quality') openQualityFilter();
      else if (hash === '#calendar') openCalendar();
      else if (hash === '#todos') openTodos();
      else if (hash === '#saved') openSaved();
      else if (hash.startsWith('#experiment/')) openExperimentDetail(hash.slice('#experiment/'.length));
      else if (hash.startsWith('#paper/')) openPaper(parseInt(hash.slice('#paper/'.length), 10));
      else if (hash.startsWith('#view/')) openPaperByUrl(decodeURIComponent(hash.slice('#view/'.length)));
      else goHome();
    }

    window.addEventListener('hashchange', routeFromHash);
    setTimeout(routeFromHash, 0);

    // ── Reading List (localStorage) ──
    setTimeout(updateSavedBadge, 0);
    function updateSavedBadge() {
      const saved = getSavedPosts();
      const unread = Object.values(saved).filter(e => !e.read).length;
      const badge = document.getElementById('saved-badge');
      if (unread > 0) {
        badge.textContent = unread;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }

    function getHiddenPosts() {
      try { return JSON.parse(localStorage.getItem('hiddenPosts') || '[]'); } catch { return []; }
    }
    function hidePost(link, title, event) {
      if (event) event.stopPropagation();
      const hidden = getHiddenPosts();
      if (!hidden.includes(link)) hidden.push(link);
      localStorage.setItem('hiddenPosts', JSON.stringify(hidden));
      if (title) addTestTitle(title);
      renderPapers();
    }
    function getTestTitles() {
      try { return JSON.parse(localStorage.getItem('qualityTestTitles') || '[]'); } catch { return []; }
    }
    async function fetchTestTitlesFromServer() {
      try {
        const resp = await fetch('/api/blocked-titles');
        if (resp.ok) {
          const titles = await resp.json();
          localStorage.setItem('qualityTestTitles', JSON.stringify(titles));
          return titles;
        }
      } catch {}
      return getTestTitles();
    }
    function addTestTitle(title) {
      const titles = getTestTitles();
      if (!titles.includes(title)) { titles.push(title); localStorage.setItem('qualityTestTitles', JSON.stringify(titles)); }
      fetch('/api/blocked-titles', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      }).catch(() => {});
    }
    function isPostHidden(link) { return getHiddenPosts().includes(link); }

    function getSavedPosts() {
      try { return JSON.parse(localStorage.getItem('savedPosts') || '{}'); } catch { return {}; }
    }
    function savePosts(data) { localStorage.setItem('savedPosts', JSON.stringify(data)); }
    function isPostSaved(link) { return !!getSavedPosts()[link]; }

    function toggleSavePost(paper, event) {
      if (event) event.stopPropagation();
      const saved = getSavedPosts();
      if (saved[paper.link]) {
        delete saved[paper.link];
      } else {
        saved[paper.link] = { paper, savedAt: Date.now(), read: false };
      }
      savePosts(saved);
      updateSavedBadge();
      renderPapers();
      if (document.getElementById('saved-view').style.display === 'block') renderSavedPosts();
    }

    function markPostRead(link) {
      const saved = getSavedPosts();
      if (!saved[link]) return;
      saved[link].read = true;
      savePosts(saved);
      updateSavedBadge();
    }

    function openSaved() {
      hideAllViews();
      const view = document.getElementById('saved-view');
      view.classList.add('active');
      view.style.display = 'block';
      window.location.hash = 'saved';
      setSidebarActive('sb-saved');
      renderSavedPosts();
    }

    function renderSavedPosts() {

    async function fetchFeed() {
      try {
        const resp = await fetch('/feed');

        return parseFeed(await resp.text());
      } catch (err) {
        document.getElementById('papers').innerHTML =
          `<div class="text-center py-20 text-red-400"><p>Failed to load feed: ${err.message}</p>
           <p class="mt-2 text-[0.85rem] text-muted">Try refreshing or check your connection.</p></div>`;
        return [];
      }

    async function fetchHNFeed() {
      try {
        const resp = await fetch('/hn-feed');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const stories = await resp.json();
        return stories.map(s => {
          const url = s.url || `https://news.ycombinator.com/item?id=${s.id}`;
          const ts = s.time ? new Date(s.time * 1000) : null;
          const dateStr = ts ? formatDate(ts) : '';
          const pubDate = ts ? ts.toUTCString() : '';
          return {
            source: 'hn',
            title: s.title || '',
            link: url,
            authors: s.by || '',
            categories: [],
            description: '',
            date: dateStr,
            pubDate,
            arxivId: null,
            hnScore: s.score || 0,
            hnComments: s.descendants || 0,
            hnId: s.id
          };
        });
      } catch (e) {
        return [];
      }
    }

    async function fetchPolymarketFeed() {
      try {
        const resp = await fetch('/polymarket-feed');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const markets = await resp.json();
        if (markets.error) return [];
        return markets.map(m => {
          const sign = m.changePct >= 0 ? '+' : '';
          return {
            source: 'polymarket',
            title: m.question,
            link: m.url,
            authors: '',
            categories: ['Prediction Markets'],
            description: `${m.yesPct}% Yes · ${sign}${m.changePct}% today · $${m.volume.toLocaleString()} volume`,
            date: 'live',
            pubDate: new Date().toUTCString(),
            arxivId: null,
            polyYesPct: m.yesPct,
            polyChangePct: m.changePct,
            polyVolume: m.volume,
            polyImage: m.image
          };
        });
      } catch (e) {
        return [];
      }
    }

    async function fetchGenericRSS(feedUrl, sourceName) {
      try {
        const resp = await fetch(`/api/rss-proxy?url=${encodeURIComponent(feedUrl)}`);
        if (!resp.ok) return [];
        const xml = await resp.text();
        const doc = new DOMParser().parseFromString(xml, 'text/xml');
        const items = doc.querySelectorAll('item, entry');
        return Array.from(items).map(item => {
          const title = (item.querySelector('title')?.textContent || '').trim();
          const link = item.querySelector('link')?.getAttribute('href')
            || (item.querySelector('link')?.textContent || '').trim();
          const desc = item.querySelector('description, summary, content')?.textContent || '';
          const author = item.querySelector('author, dc\\:creator')?.textContent?.trim() || '';
          const pubStr = item.querySelector('pubDate, published, updated')?.textContent?.trim() || '';
          const ts = pubStr ? new Date(pubStr) : null;
          return {
            source: sourceName,
            title,
            link,
            authors: author,
            categories: [],
            description: stripHtml(desc).slice(0, 300),
            date: ts ? formatDate(ts) : '',
            pubDate: ts ? ts.toUTCString() : '',
            arxivId: null,
          };
        });
      } catch { return []; }
    }

    function allSourcesOff() {
      const s = getFeedSources();
      const customFeeds = getCustomFeeds().filter(f => f.enabled !== false);
      return !FEED_CATALOG.some(f => s[f.key]) && customFeeds.length === 0;
    }

    async function loadAllFeeds() {
      if (!hasOnboarded() || allSourcesOff()) { showOnboarding(); return; }
      document.getElementById('onboard-view').style.display = 'none';
      document.getElementById('finder-section').style.display = '';
      document.getElementById('home-feed-section').style.display = '';
      const sources = getFeedSources();
      allPapers = [];
      const promises = [];
      const labels = [];

      FEED_CATALOG.forEach(f => {
        if (!sources[f.key]) return;
        if (f.special === 'arxiv') { promises.push(fetchFeed()); }
        else if (f.special === 'hn') { promises.push(fetchHNFeed()); }
        else if (f.special === 'polymarket') { promises.push(fetchPolymarketFeed()); }
        else { promises.push(fetchGenericRSS(f.url, f.key)); }
        labels.push(f.key);
      });

      const customFeeds = getCustomFeeds().filter(f => f.enabled !== false);
      for (const cf of customFeeds) {
        promises.push(fetchGenericRSS(cf.url, 'custom:' + cf.name));
        labels.push('custom');
      }

      const results = await Promise.all(promises);
      for (let i = 0; i < results.length; i++) {
        const items = results[i];
        if (Array.isArray(items) && items.length) {
          allPapers = allPapers.concat(items);
        }
      }
      renderTrends();
      renderPapers();
      if (isQualityFilterOn()) qualityFilterPapers();
    }

    function getQualityPrompt() {
      return localStorage.getItem('qualityPrompt') || DEFAULT_QUALITY_PROMPT;

    async function fetchServerPrompt() {
      try {
        const resp = await fetch('/api/quality-prompt');
        if (!resp.ok) return null;
        const data = await resp.json();
        if (data.prompt) {
          localStorage.setItem('qualityPrompt', data.prompt);
          return data.prompt;
        }
      } catch {}
      return null;
    }
    async function saveQualityPrompt() {
      const testTitles = getTestTitles();
      if (testTitles.length) {
        const failures = await runPromptTestInternal();
        if (failures.length) return; // test UI already shows failures
      }
      const val = document.getElementById('quality-prompt-input').value.trim();
      if (val && val !== DEFAULT_QUALITY_PROMPT) {
        localStorage.setItem('qualityPrompt', val);
      } else {
        localStorage.removeItem('qualityPrompt');
      }
      // Sync to server
      try {
        await fetch('/api/quality-prompt', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: val === DEFAULT_QUALITY_PROMPT ? '' : val })
        });
      } catch {}
      localStorage.removeItem('qualityCache');
      renderPapers();
      if (isQualityFilterOn() && allPapers.length) qualityFilterPapers();
      const resultsEl = document.getElementById('prompt-test-results');
      if (resultsEl) resultsEl.innerHTML = '<div class="text-green-400 text-[0.75rem]">Prompt saved &amp; cache cleared.</div>';
    }
    function resetQualityPrompt() {

      }).catch(() => {});
      const el = document.getElementById('quality-prompt-input');

    function clearTestTitles() {
      localStorage.removeItem('qualityTestTitles');

      const resultsEl = document.getElementById('prompt-test-results');
      if (resultsEl) resultsEl.innerHTML = '';
      fetch('/api/blocked-titles', { method: 'DELETE' }).catch(() => {});

    async function runPromptTestInternal() {
      const titles = getTestTitles();
      const resultsEl = document.getElementById('prompt-test-results');
      if (!titles.length) {
        resultsEl.innerHTML = '<div class="text-dim text-[0.75rem]">No test titles collected yet. Hide posts with ✕ to add them.</div>';
        return [];
      }
      resultsEl.innerHTML = '<div class="text-dim text-[0.75rem]">Testing…</div>';
      const prompt = document.getElementById('quality-prompt-input').value.trim();
      const failures = [];
      try {
        for (let i = 0; i < titles.length; i += 10) {
          const batch = titles.slice(i, i + 10);
          const resp = await fetch('/api/quality-filter', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ titles: batch, prompt, mode: 'verdict' })
          });
          if (!resp.ok) { resultsEl.innerHTML = '<div class="text-red-400 text-[0.75rem]">API error — is Ollama running?</div>'; return []; }
          const results = await resp.json();
          for (const t of batch) {
            const verdict = results[t] || 'unknown';
            if (verdict !== 'skip') failures.push(t);
          }
        }
      } catch {
        resultsEl.innerHTML = '<div class="text-red-400 text-[0.75rem]">Network error — is Ollama running?</div>';
        return [];
      }
      const passed = titles.length - failures.length;
      let html = `<div class="text-[0.75rem] mb-1 ${failures.length ? 'text-red-400' : 'text-green-400'}">${passed}/${titles.length} passed</div>`;
      if (failures.length) {
        html += failures.map(t => `<div class="text-red-400/80 text-[0.73rem] py-0.5 border-b border-border-subtle last:border-0">✗ ${escapeHtml(t)}</div>`).join('');
      }
      resultsEl.innerHTML = html;
      return failures;
    }
    async function runPromptTest() {
      await runPromptTestInternal();
    }
    function clearQualityCache() {
      localStorage.removeItem('qualityCache');

      if (isQualityFilterOn() && allPapers.length) qualityFilterPapers();

      localStorage.removeItem('qualityPrompt');

      fetch('/api/quality-prompt', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: '' })
      }).catch(() => {});

      localStorage.removeItem('qualityCache');

    function renderBlockedList() {
      const cache = getQualityCache();
      const aiBlocked = Object.entries(cache).filter(([, v]) => (v?.v || v) === 'skip').map(([t, v]) => ({ title: t, score: v?.s, source: 'ai' }));
      const manualBlocked = getTestTitles().map(t => ({ title: t, score: null, source: 'manual' }));
      const seen = new Set();
      const all = [];
      for (const b of aiBlocked) { seen.add(b.title); all.push(b); }
      for (const b of manualBlocked) { if (!seen.has(b.title)) all.push(b); }
      const el = document.getElementById('quality-blocked-list');
      if (!el) return;
      if (!all.length) {
        el.innerHTML = '<div class="text-dim text-[0.75rem]">No posts blocked yet.</div>';
        return;
      }
      const items = all.reverse();
      el.innerHTML = items.map(b => `<div class="py-1 border-b border-border-subtle last:border-0 flex items-center gap-2"><span class="${b.source === 'manual' ? 'text-orange-400/70' : 'text-red-400/70'} flex-1 min-w-0 truncate">${escapeHtml(b.title)}</span>${b.source === 'manual' ? '<span class="text-dimmer text-[0.68rem] shrink-0">✕</span>' : ''}${b.score != null ? `<span class="text-dimmer text-[0.68rem] shrink-0">${b.score}</span>` : ''}</div>`).join('');
    }
    function getQualityCache() {
      try { return JSON.parse(localStorage.getItem('qualityCache') || '{}'); } catch { return {}; }
    }
    function saveQualityCacheData(cache) {
      localStorage.setItem('qualityCache', JSON.stringify(cache));
    }
    function isQualityFilterOn() {
      return localStorage.getItem('qualityFilter') !== 'off';
    }
    function setQualityFilter(on) {

      if (on && allPapers.length) qualityFilterPapers();
      renderPapers();
    }
    function getQualityThreshold() {
      const v = parseInt(localStorage.getItem('qualityThreshold'), 10);

    function setQualityThreshold(val) {

      renderPapers();

    function getQualityBypass() {
      try { return JSON.parse(localStorage.getItem('qualityBypass') || '{}'); } catch { return {}; }
    }
    function setQualityBypass(key, bypass) {
      const b = getQualityBypass();
      if (bypass) b[key] = true; else delete b[key];
      localStorage.setItem('qualityBypass', JSON.stringify(b));
      renderPapers();

    function isSourceBypassed(sourceKey) {

    function getPapersNeedingVerdict() {
      // Only papers that pass other filters (hidden, category, search) but lack a verdict
      const search = document.getElementById('search').value.toLowerCase();
      const category = document.getElementById('category').value;
      const hidden = new Set(getHiddenPosts());
      const cache = getQualityCache();
      const bypass = getQualityBypass();
      return allPapers.filter(p => {
        if (hidden.has(p.link)) return false;
        if (bypass[p.source]) return false; // source bypasses quality filter
        if (p.title in cache) return false; // already has verdict
        if (category && !p.categories.includes(category)) return false;
        if (search) {
          const h = `${p.title} ${p.authors} ${p.description}`.toLowerCase();
          return search.split(/\s+/).filter(Boolean).every(t => h.includes(t));
        }
        return true;
      });
    }

    let _qfRunning = false;
    let _qfQueued = false;
    async function qualityFilterPapers() {
      if (_qfRunning) { _qfQueued = true; return; }
      _qfRunning = true;
      try { await _qualityFilterPapersInner(); }
      finally {
        _qfRunning = false;
        if (_qfQueued) { _qfQueued = false; qualityFilterPapers(); }
      }
    }
    async function _qualityFilterPapersInner() {
      // Phase 1: verdict (KEEP/SKIP) for papers needing it
      const needVerdict = getPapersNeedingVerdict().map(p => p.title);
      if (needVerdict.length) {
        for (let i = 0; i < needVerdict.length; i += 10) {
          const batch = needVerdict.slice(i, i + 10);
          try {
            const resp = await fetch('/api/quality-filter', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ titles: batch, prompt: getQualityPrompt(), mode: 'verdict' })
            });
            if (!resp.ok) continue;
            const verdicts = await resp.json();
            const updated = getQualityCache();
            for (const [title, v] of Object.entries(verdicts)) {
              updated[title] = { v };
            }
            saveQualityCacheData(updated);
            renderPapers();
          } catch { /* Ollama may be offline */ }
        }
      }

      // Phase 2: score only for kept papers that lack a score
      const cache = getQualityCache();
      const needScore = allPapers
        .filter(p => cache[p.title]?.v === 'keep' && cache[p.title]?.s == null)
        .map(p => p.title);
      if (needScore.length) {
        for (let i = 0; i < needScore.length; i += 10) {
          const batch = needScore.slice(i, i + 10);
          try {
            const resp = await fetch('/api/quality-filter', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ titles: batch, mode: 'score' })
            });
            if (!resp.ok) continue;
            const scores = await resp.json();
            const updated = getQualityCache();
            for (const [title, s] of Object.entries(scores)) {
              if (updated[title]) updated[title].s = s;
            }
            saveQualityCacheData(updated);
            renderPapers();
          } catch { /* Ollama may be offline */ }
        }
      }
    }

    function extractArxivId(link) {
      const m = link.match(/arxiv\.org\/abs\/(\d+\.\d+)/);
      return m ? m[1] : null;
    }

    function parseFeed(xml) {
      const doc = new DOMParser().parseFromString(xml, 'text/xml');
      const arxivItems = Array.from(doc.querySelectorAll('item')).map(item => {
        const title = (item.querySelector('title')?.textContent || '').trim();
        const link = (item.querySelector('link')?.textContent || '').trim();
        const description = (item.querySelector('description')?.textContent || '').trim();
        const creators = item.getElementsByTagNameNS('http://purl.org/dc/elements/1.1/', 'creator');
        const authors = Array.from(creators).map(c => c.textContent.trim()).join(', ') || extractAuthors(description);
        const categories = Array.from(item.querySelectorAll('category')).map(c => c.textContent.trim());
        categories.forEach(c => allCategories.add(c));
        const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
        const dateStr = pubDate ? formatDate(new Date(pubDate)) : '';
        const arxivId = extractArxivId(link);
        const cleanDesc = stripHtml(description).replace(/^arXiv:\S+\s+Announce Type:\s*\w+\s+Abstract:\s*/i, '');
        return { source: 'arxiv', title, link, authors, categories, description: cleanDesc, date: dateStr, pubDate, arxivId };
      });
      populateCategories();
      return arxivItems;
    }

    async function fetchCitationsFor(papers) {
      const ids = papers.map(p => p.arxivId).filter(Boolean).filter(id => citationMap[id] === undefined);
      if (!ids.length) return;
      try {
        const resp = await fetch('/api/citations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids })
        });
        if (resp.ok) {
          const data = await resp.json();
          Object.assign(citationMap, data);
          for (const p of papers) {
            if (p.arxivId && citationMap[p.arxivId] !== undefined) {
              p.citations = citationMap[p.arxivId];
            }
          }
          renderPapers();
        }
      } catch (e) { /* silently fail */ }
    }

    function calendarToday() { const n = new Date(); calendarYear = n.getFullYear(); calendarMonth = n.getMonth(); calendarSelectedDay = null; calendarShowForm = false; renderCalendarView(); }

    function calendarSelectDay(day) {
      calendarSelectedDay = day;
      calendarShowForm = false;
      renderCalendarView();
    }

    function calendarToggleForm() {
      calendarShowForm = !calendarShowForm;
      renderCalendarView();
    }

    function calendarSubmitForm() {
      const title = document.getElementById('cal-ev-title').value.trim();
      if (!title) return;
      const desc = document.getElementById('cal-ev-desc').value.trim();
      const colorEl = document.querySelector('input[name="cal-ev-color"]:checked');
      const color = colorEl ? colorEl.value : '#b4451a';
      const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(calendarSelectedDay).padStart(2, '0')}`;
      addCalendarEvent({ title, description: desc, date: dateStr, color });
    }

    function renderCalendarView() {
      const container = document.getElementById('calendar-view-content');
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const today = new Date();
      const isCurrentMonth = today.getFullYear() === calendarYear && today.getMonth() === calendarMonth;
      const todayDate = today.getDate();

      // Build calendar grid data
      const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
      const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
      const daysInPrevMonth = new Date(calendarYear, calendarMonth, 0).getDate();

      // Events for this month indexed by day
      const eventsByDay = {};
      calendarEvents.forEach(ev => {
        const [y, m, d] = ev.date.split('-').map(Number);
        if (y === calendarYear && m === calendarMonth + 1) {
          if (!eventsByDay[d]) eventsByDay[d] = [];
          eventsByDay[d].push(ev);
        }
      });

      // Todos for this month indexed by day
      const todosByDay = {};
      todos.forEach(todo => {
        if (!todo.date) return;
        const [y, m, d] = todo.date.split('-').map(Number);
        if (y === calendarYear && m === calendarMonth + 1) {
          if (!todosByDay[d]) todosByDay[d] = [];
          todosByDay[d].push(todo);
        }
      });

      const presetColors = [
        { value: '#b4451a', label: 'Accent' },
        { value: '#3b82f6', label: 'Blue' },
        { value: '#22c55e', label: 'Green' },
        { value: '#a855f7', label: 'Purple' },
        { value: '#eab308', label: 'Yellow' },
        { value: '#ef4444', label: 'Red' }
      ];

      let html = `
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-[1.3rem] font-semibold text-white_">Calendar</h2>
        </div>
        <div class="flex items-center gap-3 mb-5">
          <button onclick="calendarPrev()" class="w-8 h-8 rounded-lg bg-card border border-border-card text-primary flex items-center justify-center cursor-pointer hover:bg-hover transition-colors">
            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
          </button>
          <button onclick="calendarToday()" class="px-3 py-1 rounded-lg bg-card border border-border-card text-[0.8rem] text-primary cursor-pointer hover:bg-hover transition-colors">Today</button>
          <button onclick="calendarNext()" class="w-8 h-8 rounded-lg bg-card border border-border-card text-primary flex items-center justify-center cursor-pointer hover:bg-hover transition-colors">
            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </button>
          <span class="text-[1.1rem] font-semibold text-white_ ml-1">${monthNames[calendarMonth]} ${calendarYear}</span>
        </div>
        <div class="grid grid-cols-7 gap-px bg-border-card rounded-xl overflow-hidden border border-border-card">
      `;

      // Day headers
      dayNames.forEach(d => {
        html += `<div class="bg-card px-2 py-2 text-center text-[0.75rem] font-semibold text-dimmer uppercase tracking-wide">${d}</div>`;
      });

      // Previous month trailing days
      for (let i = firstDay - 1; i >= 0; i--) {
        const d = daysInPrevMonth - i;
        html += `<div class="bg-card px-2 py-1.5 min-h-[70px] opacity-30"><span class="text-[0.8rem] text-dimmer">${d}</span></div>`;
      }

      // Current month days
      for (let d = 1; d <= daysInMonth; d++) {
        const isToday = isCurrentMonth && d === todayDate;
        const isSelected = d === calendarSelectedDay;
        const evs = eventsByDay[d] || [];
        const tds = todosByDay[d] || [];
        const borderClass = isToday ? 'border-2 border-accent' : '';
        const selectedClass = isSelected ? 'bg-hover' : 'bg-card';
        html += `<div class="${selectedClass} ${borderClass} px-2 py-1.5 min-h-[70px] cursor-pointer hover:bg-hover transition-colors" onclick="calendarSelectDay(${d})">
          <span class="text-[0.8rem] ${isToday ? 'text-accent font-bold' : 'text-primary'}">${d}</span>
          <div class="flex flex-wrap gap-1 mt-1">
            ${evs.map(ev => `<span class="w-2 h-2 rounded-full inline-block" style="background:${ev.color}" title="${ev.title.replace(/"/g, '&quot;')}"></span>`).join('')}
            ${tds.map(td => `<span class="w-2 h-2 rounded-full inline-block border border-current" style="color:${td.color}${td.done ? ';opacity:0.4' : ''}" title="${td.title.replace(/"/g, '&quot;')}"></span>`).join('')}
          </div>
        </div>`;
      }

      // Next month leading days
      const totalCells = firstDay + daysInMonth;
      const remaining = (7 - (totalCells % 7)) % 7;
      for (let d = 1; d <= remaining; d++) {
        html += `<div class="bg-card px-2 py-1.5 min-h-[70px] opacity-30"><span class="text-[0.8rem] text-dimmer">${d}</span></div>`;
      }

      html += `</div>`;

      // Selected day panel
      if (calendarSelectedDay !== null) {
        const evs = eventsByDay[calendarSelectedDay] || [];
        const dayTodos = todosByDay[calendarSelectedDay] || [];
        const dateStr = `${monthNames[calendarMonth]} ${calendarSelectedDay}, ${calendarYear}`;
        html += `
          <div class="mt-6 p-5 bg-card rounded-xl border border-border-card">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-[1rem] font-semibold text-white_">${dateStr}</h3>
              <button onclick="calendarToggleForm()" class="px-3 py-1.5 rounded-lg bg-accent text-white text-[0.8rem] font-medium cursor-pointer hover:opacity-90 transition-opacity border-none">${calendarShowForm ? 'Cancel' : '+ Add Event'}</button>
            </div>
        `;

        if (calendarShowForm) {
          html += `
            <div class="mb-4 p-4 bg-body rounded-lg border border-border-card">
              <input type="text" id="cal-ev-title" placeholder="Event title..." class="w-full px-3 py-2 rounded-md border border-border-input bg-input text-primary text-[0.85rem] mb-3 focus:outline-none focus:border-accent" />
              <textarea id="cal-ev-desc" placeholder="Description (optional)" rows="2" class="w-full px-3 py-2 rounded-md border border-border-input bg-input text-primary text-[0.85rem] mb-3 resize-none focus:outline-none focus:border-accent"></textarea>
              <div class="flex items-center gap-3 mb-3">
                <span class="text-[0.8rem] text-dimmer">Color:</span>
                ${presetColors.map((c, i) => `
                  <label class="cursor-pointer">
                    <input type="radio" name="cal-ev-color" value="${c.value}" ${i === 0 ? 'checked' : ''} class="sr-only peer" />
                    <span class="w-6 h-6 rounded-full inline-block border-2 border-transparent peer-checked:border-white transition-colors" style="background:${c.value}" title="${c.label}"></span>
                  </label>
                `).join('')}
              </div>
              <div class="flex gap-2">
                <button onclick="calendarSubmitForm()" class="px-4 py-1.5 rounded-lg bg-accent text-white text-[0.8rem] font-medium cursor-pointer hover:opacity-90 transition-opacity border-none">Save</button>
                <button onclick="calendarToggleForm()" class="px-4 py-1.5 rounded-lg bg-card border border-border-card text-primary text-[0.8rem] cursor-pointer hover:bg-hover transition-colors">Cancel</button>
              </div>
            </div>
          `;
        }

        if (evs.length === 0 && dayTodos.length === 0 && !calendarShowForm) {
          html += `<p class="text-[0.85rem] text-dimmer">No events or todos on this day.</p>`;
        } else {
          evs.forEach(ev => {
            html += `
              <div class="flex items-start gap-3 py-2.5 border-b border-border-dim last:border-0">
                <span class="w-3 h-3 rounded-full mt-1 flex-shrink-0" style="background:${ev.color}"></span>
                <div class="flex-1 min-w-0">
                  <div class="text-[0.9rem] font-medium text-white_">${ev.title}</div>
                  ${ev.description ? `<div class="text-[0.8rem] text-dimmer mt-0.5">${ev.description}</div>` : ''}
                </div>
                <button onclick="deleteCalendarEvent('${ev.id}')" class="text-dimmer hover:text-red-400 transition-colors cursor-pointer bg-transparent border-none p-1" title="Delete event">
                  <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
              </div>
            `;
          });

          if (dayTodos.length > 0) {
            html += `<div class="mt-3 pt-3 ${evs.length ? 'border-t border-border-dim' : ''}">
              <div class="text-[0.75rem] font-semibold text-dimmer uppercase tracking-wide mb-2">Todos</div>`;
            dayTodos.forEach(td => {
              html += `
                <div class="flex items-start gap-3 py-2 ${td.done ? 'opacity-50' : ''}">
                  <input type="checkbox" ${td.done ? 'checked' : ''} onchange="toggleTodo('${td.id}')" class="mt-0.5 w-4 h-4 cursor-pointer accent-accent" />
                  <span class="w-3 h-3 rounded-full mt-1 flex-shrink-0 border-2" style="border-color:${td.color}"></span>
                  <div class="flex-1 min-w-0">
                    <div class="text-[0.9rem] font-medium text-white_ ${td.done ? 'line-through' : ''}">${escapeHtml(td.title)}</div>
                    ${td.description ? `<div class="text-[0.8rem] text-dimmer mt-0.5">${escapeHtml(td.description)}</div>` : ''}
                  </div>
                </div>
              `;
            });
            html += `</div>`;
          }
        }

        html += `</div>`;
      }

      container.innerHTML = html;
    }

    // ── Paper Viewer (shared) ──
    let paperViewOrigin = 'arxiv';

    function paperViewGoBack() {
      if (paperViewOrigin === 'saved') { openSaved(); return; }
      goHome();
    }

          </div>
          ${hnDiscussionUrl ? `
            <div class="mb-[18px]">
              <div class="text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide mb-1.5">Discussion</div>
              <div class="text-[0.85rem] text-meta-value leading-normal"><a href="${hnDiscussionUrl}" target="_blank" rel="noopener" class="text-link no-underline hover:underline">View on Hacker News</a></div>
            </div>` : ''}
          <div class="mt-4">
            <a href="${paper.link}" target="_blank" rel="noopener" class="inline-block px-4 py-2 rounded-md bg-accent text-white text-[0.85rem] no-underline hover:bg-accent-hover">Open in new tab</a>
          </div>
        `;
      } else {
        const sourceName = SOURCE_NAMES[paper.source]
          || (paper.source?.startsWith('custom:') ? paper.source.slice(7) : '');
        sidebar.innerHTML = `
          ${backBtn}
          <div class="text-[1.1rem] font-semibold text-white_ leading-snug mb-5">${renderTitle(paper.title)}</div>
          ${sourceName ? `
            <div class="mb-[18px]">
              <div class="text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide mb-1.5">Source</div>
              <div class="text-[0.85rem] text-meta-value leading-normal">${escapeHtml(sourceName)}</div>
            </div>` : ''}
          ${paper.authors ? `
            <div class="mb-[18px]">
              <div class="text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide mb-1.5">Authors</div>
              <div class="text-[0.85rem] text-meta-value leading-normal">${escapeHtml(paper.authors)}</div>

          ${paper.published ? `

            </div>` : ''}
          <div class="mb-[18px]">
            <div class="text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide mb-1.5">Link</div>
            <div class="text-[0.85rem] text-meta-value leading-normal"><a href="${paper.link}" target="_blank" rel="noopener" class="text-link no-underline hover:underline">${escapeHtml(paper.link)}</a></div>
          </div>
          ${paper.categories && paper.categories.length ? `
            <div class="mb-[18px]">
              <div class="text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide mb-1.5">Categories</div>
              <div class="flex flex-wrap gap-1.5">
                ${paper.categories.map(c => `<span class="text-[0.75rem] bg-sidebar-cat text-sidebar-cat-color px-2 py-0.5 rounded border border-sidebar-cat-border">${escapeHtml(c)}</span>`).join('')}
              </div>
            </div>` : ''}
          ${paper.description ? `
          <div class="mb-[18px]">
            <div class="text-[0.7rem] font-semibold text-dimmer uppercase tracking-wide mb-1.5">${isArxiv ? 'Abstract' : 'Summary'}</div>
            <div class="text-[0.85rem] leading-relaxed text-summary" id="paper-abstract">${escapeHtml(paper.description)}</div>
          </div>` : ''}
          ${!isArxiv ? `
          <div class="mt-4">
            <a href="${paper.link}" target="_blank" rel="noopener" class="inline-block px-4 py-2 rounded-md bg-accent text-white text-[0.85rem] no-underline hover:bg-accent-hover">Open in new tab</a>
          </div>` : ''}
        `;
      }

      renderLatexIn('paper-abstract');

      const pdfContainer = document.getElementById('paper-pdf-container');

    function openPaper(index) {
      paperViewOrigin = 'arxiv';
      const paper = lastFilteredPapers[index];
      if (!paper) return;
      if (paper.source === 'arxiv') {
        showPaperView(paper, 'paper/' + index);
      } else {
        fetch(`/api/check-embed?url=${encodeURIComponent(paper.link)}`)
          .then(r => r.json())
          .then(data => {
            if (data.embeddable) {
              showPaperView(paper, 'paper/' + index);
            } else {
              window.open(paper.link, '_blank');
            }
          })
          .catch(() => {
            window.open(paper.link, '_blank');
          });
      }
    }

    function openPaperByUrl(url) {
      paperViewOrigin = 'finder';
      const cached = finderResultsCache.find(r => r.link === url);
      if (cached) {
        showPaperView(cached, 'view/' + encodeURIComponent(url));
      } else {
        showPaperView({ title: 'Paper', link: url, description: '', authors: '', categories: [] }, 'view/' + encodeURIComponent(url));
      }
    }

    // ── Auto-focus search on keypress ──
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (document.getElementById('home-main').style.display === 'none') return;
      if (e.key.length === 1 && /[a-zA-Z0-9]/.test(e.key)) {
        document.getElementById('finder-query').focus();
      }
    });

    // ── Paper Finder ──
    let finderResultsCache = [];
    let finderCurrentQuery = '';
    let finderCurrentStart = 0;

    document.getElementById('finder-form').addEventListener('submit', e => {
      e.preventDefault();
      finderCurrentStart = 0;
      finderSort = 'relevance';
      finderCurrentQuery = document.getElementById('finder-query').value.trim();
      if (finderCurrentQuery) doFinderSearch();
    });

    document.getElementById('finder-query').addEventListener('input', () => {
      if (!document.getElementById('finder-query').value.trim()) {
        showFeedHideFinder();
      }
    });

    function showFeedHideFinder() {
      document.getElementById('finder-results-masonry').innerHTML = '';
      document.getElementById('home-feed-section').style.display = '';
    }

    function showFinderHideFeed() {
      document.getElementById('home-feed-section').style.display = 'none';
    }

    async function doFinderSearch() {
      showFinderHideFeed();
      const container = document.getElementById('finder-results-masonry');
      container.innerHTML = '<div class="text-center py-8 text-dim text-[0.9rem]"><div class="spinner"></div><div>Searching arXiv...</div></div>';
      try {
        const resp = await fetch(`/api/arxiv-search?q=${encodeURIComponent(finderCurrentQuery)}&start=${finderCurrentStart}&max_results=20`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const xml = await resp.text();
        parseFinderResults(xml);
      } catch (err) {
        container.innerHTML = `<div class="text-center py-8 text-dim text-[0.9rem]">Search failed: ${err.message}</div>`;
      }
    }

    function parseFinderResults(xml) {
      const doc = new DOMParser().parseFromString(xml, 'text/xml');
      const ns = 'http://www.w3.org/2005/Atom';
      const entries = doc.getElementsByTagNameNS(ns, 'entry');
      const totalStr = doc.getElementsByTagNameNS('http://a9.com/-/spec/opensearch/1.1/', 'totalResults')[0]?.textContent || '0';
      const total = parseInt(totalStr, 10);

      finderResultsCache = Array.from(entries).map(entry => {
        const title = (entry.getElementsByTagNameNS(ns, 'title')[0]?.textContent || '').trim().replace(/\s+/g, ' ');
        const summary = (entry.getElementsByTagNameNS(ns, 'summary')[0]?.textContent || '').trim().replace(/\s+/g, ' ');
        const published = (entry.getElementsByTagNameNS(ns, 'published')[0]?.textContent || '').slice(0, 10);
        const authors = Array.from(entry.getElementsByTagNameNS(ns, 'author'))
          .map(a => a.getElementsByTagNameNS(ns, 'name')[0]?.textContent?.trim() || '').join(', ');
        const links = entry.getElementsByTagNameNS(ns, 'link');
        let link = '';
        for (const l of links) {
          if (l.getAttribute('type') === 'text/html' || (!link && l.getAttribute('rel') === 'alternate')) {
            link = l.getAttribute('href') || '';
          }
        }
        if (!link) link = entry.getElementsByTagNameNS(ns, 'id')[0]?.textContent || '';
        const categories = Array.from(entry.getElementsByTagNameNS(ns, 'category'))
          .map(c => c.getAttribute('term')).filter(Boolean);
        const arxivCats = entry.querySelectorAll('category');
        for (const c of arxivCats) {
          const t = c.getAttribute('term');
          if (t && !categories.includes(t)) categories.push(t);
        }
        const dateStr = published ? formatDate(new Date(published + 'T00:00:00')) : '';
        const arxivId = extractArxivId(link);
        return { title, description: summary, authors, link, published, date: dateStr, categories, arxivId };
      });

      renderFinderResults(total);
      fetchFinderCitations(total);
    }

    let finderSort = 'relevance';
    let finderLastTotal = 0;

    function setFinderSort(mode) {
      finderSort = mode;
      renderFinderResults(finderLastTotal);
    }

    function renderFinderResults(total) {
      const container = document.getElementById('finder-results-masonry');
      if (!finderResultsCache.length) {
        container.innerHTML = '<div class="text-center py-8 text-dim text-[0.9rem]">No results found.</div>';
        return;
      }

      let sorted = [...finderResultsCache];
      if (finderSort === 'citations') {
        sorted.sort((a, b) => (b.citations || 0) - (a.citations || 0));
      } else if (finderSort === 'latest') {
        sorted.sort((a, b) => {
          const da = a.pubDate ? new Date(a.pubDate).getTime() : 0;
          const db = b.pubDate ? new Date(b.pubDate).getTime() : 0;
          return db - da;
        });
      }

      const sortBar = `<div class="flex gap-1 mb-4">
        <button class="sort-btn shrink-0 px-3.5 py-1.5 rounded-lg border border-border-input bg-card text-muted text-[0.82rem] cursor-pointer transition-all duration-150 whitespace-nowrap hover:border-accent hover:text-primary ${finderSort === 'relevance' ? 'active' : ''}" onclick="setFinderSort('relevance')">Relevance</button>
        <button class="sort-btn shrink-0 px-3.5 py-1.5 rounded-lg border border-border-input bg-card text-muted text-[0.82rem] cursor-pointer transition-all duration-150 whitespace-nowrap hover:border-accent hover:text-primary ${finderSort === 'latest' ? 'active' : ''}" onclick="setFinderSort('latest')">Latest</button>
        <button class="sort-btn shrink-0 px-3.5 py-1.5 rounded-lg border border-border-input bg-card text-muted text-[0.82rem] cursor-pointer transition-all duration-150 whitespace-nowrap hover:border-accent hover:text-primary ${finderSort === 'citations' ? 'active' : ''}" onclick="setFinderSort('citations')">Most Cited</button>

    let lastFilteredPapers = [];

    function getFilteredPapers() {
      const search = document.getElementById('search').value.toLowerCase();
      const category = document.getElementById('category').value;
      const hidden = new Set(getHiddenPosts());
      const qfOn = isQualityFilterOn();
      const qCache = qfOn ? getQualityCache() : {};
      const bypass = qfOn ? getQualityBypass() : {};
      let filtered = allPapers.filter(p => {
        if (hidden.has(p.link)) return false;
        const bypassed = bypass[p.source];
        if (qfOn && !bypassed && !(p.title in qCache)) return false;
        if (qfOn && !bypassed && (p.title in qCache)) {
          const entry = qCache[p.title];
          const verdict = entry?.v ?? entry;
          if (verdict === 'skip') return false;
          if (verdict === 'keep' && entry?.s != null && entry.s < getQualityThreshold()) return false;
        }
        if (category && !p.categories.includes(category)) return false;
        if (search) {
          const h = `${p.title} ${p.authors} ${p.description}`.toLowerCase();
          return search.split(/\s+/).filter(Boolean).every(t => h.includes(t));
        }
        return true;
      });
      if (currentSort === 'citations') {
        filtered = [...filtered].sort((a, b) => {
          const aScore = a.source === 'hn' ? (a.hnScore || 0) : (a.citations || 0);
          const bScore = b.source === 'hn' ? (b.hnScore || 0) : (b.citations || 0);
          return bScore - aScore;
        });
      } else {
        filtered = [...filtered].sort((a, b) => {
          const da = a.pubDate ? new Date(a.pubDate).getTime() : 0;
          const db = b.pubDate ? new Date(b.pubDate).getTime() : 0;
          return db - da;
        });
      }
      // Interleave sources so no single source dominates a run
      const bySource = {};
      for (const p of filtered) {
        (bySource[p.source] || (bySource[p.source] = [])).push(p);
      }
      const sources = Object.keys(bySource);
      if (sources.length > 1) {
        const interleaved = [];
        const indices = {};
        sources.forEach(s => indices[s] = 0);
        let si = 0;
        while (interleaved.length < filtered.length) {
          const s = sources[si % sources.length];
          if (indices[s] < bySource[s].length) {
            interleaved.push(bySource[s][indices[s]++]);
          }
          si++;
          // Skip exhausted sources
          if (sources.every(s => indices[s] >= bySource[s].length)) break;
        }
        filtered = interleaved;
      }
      return filtered;
    }

      container.innerHTML = visible.map((p, i) => {

        const catChips = isPoly ? '' : p.categories.slice(0,3).map(c => `<span class="text-[0.68rem] bg-cat-tag text-cat-tag-color px-[7px] py-0.5 rounded border border-border-subtle">${escapeHtml(c)}</span>`).join('');
        const dateChip = p.date ? `<span class="text-[0.68rem] text-dim ml-auto">${escapeHtml(p.date)}</span>` : '';
        const snippet = isPoly ? '' : (p.description ? truncate(p.description, 120) : '');

        const actionBtns = `<div class="absolute top-3 right-3 flex items-center gap-0.5 z-10"><button class="bg-transparent border-none cursor-pointer p-1 text-dimmer hover:text-primary transition-colors" onclick="event.stopPropagation(); toggleSavePost(lastFilteredPapers[${i}], event)" title="${isSaved ? 'Remove from Reading List' : 'Save to Reading List'}"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="${bmFill}" stroke="${bmStroke}" stroke-width="2"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg></button><button class="bg-transparent border-none cursor-pointer p-1 text-dimmer hover:text-red-400 transition-colors" onclick="hidePost('${escapeAttr(p.link)}', '${escapeAttr(p.title)}', event)" title="Hide this post"><svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>`;
        return `
        <div class="paper break-inside-avoid bg-card border border-border-card rounded-xl p-4 mb-3.5 cursor-pointer transition-all duration-150 relative" onclick="openPaper(${i})">
          ${actionBtns}
          <div class="flex gap-1.5 flex-wrap items-center mb-2 pr-16">${sourceChip}${aiChip}${statsChips}${catChips}${dateChip}</div>
          <div class="text-[0.92rem] font-semibold text-primary mb-1.5 leading-snug pr-12">${renderTitle(p.title)}</div>
          ${snippet ? `<div class="text-[0.78rem] text-muted leading-relaxed">${escapeHtml(snippet)}</div>` : ''}

    function formatDate(d) {
      if (!d) return '';
      const now = new Date();
      const diffMs = now - d;
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 1) return 'just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      const diffHrs = Math.floor(diffMins / 60);
      if (d.toDateString() === now.toDateString()) return `${diffHrs}h ago`;
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return 'yesterday';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function decodeHtml(str) {
      const el = document.createElement('textarea');
      el.innerHTML = str;
      return el.value;
    }

    function renderTitle(rawTitle) {
      const decoded = decodeHtml(rawTitle);
      let html = escapeHtml(decoded);
      if (typeof katex !== 'undefined') {
        html = html.replace(/\$\$([^$]+?)\$\$/g, (_, tex) => {
          try { return katex.renderToString(tex, { displayMode: true, throwOnError: false }); } catch { return _; }
        });
        html = html.replace(/\$([^$]+?)\$/g, (_, tex) => {
          try { return katex.renderToString(tex, { displayMode: false, throwOnError: false }); } catch { return _; }
        });
      }
      return html;
    }

    function escapeAttr(str) {
      return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function truncate(str, max) {
      if (!str || str.length <= max) return str || '';
      return str.slice(0, max).replace(/\s+\S*$/, '') + '…';
    }


    function renderLatexIn(elementId) {
      const el = document.getElementById(elementId);
      if (!el) return;
      if (typeof katex === 'undefined') {
        setTimeout(() => renderLatexIn(elementId), 200);
        return;
      }
      // Decode HTML entities in LaTeX before rendering
      function decodeTex(t) { return t.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"'); }
      // Replace display math $$...$$ then inline $...$
      let html = el.innerHTML;
      html = html.replace(/\$\$([^$]+?)\$\$/g, (_, tex) => {
        try { return katex.renderToString(decodeTex(tex), { displayMode: true, throwOnError: false }); }
        catch (e) { return _; }
      });
      html = html.replace(/\$([^$]+?)\$/g, (_, tex) => {
        try { return katex.renderToString(decodeTex(tex), { displayMode: false, throwOnError: false }); }
        catch (e) { return _; }
      });
      el.innerHTML = html;
    }

    function formatFirstAuthor(authors) {

            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"/></svg>

      const nouns = ['fox','oak','river','stone','moon','sun','hawk','wolf','pine','star','wave','flame','cloud','peak','reef'];
