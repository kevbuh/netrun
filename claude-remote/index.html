<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Claude">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <title>Claude Remote</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000; --bg2: #111; --bg3: #1a1a1a;
      --fg: #e5e5e5; --fg2: #888;
      --accent: #b4451a; --accent2: #d4652a;
      --border: #222;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    /* ── Screens ── */
    .screen { display: none; height: 100%; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── Folder Browser ── */
    #folder-screen {
      padding-top: calc(var(--safe-top) + 12px);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
      padding-bottom: var(--safe-bottom);
    }

    .header {
      padding: 8px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .header h1 {
      font-size: 20px; font-weight: 700;
    }
    .header .icon {
      font-family: "SF Mono", Menlo, monospace;
      font-size: 18px; font-weight: 700;
      background: var(--accent); color: #fff;
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .breadcrumb {
      padding: 8px 16px;
      font-size: 13px; color: var(--fg2);
      display: flex; flex-wrap: wrap; gap: 2px;
      align-items: center;
    }
    .breadcrumb span { cursor: pointer; }
    .breadcrumb span:hover { color: var(--fg); }
    .breadcrumb .sep { margin: 0 2px; color: #444; }

    .folder-list {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    .folder-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .folder-item:active { background: var(--bg3); }
    .folder-item .fi-icon {
      font-size: 20px; width: 28px; text-align: center; flex-shrink: 0;
    }
    .folder-item .fi-name {
      flex: 1; font-size: 16px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .folder-item .fi-arrow { color: #444; font-size: 14px; }

    .bookmarks {
      padding: 12px 16px 4px;
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .bookmark-chip {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px;
      font-size: 13px; color: var(--fg2);
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .bookmark-chip:active { background: var(--bg2); }
    .bookmark-chip .remove {
      font-size: 11px; opacity: 0.5; margin-left: 2px;
    }

    .bottom-bar {
      padding: 12px 16px calc(var(--safe-bottom) + 12px);
      display: flex; gap: 10px;
    }
    .btn {
      flex: 1; padding: 14px 20px;
      border-radius: 12px; border: none;
      font-size: 16px; font-weight: 600;
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:active { background: var(--accent2); }
    .btn-secondary {
      background: var(--bg3); color: var(--fg); border: 1px solid var(--border);
      flex: 0; padding: 14px;
    }

    /* ── Terminal Screen ── */
    #terminal-screen {
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    .terminal-header {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 12px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .terminal-header .back-btn {
      background: none; border: none; color: var(--accent);
      font-size: 16px; cursor: pointer; padding: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .terminal-header .path-label {
      font-size: 13px; color: var(--fg2);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1;
    }
    .terminal-header .status {
      font-size: 11px; padding: 3px 8px;
      border-radius: 6px; font-weight: 600;
    }
    .status-connected { background: #1a3a1a; color: #4ade80; }
    .status-disconnected { background: #3a1a1a; color: #f87171; }

    #terminal-container {
      flex: 1; overflow: hidden;
    }

    .loading-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--fg2);
      font-size: 15px; z-index: 10;
    }
    .loading-overlay.hidden { display: none; }
  </style>
</head>
<body>

<!-- ── Folder Browser Screen ── -->
<div id="folder-screen" class="screen active">
  <div class="header">
    <div class="icon">C&gt;</div>
    <h1>Claude Remote</h1>
  </div>

  <div id="bookmarks" class="bookmarks"></div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="folder-list" id="folder-list"></div>

  <div class="bottom-bar">
    <button class="btn btn-secondary" id="btn-pin" title="Pin this folder">&#9733;</button>
    <button class="btn btn-primary" id="btn-launch">Open in Claude</button>
  </div>
</div>

<!-- ── Terminal Screen ── -->
<div id="terminal-screen" class="screen">
  <div class="terminal-header">
    <button class="back-btn" id="btn-back">&#9664; Back</button>
    <span class="path-label" id="terminal-path"></span>
    <span class="status status-connected" id="terminal-status">Connected</span>
  </div>
  <div id="terminal-container" style="position: relative;">
    <div class="loading-overlay" id="loading-overlay">Connecting...</div>
  </div>
</div>

<script>
(function() {
  // ── State ──
  let currentPath = localStorage.getItem("claude-remote-path") || "";
  let bookmarks = JSON.parse(localStorage.getItem("claude-remote-bookmarks") || "[]");
  let ws = null;
  let term = null;
  let fitAddon = null;

  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  // ── Init ──
  async function init() {
    if (!currentPath) {
      const resp = await fetch("/api/home");
      const data = await resp.json();
      currentPath = data.home;
    }
    renderBookmarks();
    loadFolder(currentPath);

    $("#btn-launch").addEventListener("click", launchTerminal);
    $("#btn-pin").addEventListener("click", togglePin);
    $("#btn-back").addEventListener("click", disconnectTerminal);
  }

  // ── Folder browsing ──
  async function loadFolder(path) {
    currentPath = path;
    localStorage.setItem("claude-remote-path", path);
    renderBreadcrumb();
    updatePinButton();

    const resp = await fetch(`/api/folders?path=${encodeURIComponent(path)}`);
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }

    const list = $("#folder-list");
    list.innerHTML = "";

    // Parent directory
    const parent = path.split("/").slice(0, -1).join("/") || "/";
    if (path !== "/") {
      const item = createFolderItem("..", parent, true);
      list.appendChild(item);
    }

    // Directories first, then files
    const dirs = data.entries.filter(e => e.isDir);
    const files = data.entries.filter(e => !e.isDir);

    for (const entry of [...dirs, ...files]) {
      list.appendChild(createFolderItem(entry.name, entry.path, entry.isDir));
    }
  }

  function createFolderItem(name, path, isDir) {
    const div = document.createElement("div");
    div.className = "folder-item";
    div.innerHTML = `
      <span class="fi-icon">${isDir ? "&#128193;" : "&#128196;"}</span>
      <span class="fi-name">${escapeHtml(name)}</span>
      ${isDir ? '<span class="fi-arrow">&#9654;</span>' : ""}
    `;
    if (isDir) {
      div.addEventListener("click", () => loadFolder(path));
    }
    return div;
  }

  function renderBreadcrumb() {
    const bc = $("#breadcrumb");
    const parts = currentPath.split("/").filter(Boolean);
    bc.innerHTML = "";

    // Root
    const root = document.createElement("span");
    root.textContent = "/";
    root.addEventListener("click", () => loadFolder("/"));
    bc.appendChild(root);

    let accumulated = "";
    for (const part of parts) {
      accumulated += "/" + part;
      const sep = document.createElement("span");
      sep.className = "sep";
      sep.textContent = "/";
      bc.appendChild(sep);

      const span = document.createElement("span");
      span.textContent = part;
      const target = accumulated;
      span.addEventListener("click", () => loadFolder(target));
      bc.appendChild(span);
    }
  }

  // ── Bookmarks ──
  function renderBookmarks() {
    const container = $("#bookmarks");
    container.innerHTML = "";
    for (const bm of bookmarks) {
      const chip = document.createElement("div");
      chip.className = "bookmark-chip";
      const name = bm.split("/").pop() || bm;
      chip.innerHTML = `<span>${escapeHtml(name)}</span><span class="remove">&times;</span>`;
      chip.querySelector(".remove").addEventListener("click", (e) => {
        e.stopPropagation();
        bookmarks = bookmarks.filter(b => b !== bm);
        localStorage.setItem("claude-remote-bookmarks", JSON.stringify(bookmarks));
        renderBookmarks();
      });
      chip.addEventListener("click", () => loadFolder(bm));
      container.appendChild(chip);
    }
  }

  function togglePin() {
    if (bookmarks.includes(currentPath)) {
      bookmarks = bookmarks.filter(b => b !== currentPath);
    } else {
      bookmarks.push(currentPath);
    }
    localStorage.setItem("claude-remote-bookmarks", JSON.stringify(bookmarks));
    renderBookmarks();
    updatePinButton();
  }

  function updatePinButton() {
    const btn = $("#btn-pin");
    btn.style.color = bookmarks.includes(currentPath) ? "var(--accent)" : "var(--fg2)";
  }

  // ── Terminal ──
  function launchTerminal() {
    showScreen("terminal-screen");
    $("#terminal-path").textContent = currentPath;
    $("#loading-overlay").classList.remove("hidden");

    // Create terminal
    term = new Terminal({
      theme: {
        background: "#000",
        foreground: "#e5e5e5",
        cursor: "#e5e5e5",
        selectionBackground: "rgba(180, 69, 26, 0.4)",
      },
      fontSize: 14,
      fontFamily: '"SF Mono", Menlo, "Courier New", monospace',
      cursorBlink: true,
      allowTransparency: true,
      scrollback: 5000,
    });

    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);

    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(webLinksAddon);

    const container = $("#terminal-container");
    term.open(container);

    // Wait a frame for layout, then fit
    requestAnimationFrame(() => {
      fitAddon.fit();
      connectWebSocket();
    });

    // Handle resize
    window.addEventListener("resize", handleResize);
    // Also refit on orientation change / keyboard show
    window.visualViewport?.addEventListener("resize", handleResize);
  }

  function handleResize() {
    if (fitAddon && term) {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: "resize",
          cols: term.cols,
          rows: term.rows,
        }));
      }
    }
  }

  function connectWebSocket() {
    const protocol = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${protocol}//${location.host}/ws/terminal`);

    ws.onopen = () => {
      ws.send(JSON.stringify({
        folder: currentPath,
        cols: term.cols,
        rows: term.rows,
      }));
      $("#loading-overlay").classList.add("hidden");
      setStatus(true);
    };

    ws.onmessage = (event) => {
      term.write(event.data);
    };

    ws.onclose = () => {
      setStatus(false);
      term.write("\r\n\x1b[90m[Session ended]\x1b[0m\r\n");
    };

    ws.onerror = () => {
      setStatus(false);
    };

    // Terminal input → WebSocket
    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(data);
      }
    });
  }

  function disconnectTerminal() {
    if (ws) {
      ws.close();
      ws = null;
    }
    if (term) {
      term.dispose();
      term = null;
      fitAddon = null;
    }
    window.removeEventListener("resize", handleResize);
    window.visualViewport?.removeEventListener("resize", handleResize);
    // Clear terminal container
    $("#terminal-container").innerHTML =
      '<div class="loading-overlay hidden" id="loading-overlay">Connecting...</div>';
    showScreen("folder-screen");
  }

  function setStatus(connected) {
    const el = $("#terminal-status");
    el.textContent = connected ? "Connected" : "Disconnected";
    el.className = "status " + (connected ? "status-connected" : "status-disconnected");
  }

  // ── Screen management ──
  function showScreen(id) {
    $$(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // ── Utils ──
  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Boot ──
  init();
})();
</script>

</body>
</html>
