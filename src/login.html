<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NetRun — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/aether/css/tokens.css">
  <link rel="stylesheet" href="/aether/css/reset.css">
  <link rel="stylesheet" href="/aether/css/themes/clear.css">
  <script>
    // Apply clear theme before paint to prevent flash
    document.documentElement.setAttribute('data-theme', 'clear');
    document.documentElement.setAttribute('data-aether-theme', 'match');
  </script>
</head>
<body class="font-[-apple-system,BlinkMacSystemFont,'Segoe_UI',Roboto,sans-serif] min-h-screen flex items-center justify-center" style="background:var(--aether-bg);">

  <div class="auth-modal" style="position:relative;z-index:1;">
    <div class="text-center mb-3">
      <img src="/icon.png" alt="NetRun" style="height:5rem;display:inline-block;">
    </div>
    <div class="auth-error" id="auth-error" style="min-height:0"></div>
    <div id="google-signin-btn" class="flex justify-center"></div>
  </div>

  <script type="module" src="/js/core/core-settings.js"></script>
  <script type="module" src="/js/logger.js"></script>
  <script type="module" src="/js/core/icons.js"></script>
  <script type="module" src="/js/core/core-state.js"></script>
  <script defer src="/js/api-ipc.js"></script>
  <script defer src="/js/api.js"></script>
  <script defer src="/js/login-auth.js"></script>
</body>
</html>
