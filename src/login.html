<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NetRun — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css">
  <script>
    // Apply clear theme before paint to prevent flash
    document.documentElement.setAttribute('data-theme', 'clear');
    document.documentElement.setAttribute('data-aether-theme', 'match');
  </script>
</head>
<body class="font-[-apple-system,BlinkMacSystemFont,'Segoe_UI',Roboto,sans-serif] min-h-screen flex items-center justify-center" style="background:var(--aether-bg);">

  <div class="auth-modal" style="position:relative;z-index:1;">
    <div class="text-center mb-3">
      <svg style="height:2.2rem;display:inline-block;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 11a2 2 0 1 1-4 0 4 4 0 0 1 8 0 6 6 0 0 1-12 0 8 8 0 0 1 16 0 10 10 0 1 1-20 0 11.93 11.93 0 0 1 2.42-7.22a2 2 0 1 1 3.16 2.44"/></svg>
      <p class="text-[1.1rem] mt-1 mb-1" style="color:#999">netrun</p>
    </div>
    <div class="auth-error" id="auth-error" style="min-height:0"></div>
    <div id="google-signin-btn" class="flex justify-center"></div>
  </div>

  <script src="/js/logger.js"></script>
  <script src="/js/core/icons.js"></script>
  <script src="/js/core/core-state.js"></script>
  <script src="/js/api-ipc.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/login-auth.js"></script>
</body>
</html>
