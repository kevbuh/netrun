<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NetRun — Setup</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/aether/css/tokens.css">
  <link rel="stylesheet" href="/aether/css/reset.css">
  <link rel="stylesheet" href="/aether/css/themes/dark.css">
  <link rel="stylesheet" href="/aether/css/themes/light.css">
  <link rel="stylesheet" href="/aether/css/themes/daylight.css">
  <link rel="stylesheet" href="/aether/css/themes/clear.css">
  <link rel="stylesheet" href="/aether/css/components/modals.css">
  <link rel="stylesheet" href="/aether/css/components/buttons.css">
  <link rel="stylesheet" href="/aether/css/features/dynamic-island.css">
  <link rel="stylesheet" href="/aether/css/features/onboarding.css">
  <link rel="stylesheet" href="/aether/css/components/aether-ui.css">
  <script>
    // Apply stored theme (user is authenticated, may have synced prefs)
    (function() {
      var t = localStorage.getItem('theme');
      if (t && t !== 'dark') document.documentElement.setAttribute('data-theme', t === 'daylight' ? 'daylight' : t);
      else document.documentElement.setAttribute('data-theme', 'clear');
      var a = localStorage.getItem('accentColor');
      if (a) {
        var r = parseInt(a.slice(1,3),16), g = parseInt(a.slice(3,5),16), b = parseInt(a.slice(5,7),16);
        var h = '#' + [Math.min(255,r+20),Math.min(255,g+20),Math.min(255,b+20)].map(function(v){return v.toString(16).padStart(2,'0')}).join('');
        document.documentElement.style.setProperty('--accent', a);
        document.documentElement.style.setProperty('--accent-hover', h);
      }
      document.documentElement.setAttribute('data-aether-theme', localStorage.getItem('aetherColor') || 'match');
    })();
    // Stub for api.js safety
    function _showLoginGate() {}
  </script>
</head>
<body class="font-[-apple-system,BlinkMacSystemFont,'Segoe_UI',Roboto,sans-serif] min-h-screen" style="background:var(--aether-bg);">

  <div id="onboarding-container" style="display:flex;align-items:center;justify-content:center;height:100vh;"></div>

  <script src="/js/logger.js"></script>

  <script src="/aether/ui/state.js"></script>
  <script src="/aether/ui/view.js"></script>
  <script src="/aether/ui/primitives.js"></script>
  <script src="/aether/ui/controls.js"></script>
  <script src="/aether/ui/containers.js"></script>
  <script src="/aether/ui/overlay.js"></script>
  <script src="/aether/ui/component.js"></script>
  <script src="/aether/ui/aether-ui.js"></script>
  <script src="/js/onboarding.js"></script>
</body>
</html>
