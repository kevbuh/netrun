<!DOCTYPE html>
<html>
<head>
  <title>Webview Test</title>
</head>
<body>
  <h1>Webview Test</h1>
  <div id="info"></div>
  <div style="width:800px;height:600px;border:2px solid red;">
    <webview id="test-webview" src="https://example.com" style="width:100%;height:100%"></webview>
  </div>

  <script>
    const info = document.getElementById('info');
    const webview = document.getElementById('test-webview');

    if (window.electronAPI) {
      info.innerHTML += '<p>✓ Electron API available</p>';
      info.innerHTML += '<p>Preload path: ' + window.electronAPI.webviewPreloadPath + '</p>';

      webview.setAttribute('preload', window.electronAPI.webviewPreloadPath);

      webview.addEventListener('did-start-loading', () => {
        info.innerHTML += '<p>✓ Webview started loading</p>';
      });

      webview.addEventListener('did-finish-load', () => {
        info.innerHTML += '<p>✓ Webview finished loading</p>';
      });

      webview.addEventListener('console-message', (e) => {
        info.innerHTML += '<p>[WEBVIEW CONSOLE] ' + e.message + '</p>';
      });

      webview.addEventListener('ipc-message', (event) => {
        info.innerHTML += '<p>✓ IPC message received: ' + event.channel + ' = ' + JSON.stringify(event.args) + '</p>';
        console.log('IPC from webview:', event.channel, event.args);
        if (event.channel === 'webview-selection' && window.electronAPI.logToTerminal) {
          window.electronAPI.logToTerminal(event.args[0]);
        }
      });
    } else {
      info.innerHTML = '<p>✗ Not in Electron</p>';
    }
  </script>
</body>
</html>
