<!-- List mode (teams listing) -->
<div id="teams-view-list" class="max-w-[700px] mx-auto px-8 pt-6 pb-16">
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-[1.3rem] font-semibold text-white_">Teams</h2>
    <button onclick="showCreateTeamPopup('view')" class="text-dimmer hover:text-primary bg-transparent border-none cursor-pointer text-xl leading-none p-0" title="Create team">+</button>
  </div>
  <div id="teams-view-content"></div>
  <div id="teams-view-create-form"></div>
</div>
<!-- Detail mode (single team) -->
<div id="teams-view-detail" class="hidden h-screen overflow-hidden">
  <div class="grid grid-cols-[260px_1px_1fr] h-full overflow-hidden">
    <!-- Left sidebar -->
    <div id="team-sidebar" class="border-r border-border-card py-3 overflow-y-auto flex flex-col scrollbar-hide">
      <div class="flex items-center justify-between mb-3 px-2">
        <button class="bg-transparent border-none text-muted text-[0.8rem] cursor-pointer p-0 inline-flex items-center gap-1.5 hover:text-primary" onclick="openTeams()">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          <span class="team-sidebar-label">Back</span>
        </button>
        <button class="w-6 h-6 rounded-md flex items-center justify-center bg-transparent border-none text-dimmer cursor-pointer hover:text-primary transition-colors p-0" onclick="toggleTeamSidebar()" title="Collapse sidebar">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 3v18" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="team-sidebar-header" class="px-2 mb-3"></div>
      <div id="team-sidebar-tabs"></div>
    </div>
    <!-- Divider -->
    <div class="bg-border-card"></div>
    <!-- Right content pane -->
    <div id="team-content-pane" class="overflow-y-auto flex flex-col"></div>
  </div>
</div>
