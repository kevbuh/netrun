<div class="blog-layout">
  <article class="blog-article">
    <header class="blog-header">
      <div class="blog-header-top">
        <h1 id="blog-title" class="blog-title"></h1>
        <div class="blog-actions">
          <button id="blog-bookmark-btn" onclick="toggleBlogBookmark()" class="blog-action-btn" title="Bookmark">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
          </button>
          <button id="blog-fork-btn" onclick="copyBlogToVault()" class="blog-action-btn" title="Fork to my vault">
            <svg class="w-5 h-5 blog-fork-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v1a2 2 0 01-2 2H8a2 2 0 01-2-2V9"/><path d="M12 12v3"/></svg>
            <svg class="w-5 h-5 blog-fork-check" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="display:none;"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          </button>
          <button id="blog-unpost-btn" onclick="unpublishBlog()" class="blog-action-btn blog-action-btn-danger" title="Unpublish" style="display:none;">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
          </button>
        </div>
      </div>
      <div class="blog-meta">
        <span id="blog-author" class="blog-author"></span>
        <span class="blog-date" id="blog-date"></span>
      </div>
      <div class="blog-votes">
        <button id="blog-upvote-btn" onclick="voteBlog(1)" class="blog-vote-btn" title="Upvote">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
          <span id="blog-upvote-count">0</span>
        </button>
        <button id="blog-downvote-btn" onclick="voteBlog(-1)" class="blog-vote-btn" title="Downvote">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          <span id="blog-downvote-count">0</span>
        </button>
      </div>
    </header>
    <div id="blog-content" class="blog-content"></div>

    <!-- Comments Section -->
    <div class="blog-comments">
      <div class="blog-comments-header">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/></svg>
        <span>Comments</span>
        <span id="blog-comment-count" class="blog-comment-count">0</span>
      </div>
      <div class="blog-comment-form">
        <textarea id="blog-comment-input" class="blog-comment-textarea" placeholder="Write a comment..." rows="3"></textarea>
        <button onclick="postBlogComment()" class="blog-comment-submit">Post Comment</button>
      </div>
      <div id="blog-comments-list" class="blog-comments-list">
        <div class="blog-comments-empty">No comments yet. Be the first to comment!</div>
      </div>
    </div>
  </article>
</div>
