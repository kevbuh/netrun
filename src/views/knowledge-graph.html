<!-- Knowledge Graph View -->
<div class="kg-container">
  <div class="kg-topbar">
    <div class="kg-topbar-left">
      <span class="text-primary font-semibold text-sm">Knowledge Graph</span>
      <span id="kg-stats" class="text-secondary text-xs ml-2"></span>
    </div>
    <div class="kg-topbar-right">
      <input id="kg-search" type="text" placeholder="Search graph..." class="kg-search-input" autocomplete="off">
      <div id="kg-filters" class="kg-filters"></div>
      <button id="kg-fit-btn" class="kg-btn" title="Fit to view" onclick="_kgZoomFit()">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/></svg>
      </button>
    </div>
  </div>
  <div class="kg-canvas-wrap">
    <canvas id="kg-canvas"></canvas>
    <div id="kg-legend" class="kg-legend"></div>
  </div>
  <div id="kg-info-panel" class="kg-info-panel" style="display:none"></div>
</div>
