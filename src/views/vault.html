<div class="vault-layout">
  <!-- Left: File tree -->
  <div class="vault-sidebar">
    <div class="vault-sidebar-header">
      <span class="text-[0.8rem] font-semibold text-primary">Vault</span>
      <div class="flex gap-1">
        <div class="vault-new-dropdown nr-menu-wrapper">
          <button onclick="vaultToggleNewDropdown()" class="vault-sidebar-btn" title="New note">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          </button>
          <div id="vault-new-dropdown nr-menu" class="vault-new-dropdown nr-menu" style="display:none;">
            <button onclick="vaultNewNote(); vaultHideNewDropdown()" class="vault-new-dropdown nr-menu-item">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
              Note
            </button>
            <button onclick="vaultCreateFile('.py'); vaultHideNewDropdown()" class="vault-new-dropdown nr-menu-item">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5"/></svg>
              Python
            </button>
            <button onclick="vaultCreateFile('.ipynb'); vaultHideNewDropdown()" class="vault-new-dropdown nr-menu-item">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.429 9.75L2.25 12l4.179 2.25m0-4.5l5.571 3 5.571-3m-11.142 0L2.25 7.5 12 2.25l9.75 5.25-4.179 2.25m0 0L12 12.75 6.429 9.75M17.571 14.25L12 17.25l-5.571-3"/></svg>
              Notebook
            </button>
            <button onclick="vaultCreateFile('.tex'); vaultHideNewDropdown()" class="vault-new-dropdown nr-menu-item">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
              LaTeX
            </button>
            <button onclick="vaultCreateFile('.draw'); vaultHideNewDropdown()" class="vault-new-dropdown nr-menu-item">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.53 16.122a3 3 0 00-5.78 1.128 2.25 2.25 0 01-2.4 2.245 4.5 4.5 0 008.4-2.245c0-.399-.078-.78-.22-1.128zm0 0a15.998 15.998 0 003.388-1.62m-5.043-.025a15.994 15.994 0 011.622-3.395m3.42 3.42a15.995 15.995 0 004.764-4.648l3.876-5.814a1.151 1.151 0 00-1.597-1.597L14.146 6.32a15.996 15.996 0 00-4.649 4.763m3.42 3.42a6.776 6.776 0 00-3.42-3.42"/></svg>
              Drawing
            </button>
            <button onclick="vaultCreateFile('.slides'); vaultHideNewDropdown()" class="vault-new-dropdown nr-menu-item">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3m0 0l.5 1.5m-.5-1.5h-9.5m0 0l-.5 1.5"/></svg>
              Slides
            </button>
            <button onclick="vaultCreateFile('.mermaid'); vaultHideNewDropdown()" class="vault-new-dropdown nr-menu-item">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 14.25v2.25m3-4.5v4.5m3-6.75v6.75m3-9v9M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z"/></svg>
              Diagram
            </button>
            <button onclick="vaultNewMarimoNote(); vaultHideNewDropdown()" class="vault-new-dropdown nr-menu-item">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5"/></svg>
              Marimo
            </button>
            <div style="height:1px;background:var(--nr-border-default);margin:4px 8px;"></div>
            <button onclick="vaultNewProject(); vaultHideNewDropdown()" class="vault-new-dropdown nr-menu-item">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.06-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
              Project
            </button>
          </div>
        </div>
        <button onclick="vaultNewFolder()" class="vault-sidebar-btn" title="New folder">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10.5v6m3-3H9m4.06-7.19l-2.12-2.12a1.5 1.5 0 00-1.06-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
        </button>
      </div>
    </div>
    <div class="vault-search">
      <svg class="vault-search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
      <input type="text" id="nr-input" placeholder="Search notes..." class="nr-input" oninput="vaultFilterNotes(this.value)">
    </div>
    <div id="vault-file-tree" class="vault-file-tree"></div>
  </div>

  <!-- Center: Editor -->
  <div class="vault-editor">
    <div class="vault-editor-header">
      <input type="text" id="vault-note-title" class="nr-input" placeholder="Untitled" onchange="vaultRenameNote(this.value)">
      <div class="flex items-center gap-2">
        <button id="vault-graph-btn" onclick="vaultToggleGraph()" class="vault-toolbar-btn" title="Graph view">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="12" r="3"/><path d="M8.6 7.4l6.8 3.2M8.6 16.6l6.8-3.2"/></svg>
        </button>
        <button id="vault-git-btn" onclick="vaultToggleGit()" class="vault-toolbar-btn" title="Git (lazygit)">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="6" cy="6" r="2"/><circle cx="18" cy="18" r="2"/><path d="M12 9V7.5A1.5 1.5 0 0010.5 6H8"/><path d="M12 15v1.5a1.5 1.5 0 001.5 1.5H16"/></svg>
        </button>
        <button id="vault-terminal-btn" onclick="vaultToggleTerminal()" class="vault-toolbar-btn" title="Terminal">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m6.75 7.5 3 2.25-3 2.25m4.5 0h3M5.25 20.25h13.5A2.25 2.25 0 0 0 21 18V6a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 6v12a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
        </button>
        <button id="vault-preview-btn" onclick="vaultTogglePreview()" class="vault-toolbar-btn" title="Toggle preview">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
        <div class="w-px h-5 bg-border-card mx-1"></div>
        <button id="vault-publish-btn" onclick="vaultTogglePublish()" class="vault-toolbar-btn" title="Publish as blog">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418"/></svg>
        </button>
        <button id="vault-delete-btn" onclick="vaultDeleteCurrentNote()" class="vault-toolbar-btn vault-toolbar-btn-danger" title="Delete note">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
        <div class="w-px h-5 bg-border-card mx-1"></div>
        <button id="vault-sidebar-toggle-btn" onclick="togglePanel()" class="vault-toolbar-btn" title="Toggle sidebar (⌘])">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M12 17.25h8.25"/></svg>
        </button>
      </div>
    </div>
    <div id="vault-editor-container" class="vault-editor-content">
      <textarea id="vault-editor" class="vault-textarea" placeholder="Start writing... Use [[note name]] to link to other notes."></textarea>
    </div>
    <div id="vault-preview-container" class="vault-preview-content" style="display:none;"></div>
    <div id="vault-marimo-container" class="vault-marimo-content" style="display:none;">
      <div id="vault-marimo-loading" class="vault-marimo-loading">
        <div class="vault-marimo-spinner"></div>
        <div class="text-dimmer text-sm mt-2">Starting marimo...</div>
      </div>
      <iframe id="vault-marimo-iframe" class="vault-marimo-iframe"></iframe>
    </div>
    <div id="vault-graph-container" class="vault-graph-content" style="display:none;"></div>
    <div id="vault-git-container" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
      <div class="vault-git-dashboard">
        <div class="vibe-git-inner">
          <div class="vibe-git-left">
            <div class="vibe-pane" id="vibe-pane-status" data-pane="0" onclick="_vibeClickPane(0)">
              <div class="vibe-pane-header"><span class="vibe-pane-key">1</span> Status</div>
              <div class="vibe-pane-body" id="vibe-status-body"></div>
            </div>
            <div class="vibe-pane" id="vibe-pane-files" data-pane="1" onclick="_vibeClickPane(1)">
              <div class="vibe-pane-header"><span class="vibe-pane-key">2</span> Files - Worktree</div>
              <div class="vibe-pane-body" id="vibe-files-body"></div>
            </div>
            <div class="vibe-pane" id="vibe-pane-branches" data-pane="2" onclick="_vibeClickPane(2)">
              <div class="vibe-pane-header"><span class="vibe-pane-key">3</span> Branches</div>
              <div class="vibe-pane-body" id="vibe-branches-body"></div>
            </div>
            <div class="vibe-pane" id="vibe-pane-commits" data-pane="3" onclick="_vibeClickPane(3)">
              <div class="vibe-pane-header"><span class="vibe-pane-key">4</span> Commits</div>
              <div class="vibe-pane-body" id="vibe-commits-body"></div>
            </div>
            <div class="vibe-pane" id="vibe-pane-stash" data-pane="4" onclick="_vibeClickPane(4)">
              <div class="vibe-pane-header"><span class="vibe-pane-key">5</span> Stash</div>
              <div class="vibe-pane-body" id="vibe-stash-body"></div>
            </div>
          </div>
          <div class="vibe-git-right">
            <div class="vibe-pane vibe-detail-pane" id="vibe-pane-detail" data-pane="5" onclick="_vibeClickPane(5)">
              <div class="vibe-pane-header"><span class="vibe-pane-key">0</span> Log</div>
              <div class="vibe-pane-body" id="vibe-detail-body"><span class="text-dimmer">Select a file, commit, or branch to view details</span></div>
            </div>
          </div>
        </div>
        <div class="vibe-cmdlog" style="position:relative;">
          <div class="vibe-pane-header" style="font-size:0.68rem;">Command Log</div>
          <div id="vibe-cmdlog-body" class="vibe-cmdlog-content"></div>
        </div>
      </div>
    </div>
    <div id="vault-terminal-container" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
      <div id="vault-terminal-toolbar" class="flex items-center gap-1 px-2 py-1 border-b border-border-sidebar bg-sidebar shrink-0">
        <button class="term-tb-btn" onclick="createTerminal()" title="New Tab (Cmd+T)">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        </button>
        <span class="w-px h-5 bg-border-dim mx-1"></span>
        <button class="term-tb-btn" onclick="clearTerminal()" title="Clear (Cmd+K)">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9.75 14.25 12m0 0 2.25 2.25M14.25 12l2.25-2.25M14.25 12 12 14.25m-2.58 4.92-6.374-6.375a1.125 1.125 0 0 1 0-1.59L9.42 4.83c.21-.211.497-.33.795-.33H19.5a2.25 2.25 0 0 1 2.25 2.25v10.5a2.25 2.25 0 0 1-2.25 2.25h-9.284c-.298 0-.585-.119-.795-.33Z"/></svg>
        </button>
        <button class="term-tb-btn" onclick="copyTerminal()" title="Copy">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75"/></svg>
        </button>
        <button class="term-tb-btn" onclick="pasteTerminal()" title="Paste">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
        </button>
        <span class="w-px h-5 bg-border-dim mx-1"></span>
        <button class="term-tb-btn" onclick="splitTerminal('horizontal')" title="Split Horizontal (Cmd+Shift+D)">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
        </button>
        <button class="term-tb-btn" onclick="splitTerminal('vertical')" title="Split Vertical (Cmd+Shift+E)">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
        </button>
        <span class="w-px h-5 bg-border-dim mx-1"></span>
        <div class="flex items-center gap-1 ml-auto">
          <input type="text" id="vault-term-search-input" placeholder="Search..." class="w-32 bg-input border border-border-input rounded px-2 py-0.5 text-[0.75rem] text-primary outline-none focus:border-accent" onkeydown="if(event.key==='Enter'){event.shiftKey?terminalSearchPrev():terminalSearchNext()}else if(event.key==='Escape'){clearTerminalSearch()}" oninput="_debounceTermSearch()">
          <button class="term-tb-btn" onclick="terminalSearchPrev()" title="Previous (Shift+Enter)">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/></svg>
          </button>
          <button class="term-tb-btn" onclick="terminalSearchNext()" title="Next (Enter)">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
          </button>
          <span id="vault-term-search-count" class="text-[0.68rem] text-dimmer w-10 text-center"></span>
        </div>
        <span class="w-px h-5 bg-border-dim mx-1"></span>
        <div class="relative">
          <button class="term-tb-btn" onclick="toggleTerminalSettings()" title="Settings">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
          </button>
          <div id="vault-term-settings-dropdown" class="hidden absolute right-0 top-8 z-50 bg-card border border-border-card rounded-lg shadow-lg p-3 min-w-[200px]">
            <div class="text-[0.7rem] text-dim uppercase tracking-wider mb-2">Theme</div>
            <select id="vault-term-theme-select" class="w-full bg-input border border-border-input rounded px-2 py-1 text-[0.8rem] text-primary outline-none mb-3" onchange="applyTerminalTheme(this.value)">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="dracula">Dracula</option>
              <option value="solarized">Solarized Dark</option>
              <option value="monokai">Monokai</option>
            </select>
            <div class="text-[0.7rem] text-dim uppercase tracking-wider mb-2">Font Size</div>
            <input type="range" id="vault-term-fontsize-slider" min="10" max="20" value="13" class="w-full" oninput="applyTerminalFontSize(this.value)">
            <div class="text-[0.68rem] text-dimmer text-center mt-1"><span id="vault-term-fontsize-value">13</span>px</div>
          </div>
        </div>
      </div>
      <div id="vault-terminal-tabs" class="flex items-center gap-1 px-2 py-1 border-b border-border-sidebar bg-sidebar overflow-x-auto scrollbar-hide shrink-0"></div>
      <div id="vault-terminal-panes" style="flex:1;overflow:hidden;position:relative;background:#0d0d0d;"></div>
    </div>
    <div id="vault-file-editor-pane" style="display:none;">
      <div id="exp-content-pane" style="display:flex;flex-direction:column;flex:1 1 0%;min-height:0;overflow:hidden;">
        <div id="exp-default-content" style="display:none;"></div>
        <div id="exp-file-editor" style="display:none;"></div>
      </div>
    </div>
    <input type="file" id="exp-file-upload-input" multiple style="display:none" onchange="uploadExpFiles(this.files)" />
  </div>

</div>
