  <link rel="stylesheet" href="/styles.css">
  <script>
    // Apply theme + accent before paint to prevent flash
    (function() {
      var t = localStorage.getItem('theme');
      if (t && t !== 'dark') document.documentElement.setAttribute('data-theme', t === 'daylight' ? 'daylight' : t);
      var a = localStorage.getItem('accentColor');
      if (a) {
        var r = parseInt(a.slice(1,3),16), g = parseInt(a.slice(3,5),16), b = parseInt(a.slice(5,7),16);
        var h = '#' + [Math.min(255,r+20),Math.min(255,g+20),Math.min(255,b+20)].map(function(v){return v.toString(16).padStart(2,'0')}).join('');
        document.documentElement.style.setProperty('--accent', a);
        document.documentElement.style.setProperty('--accent-hover', h);
      }

      var et = localStorage.getItem('editorTheme');
      if (et && et !== 'auto') document.documentElement.setAttribute('data-editor-theme', et);
    })();
  </script>

<body class="font-[-apple-system,BlinkMacSystemFont,'Segoe_UI',Roboto,sans-serif] text-primary min-h-screen" style="background:var(--aether-bg);">

  <!-- App Bezel — rounded container for all app content -->
  <div id="app-bezel" class="bg-body" style="position:fixed;inset:34px 0 0 0;border-radius:8px 8px 0 0;overflow-x:hidden;overflow-y:auto;transform:translateZ(0);">

  <!-- Download App Banner (Web Only) -->
  <div id="download-app-banner" class="hidden fixed top-0 left-0 right-0 z-50 bg-gradient-to-r from-accent/90 to-accent text-white shadow-lg backdrop-blur-sm">
    <div class="flex items-center justify-between px-4 py-2 max-w-7xl mx-auto">
      <div class="flex items-center gap-3 flex-1">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/>
        </svg>
        <span class="text-sm font-medium">Get a better experience with the desktop app</span>
        <a href="https://github.com/yourusername/aether/releases" target="_blank" class="text-sm font-bold underline hover:no-underline ml-2">Download</a>
      </div>
      <button onclick="dismissDownloadBanner()" class="text-white/80 hover:text-white text-xl font-light leading-none px-2 transition-colors" title="Dismiss">×</button>
    </div>
  </div>

  <!-- Home Main Content -->
  <div class="flex-1 px-6 pt-2" id="home-main">
    <!-- Onboarding View -->
    <div id="onboard-view" style="display:none;height:calc(100% - 24px)" class="flex flex-col overflow-hidden">
      <!-- Floating header -->
      <div class="text-center px-4 pt-6 pb-3 z-10 relative" style="background: linear-gradient(to bottom, var(--bg-body) 60%, transparent)">
        <h1 class="text-white_ text-[1.4rem] font-semibold mb-1">What do you want to read?</h1>
        <p class="text-muted text-[0.85rem] mb-3">Pick your sources. You can change these anytime in settings.</p>
        <button id="onboard-start-btn" disabled onclick="completeOnboarding()" class="px-6 py-2 rounded-lg border-none bg-accent text-white text-[0.85rem] font-medium cursor-pointer hover:bg-accent-hover transition-colors disabled:opacity-30 disabled:cursor-not-allowed">Start reading</button>
        <div id="hc-category-tabs" class="hc-tabs mt-3"></div>
      </div>
      <!-- Feed source list -->
      <div class="flex-1 overflow-y-auto mx-6 my-2 px-1">
        <div id="onboard-grid" class="max-w-[500px] mx-auto"></div>
      </div>
      <!-- Floating bottom: custom RSS -->
      <div class="px-6 py-3 z-10 relative" style="background: linear-gradient(to top, var(--bg-body) 60%, transparent)">
        <div class="max-w-[500px] mx-auto">
          <div class="text-[0.68rem] text-dim uppercase tracking-wider mb-1.5 pl-1">Custom RSS Feeds</div>
          <div id="custom-feeds-list" class="flex flex-col gap-2 mb-2"></div>
          <div class="flex gap-2">
            <input type="text" id="custom-feed-url" placeholder="https://example.com/feed.xml" class="flex-1 bg-input border border-border-input rounded-md px-3 py-1.5 text-primary text-sm outline-none focus:border-accent" onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomFeed()}">
            <button onclick="addCustomFeed()" class="bg-accent text-white text-sm px-3 py-1.5 rounded-md border-none cursor-pointer hover:bg-accent-hover">Add</button>
          </div>
        </div>
      </div>
    </div>

      <div id="home-feed-section" style="display:none">
        <input type="hidden" id="search" value="" />
        <div class="text-[0.8rem] text-dim py-1 pb-3 flex items-center gap-2" id="stats-row">
          <span id="stats"></span>
          <span id="eval-indicator" class="text-dim hidden"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:eval-pulse 1.2s ease-in-out infinite;vertical-align:middle;margin-right:4px"></span>Evaluating <span id="eval-count">0</span>…</span>
          <span id="refresh-countdown" class="tabular-nums text-dim ml-auto"></span>
        </div>
        <div id="trends-panel" style="display:none" class="pb-3 flex items-center gap-2 overflow-x-auto scrollbar-hide">
          <button class="sort-btn shrink-0 w-8 h-8 rounded-lg border border-border-input bg-card text-muted cursor-pointer transition-all duration-150 hover:border-accent hover:text-primary flex items-center justify-center" id="sort-foryou" onclick="setSortMode(currentSort === 'foryou' ? 'latest' : 'foryou')" title="For You"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg></button>
          <button class="sort-btn shrink-0 w-8 h-8 rounded-lg border border-border-input bg-card text-muted cursor-pointer transition-all duration-150 hover:border-accent hover:text-primary flex items-center justify-center" id="sort-citations" onclick="setSortMode(currentSort === 'citations' ? 'latest' : 'citations')" title="Most Cited"><svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61z"/></svg></button>
          <button class="sort-btn shrink-0 w-8 h-8 rounded-lg border border-border-input bg-card text-muted cursor-pointer transition-all duration-150 hover:border-accent hover:text-primary flex items-center justify-center" id="view-mode-btn" onclick="toggleViewMode()" title="Toggle view"><svg id="view-mode-icon" class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></button>
          <select id="category" class="hidden"><option value="">All</option></select>
          <button class="sort-btn shrink-0 w-8 h-8 rounded-lg border border-border-input bg-card text-muted cursor-pointer transition-all duration-150 hover:border-accent hover:text-primary flex items-center justify-center" onclick="showOnboarding()" title="Feed sources"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor"/></svg></button>
          <button class="sort-btn shrink-0 w-8 h-8 rounded-lg border border-border-input bg-card text-muted cursor-pointer transition-all duration-150 hover:border-accent hover:text-primary flex items-center justify-center" id="quality-filter-btn" onclick="toggleQualityPanel()" title="Quality filter"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg></button>
          <span class="w-px h-5 bg-border-dim mx-0.5 shrink-0"></span>
          <div id="source-bubbles" class="flex gap-1.5 shrink-0"></div>
        </div>
        <main id="papers" class="pb-16">
          <div style="column-span:all" class="flex items-center justify-center h-[60vh]"><span class="text-dim text-[1.4rem] font-mono">⠋</span></div>
        </main>
      </div>
  </div>


  <!-- Reading List View -->

  <!-- Project Detail View (lazy-loaded from /views/experiment-detail.html) -->

  <!-- Browse View -->
  <div id="browse-view" class="hidden view" style="height:100%;display:none;">
    <div id="browse-tab-row" class="flex items-center gap-1 bg-sidebar">
      <div id="browse-tabs" class="flex items-end flex-1 overflow-x-auto"></div>
      <div id="browse-toolbar-sessions" class="browse-sessions-dropdown browse-panel-btn shrink-0"></div>
      <button id="browse-toolbar-newwin" class="browse-toolbar-btn browse-panel-btn shrink-0 w-7 h-7" onclick="browseCreateWindow()" title="New Window">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      </button>
      <button class="browse-tab-new shrink-0 w-7 h-7 rounded-md bg-transparent border-none text-dimmer cursor-pointer hover:text-primary hover:bg-hover flex items-center justify-center" onclick="browseNewTab()" title="New tab">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      </button>
      <button id="browse-tab-overview-btn" class="shrink-0 w-7 h-7 rounded-md bg-transparent border-none text-dimmer cursor-pointer hover:text-primary hover:bg-hover flex items-center justify-center mr-2" onclick="toggleBrowseTabOverview()" title="Show all tabs">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z"/></svg>
      </button>
    </div>
    <!-- Tab Overview (Safari iPad style) -->
    <div id="browse-tab-overview" class="browse-tab-overview" style="display:none;"></div>
    <div id="browse-bar" class="flex items-center gap-1 pl-2 pr-2 pb-1 border-b border-border-sidebar bg-sidebar">
      <button id="browse-return-btn" class="shrink-0 h-7 rounded-md bg-transparent border-none text-accent cursor-pointer hover:bg-hover flex items-center gap-0.5 px-1.5" onclick="_browseGoBack()" title="Back to feed" style="display:none">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        <span class="text-[0.7rem]">Back</span>
      </button>
      <button class="shrink-0 w-7 h-7 rounded-md bg-transparent border-none text-dimmer cursor-pointer hover:text-primary hover:bg-hover flex items-center justify-center" onclick="browseBack()" title="Back">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
      </button>
      <button class="shrink-0 w-7 h-7 rounded-md bg-transparent border-none text-dimmer cursor-pointer hover:text-primary hover:bg-hover flex items-center justify-center" onclick="browseForward()" title="Forward">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
      </button>
      <button class="shrink-0 w-7 h-7 rounded-md bg-transparent border-none text-dimmer cursor-pointer hover:text-primary hover:bg-hover flex items-center justify-center" onclick="browseReload()" title="Reload">

      <span id="browse-zoom-controls" class="flex items-center gap-1" style="display:none">

        </button>
      </span>
      <input id="browse-url-input" type="text" class="flex-1 bg-hover border border-transparent rounded-lg px-2.5 py-1 text-[0.8rem] text-primary outline-none focus:bg-card focus:border-accent" placeholder="Search or enter URL…" onkeydown="_browseUrlKeydown(event)" oninput="_browseUrlShowHistory()" onfocus="this.select();_browseUrlShowHistory()" onblur="setTimeout(_browseUrlHideHistory,150)">

        <span id="browse-adblock-badge" class="absolute -top-0.5 -right-0.5 text-[0.55rem] font-bold rounded-full min-w-[14px] h-[14px] flex items-center justify-center px-0.5 leading-none" style="display:none;background:var(--accent);color:#fff;"></span>
      </button>
      <div id="browse-downloads-btn" class="browse-bar-draggable relative shrink-0" style="display:none">
        <button class="shrink-0 w-7 h-7 rounded-md bg-transparent border-none text-dimmer cursor-pointer hover:text-primary hover:bg-hover flex items-center justify-center relative" onclick="toggleBrowseDownloads(event)" title="Downloads">

          <span id="browse-download-progress-ring" class="browse-download-ring" style="display:none"></span>
          <span id="browse-download-badge" class="absolute -top-0.5 -right-0.5 text-[0.55rem] font-bold rounded-full min-w-[14px] h-[14px] flex items-center justify-center px-0.5 leading-none" style="display:none;background:var(--accent);color:#fff;"></span>
        </button>
